<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Таблицы</title>

<style>
:root{
  --blue:#1E3F8A;
  --orange:#FF6A00;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6fb;
}

/* ===== HEADER ===== */
.header{
  background:var(--blue);
  color:#fff;
  text-align:center;
  font-style:italic;
  font-size:24px;
  padding:14px;
}

/* ===== CONTROLS ===== */
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  padding:12px;
  align-items:center;
}

label{
  font-size:14px;
}

/* ===== BUTTONS ===== */
button{
  background:var(--orange);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 0 #b84a00;
}

button:active{
  transform:translateY(2px);
  box-shadow:0 2px 0 #b84a00;
}

/* ===== GRID ===== */
#grid{
  display:grid;
  gap:10px;
  max-width:1000px;
  margin:20px auto;
  padding:0 10px;
}

/* ===== CELL ===== */
.cell{
  background:#fff;
  border-radius:16px;
  padding:22px;
  text-align:center;
  font-size:26px;
  font-weight:500;
  user-select:none;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.cell.hidden{
  background:var(--orange);
  color:transparent;
}

/* ===== MOBILE ===== */
@media (max-width:600px){
  .cell{
    font-size:22px;
    padding:26px 12px;
  }
}

/* ===== FOOTER ===== */
.footer{
  position:fixed;
  bottom:8px;
  right:10px;
  font-size:11px;
  color:#888;
}
</style>
</head>

<body>

<div class="header">Таблицы</div>

<div class="controls">
  <label>Строки <input id="rows" type="number" value="5"></label>
  <label>Столбцы <input id="cols" type="number" value="5"></label>

  <label><input id="v1" type="checkbox" checked> 1</label>
  <label><input id="v2" type="checkbox" checked> 2</label>
  <label><input id="v3" type="checkbox" checked> 3</label>
  <label><input id="v4" type="checkbox" checked> 4</label>
  <label><input id="v5" type="checkbox" checked> 5+</label>

  <button onclick="generate()">Сгенерировать</button>
  <button onclick="printTable()">🖨 Печать</button>
  <button onclick="exportPNG()">🖼 PNG</button>
</div>

<div id="grid"></div>

<div class="footer">© verner</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
let words = [];
const grid = document.getElementById("grid");

const vowels = "аеёиоуыэюя";

/* ===== LOAD JSON ===== */
async function load(){
  try{
    const res = await fetch("./words.json");
    const data = await res.json();
    words = Array.isArray(data) ? data : (data.words || []);
  }catch(e){
    console.error("JSON error:", e);
    words = [];
  }
}

/* ===== ГЛАСНЫЕ ===== */
function vowelCount(word){
  return [...word.toLowerCase()]
    .filter(c => vowels.includes(c)).length;
}

/* ===== RENDER ===== */
function render(list, cols){

  grid.innerHTML = "";

  const isMobile = window.innerWidth < 600;
  const finalCols = isMobile ? Math.min(cols, 2) : cols;

  grid.style.gridTemplateColumns =
    `repeat(${finalCols}, minmax(120px, 1fr))`;

  list.forEach(word=>{
    const div = document.createElement("div");
    div.className = "cell";
    div.textContent = word;
    div.onclick = ()=>div.classList.toggle("hidden");
    grid.appendChild(div);
  });
}

/* ===== GENERATE ===== */
function generate(){

  if(!words.length){
    grid.innerHTML = "<div style='text-align:center'>Нет слов</div>";
    return;
  }

  const r = +rows.value || 5;
  const c = +cols.value || 5;
  const need = r * c;

  let pool = words.filter(w=>{
    const v = vowelCount(w);

    return (
      (v1.checked && v === 1) ||
      (v2.checked && v === 2) ||
      (v3.checked && v === 3) ||
      (v4.checked && v === 4) ||
      (v5.checked && v >= 5)
    );
  });

  if(pool.length < need){
    pool = [...pool, ...words];
  }

  pool = pool
    .sort(()=>Math.random()-0.5)
    .slice(0, need);

  render(pool, c);
}

/* ===== PRINT ===== */
function printTable(){
  const win = window.open("");
  win.document.write(`
    <html>
    <head>
    <style>
      body{font-family:Arial;padding:20px;}
      .grid{
        display:grid;
        grid-template-columns:repeat(${cols.value},1fr);
        gap:10px;
      }
      .cell{
        border:1px solid #000;
        padding:10px;
        text-align:center;
        font-size:18px;
      }
    </style>
    </head>
    <body>
    <div class="grid">
      ${[...grid.children].map(c=>`
        <div class="cell">${c.textContent}</div>
      `).join("")}
    </div>
    </body>
    </html>
  `);
  win.print();
}

/* ===== PNG EXPORT ===== */
function exportPNG(){
  html2canvas(grid).then(canvas=>{
    const link = document.createElement("a");
    link.download = "table.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

/* ===== START ===== */
load();

</script>

</body>
</html>
