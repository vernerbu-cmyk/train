<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Таблицы</title>

<style>
:root{
  --blue:#1E3F8A;
  --orange:#FF6A00;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6fb;
}

/* ===== HEADER ===== */
.header{
  background:var(--blue);
  color:#fff;
  text-align:center;
  font-style:italic;
  font-size:24px;
  padding:14px;
}

/* ===== CONTROLS ===== */
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  padding:12px;
}

/* ===== BUTTONS ===== */
button{
  background:var(--orange);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 0 #b84a00;
}

button:active{
  transform:translateY(2px);
  box-shadow:0 2px 0 #b84a00;
}

/* ===== GRID ===== */
#grid{
  display:grid;
  gap:10px;
  max-width:900px;
  margin:20px auto;
  padding:0 10px;
}

/* CELL */
.cell{
  background:#fff;
  border-radius:14px;
  padding:16px;
  text-align:center;
  font-size:22px;
  user-select:none;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.cell.hidden{
  background:var(--orange);
  color:transparent;
}

/* ===== MOBILE ===== */
@media (max-width:600px){
  .cell{
    font-size:18px;
    padding:12px;
  }

  .header{
    font-size:18px;
  }
}

/* ===== FOOTER ===== */
.footer{
  position:fixed;
  bottom:8px;
  right:10px;
  font-size:11px;
  color:#888;
}
</style>
</head>

<body>

<div class="header">Таблицы</div>

<div class="controls">
  <label>Строки <input id="rows" type="number" value="5"></label>
  <label>Столбцы <input id="cols" type="number" value="5"></label>

  <label><input id="v1" type="checkbox" checked> 1</label>
  <label><input id="v2" type="checkbox" checked> 2</label>
  <label><input id="v3" type="checkbox" checked> 3</label>
  <label><input id="v4" type="checkbox" checked> 4</label>
  <label><input id="v5" type="checkbox" checked> 5+</label>

  <button onclick="generate()">Сгенерировать</button>
</div>

<div id="grid"></div>

<div class="footer">© verner</div>

<script>
let words = [];
const grid = document.getElementById("grid");

const vowels = "аеёиоуыэюя";

/* ===== ЗАГРУЗКА JSON ===== */
async function load(){
  try{
    const res = await fetch("./words.json");
    const data = await res.json();

    words = Array.isArray(data) ? data : (data.words || []);

    console.log("WORDS LOADED:", words.length);
  }catch(e){
    console.error("JSON ERROR:", e);
    words = [];
  }
}

/* ===== ГЛАСНЫЕ ===== */
function vowelCount(word){
  return [...word.toLowerCase()].filter(c => vowels.includes(c)).length;
}

/* ===== ГЕНЕРАЦИЯ ===== */
function generate(){

  if(!words.length){
    console.warn("NO WORDS LOADED");
    return;
  }

  const r = parseInt(rows.value) || 5;
  const c = parseInt(cols.value) || 5;
  const need = r * c;

  let filtered = words.filter(w=>{
    const v = vowelCount(w);

    return (
      (v1.checked && v === 1) ||
      (v2.checked && v === 2) ||
      (v3.checked && v === 3) ||
      (v4.checked && v === 4) ||
      (v5.checked && v >= 5)
    );
  });

  if(filtered.length < need){
    filtered = [...filtered, ...words];
  }

  filtered = filtered
    .sort(() => Math.random() - 0.5)
    .slice(0, need);

  render(filtered, c);
}

/* ===== RENDER ===== */
function render(list, cols){

  grid.innerHTML = "";

  grid.style.gridTemplateColumns =
    `repeat(${cols}, minmax(80px, 1fr))`;

  list.forEach(word=>{
    const div = document.createElement("div");
    div.className = "cell";
    div.textContent = word;

    div.onclick = () => div.classList.toggle("hidden");

    grid.appendChild(div);
  });
}

/* ===== START ===== */
load().then(()=>{
  setTimeout(generate, 100);
});
</script>

</body>
</html>
