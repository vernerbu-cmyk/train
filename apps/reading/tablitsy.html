<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Таблицы</title>

<style>
:root{
  --blue:#1E3F8A;
  --orange:#FF6A00;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f6fb;
}

/* ===== ШАПКА ===== */
.header{
  background:var(--blue);
  color:#fff;
  text-align:center;
  font-style:italic;
  font-size:24px;
  padding:14px 10px;
  position:sticky;
  top:0;
}

/* ===== КОНТРОЛЫ ===== */
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  padding:12px;
}

label{
  font-size:15px;
}

/* ===== КНОПКИ ===== */
button{
  background:var(--orange);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 4px 0 #b84a00;
  transition:0.1s;
}

button:active{
  transform:translateY(3px);
  box-shadow:0 1px 0 #b84a00;
}

/* ===== ТАБЛИЦА ===== */
table{
  margin:20px auto;
  width:95%;
  max-width:900px;
  border-collapse:separate;
  table-layout:fixed;
}

/* ===== ЯЧЕЙКИ ===== */
td{
  background:#fff;
  border-radius:14px;
  padding:16px;
  text-align:center;
  font-size:24px;
  cursor:pointer;
  user-select:none;

  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  word-break:break-word;
  transition:0.15s;
}

td.hidden{
  background:var(--orange);
  color:transparent;
  transform:scale(0.96);
}

/* ===== МОБИЛЬНАЯ ===== */
@media (max-width:600px){

  .header{
    font-size:18px;
  }

  td{
    font-size:18px;
    padding:12px;
  }

  .controls{
    gap:6px;
  }

  button{
    width:100%;
    max-width:220px;
  }
}

/* ===== КОПИРАЙТ ===== */
.footer{
  position:fixed;
  bottom:8px;
  right:10px;
  font-size:11px;
  color:#888;
}
</style>
</head>

<body>

<div class="header">Таблицы</div>

<div class="controls">
  <label>Строки <input id="rows" type="number" value="5"></label>
  <label>Столбцы <input id="cols" type="number" value="5"></label>

  <label><input id="v1" type="checkbox" checked> 1</label>
  <label><input id="v2" type="checkbox" checked> 2</label>
  <label><input id="v3" type="checkbox" checked> 3</label>
  <label><input id="v4" type="checkbox" checked> 4</label>
  <label><input id="v5" type="checkbox" checked> 5+</label>

  <button onclick="generate()">Сгенерировать</button>
</div>

<table id="table"></table>

<div class="footer">© verner</div>

<script>
let words = [];
const table = document.getElementById("table");

const vowels = "аеёиоуыэюя";

/* ===== ЗАГРУЗКА ===== */
async function load(){
  const res = await fetch("./words.json");
  words = await res.json();
}

/* ===== ГЛАСНЫЕ ===== */
function vowelCount(w){
  return [...w.toLowerCase()].filter(c=>vowels.includes(c)).length;
}

/* ===== ГЕНЕРАЦИЯ ===== */
function generate(){

  const r = +rows.value || 5;
  const c = +cols.value || 5;
  const need = r * c;

  const groups = {1:[],2:[],3:[],4:[],5:[]};

  words.forEach(w=>{
    const v = vowelCount(w);
    if(v>=5) groups[5].push(w);
    else groups[v]?.push(w);
  });

  let pool = [];

  if(v1.checked) pool.push(...groups[1]);
  if(v2.checked) pool.push(...groups[2]);
  if(v3.checked) pool.push(...groups[3]);
  if(v4.checked) pool.push(...groups[4]);
  if(v5.checked) pool.push(...groups[5]);

  if(pool.length < need){
    pool = [...pool, ...words];
  }

  pool = pool.sort(()=>Math.random()-0.5).slice(0, need);

  render(pool, r, c);
}

/* ===== РЕНДЕР ===== */
function render(pool, r, c){

  table.innerHTML = "";

  let i = 0;

  for(let y = 0; y < r; y++){
    const tr = document.createElement("tr");

    for(let x = 0; x < c; x++){
      const td = document.createElement("td");

      td.textContent = pool[i++] || "—";

      td.onclick = ()=>td.classList.toggle("hidden");

      tr.appendChild(td);
    }

    table.appendChild(tr);
  }
}

/* ===== СТАРТ ===== */
load().then(()=>{
  setTimeout(generate, 80);
});
</script>

</body>
</html>
