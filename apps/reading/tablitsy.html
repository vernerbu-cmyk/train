<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Таблицы</title>

<style>
:root{
  --blue:#1E3F8A;
  --orange:#FF6A00;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6fb;
}

/* ===== HEADER ===== */
.header{
  background:var(--blue);
  color:#fff;
  text-align:center;
  font-style:italic;
  font-size:24px;
  padding:14px;
}

/* ===== STATUS ===== */
#status{
  text-align:center;
  padding:6px;
  font-weight:600;
  font-size:14px;
}

/* ===== CONTROLS ===== */
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  padding:12px;
  align-items:center;
}

label{
  font-size:14px;
}

/* ===== BUTTONS ===== */
button{
  background:var(--orange);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 0 #b84a00;
}

button:active{
  transform:translateY(2px);
  box-shadow:0 2px 0 #b84a00;
}

/* ===== GRID ===== */
#grid{
  display:grid;
  gap:10px;
  max-width:1000px;
  margin:20px auto;
  padding:0 10px;
}

/* ===== CELL ===== */
.cell{
  background:#fff;
  border-radius:16px;
  padding:22px;
  text-align:center;
  font-size:26px;
  font-weight:500;
  user-select:none;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.cell.hidden{
  background:var(--orange);
  color:transparent;
}

/* ===== MOBILE ===== */
@media (max-width:600px){
  .cell{
    font-size:22px;
    padding:26px 12px;
  }
}

/* ===== PRINT FIX ===== */
@media print {
  body{
    background:#fff;
  }

  .header,
  .controls,
  #status{
    display:none !important;
  }

  #grid{
    max-width:none;
    margin:0;
    padding:0;
    gap:12px;
  }

  .cell{
    font-size:28px !important;
    padding:28px;
    border:2px solid #000;
    box-shadow:none;
    break-inside:avoid;
  }
}

/* ===== FOOTER ===== */
.footer{
  position:fixed;
  bottom:8px;
  right:10px;
  font-size:11px;
  color:#888;
}
</style>
</head>

<body>

<div class="header">Таблицы</div>

<div id="status">⏳ ожидание загрузки...</div>

<div class="controls">
  <label>Строки <input id="rows" type="number" value="5"></label>
  <label>Столбцы <input id="cols" type="number" value="5"></label>

  <label><input id="v1" type="checkbox" checked> 1</label>
  <label><input id="v2" type="checkbox" checked> 2</label>
  <label><input id="v3" type="checkbox" checked> 3</label>
  <label><input id="v4" type="checkbox" checked> 4</label>
  <label><input id="v5" type="checkbox" checked> 5+</label>

  <button onclick="generate()">Сгенерировать</button>
  <button onclick="window.print()">🖨 Печать</button>
</div>

<div id="grid"></div>

<div class="footer">© verner</div>

<script>
let words = [];
const grid = document.getElementById("grid");
const status = document.getElementById("status");

const vowels = "аеёиоуыэюя";

/* ===== LOAD JSON (СТАБИЛЬНО) ===== */
async function load(){

  try{
    status.textContent = "⏳ загрузка JSON...";

    const res = await fetch("./words.json", { cache:"no-store" });

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();

    let data;
    try{
      data = JSON.parse(text);
    }catch(e){
      throw new Error("JSON сломан");
    }

    words = Array.isArray(data) ? data : (data.words || []);

    if(!words.length){
      throw new Error("пустой список слов");
    }

    status.textContent = "✔ слов загружено: " + words.length;

  }catch(e){
    console.error(e);
    status.textContent = "❌ JSON не загрузился";
    words = [];
  }
}

/* ===== ГЛАСНЫЕ ===== */
function vowelCount(word){
  return [...word.toLowerCase()]
    .filter(c => vowels.includes(c)).length;
}

/* ===== GENERATE ===== */
function generate(){

  if(!words.length){
    grid.innerHTML = "<div style='text-align:center'>Нет слов</div>";
    return;
  }

  const r = +rows.value || 5;
  const c = +cols.value || 5;
  const need = r * c;

  let pool = words.filter(w=>{
    const v = vowelCount(w);

    return (
      (v1.checked && v === 1) ||
      (v2.checked && v === 2) ||
      (v3.checked && v === 3) ||
      (v4.checked && v === 4) ||
      (v5.checked && v >= 5)
    );
  });

  if(pool.length < need){
    pool = [...pool, ...words];
  }

  pool = pool
    .sort(()=>Math.random()-0.5)
    .slice(0, need);

  render(pool, c);
}

/* ===== RENDER ===== */
function render(list, cols){

  grid.innerHTML = "";

  const isMobile = window.innerWidth < 600;
  const finalCols = isMobile ? Math.min(cols, 2) : cols;

  grid.style.gridTemplateColumns =
    `repeat(${finalCols}, minmax(120px, 1fr))`;

  list.forEach(word=>{
    const div = document.createElement("div");
    div.className = "cell";
    div.textContent = word;
    div.onclick = ()=>div.classList.toggle("hidden");
    grid.appendChild(div);
  });
}

/* ===== START ===== */
load();
</script>

</body>
</html>
