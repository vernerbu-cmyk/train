<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Таблицы</title>

<style>
:root{
  --blue:#1E3F8A;
  --orange:#FF6A00;
}

/* ===== ОБЩЕЕ ===== */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f6fb;
}

/* ===== ШАПКА ===== */
.header{
  background:var(--blue);
  color:#fff;
  text-align:center;
  font-style:italic;
  font-size:24px;
  padding:14px 10px;
  position:sticky;
  top:0;
  z-index:10;
}

/* ===== КОНТРОЛЫ ===== */
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  padding:12px;
}

label{
  font-size:16px;
}

/* ===== КНОПКИ (ОРАНЖЕВЫЕ) ===== */
button{
  background:var(--orange);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;

  /* объём */
  box-shadow:0 4px 0 #b84a00;
  transition:0.1s;
}

button:hover{
  filter:brightness(1.05);
}

button:active{
  transform:translateY(3px);
  box-shadow:0 1px 0 #b84a00;
}

/* ===== ТАБЛИЦА ===== */
table{
  margin:20px auto;
  border-spacing:10px;
}

/* карточки */
td{
  background:#fff;
  border-radius:14px;
  padding:18px 22px;
  text-align:center;
  font-size:28px; /* увеличили */
  cursor:pointer;
  user-select:none;

  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  transition:0.15s;
}

/* скрытие */
td.hidden{
  background:var(--orange);
  color:transparent;
  transform:scale(0.97);
}

/* ===== МОБИЛЬНАЯ ===== */
@media (max-width:600px){
  td{
    font-size:20px;
    padding:14px 16px;
  }

  .header{
    font-size:18px;
  }
}

/* ===== КОПИРАЙТ ===== */
.footer{
  position:fixed;
  bottom:8px;
  right:10px;
  font-size:11px;
  color:#888;
}
</style>
</head>

<body>

<div class="header">Таблицы</div>

<div class="controls">
  <label>Строки <input id="rows" type="number" value="5"></label>
  <label>Столбцы <input id="cols" type="number" value="5"></label>

  <label><input id="v1" type="checkbox" checked> 1 гласная</label>
  <label><input id="v2" type="checkbox" checked> 2 гласные</label>
  <label><input id="v3" type="checkbox" checked> 3 гласные</label>
  <label><input id="v4" type="checkbox" checked> 4 гласные</label>
  <label><input id="v5" type="checkbox" checked> 5+ гласных</label>

  <button onclick="generate()">Сгенерировать</button>
</div>

<table id="table"></table>

<div class="footer">© verner</div>

<script>
let words = [];
const table = document.getElementById("table");

const vowels = "аеёиоуыэюя";

/* ===== загрузка JSON ===== */
async function load(){
  const res = await fetch("./words.json");
  words = await res.json();
}

/* ===== гласные ===== */
function vowelCount(w){
  return [...w.toLowerCase()].filter(c => vowels.includes(c)).length;
}

/* ===== генерация ===== */
function generate(){
  const r = +rows.value;
  const c = +cols.value;
  const need = r * c;

  const groups = {1:[],2:[],3:[],4:[],5:[]};

  words.forEach(w=>{
    const v = vowelCount(w);
    if(v>=5) groups[5].push(w);
    else groups[v]?.push(w);
  });

  let pool = [];

  if(v1.checked) pool.push(...groups[1]);
  if(v2.checked) pool.push(...groups[2]);
  if(v3.checked) pool.push(...groups[3]);
  if(v4.checked) pool.push(...groups[4]);
  if(v5.checked) pool.push(...groups[5]);

  if(pool.length < need){
    pool = [...pool, ...words];
  }

  pool = pool.sort(()=>Math.random()-0.5).slice(0,need);

  render(pool,r,c);
}

/* ===== рендер ===== */
function render(pool,r,c){
  table.innerHTML="";
  let i=0;

  for(let y=0;y<r;y++){
    const tr=document.createElement("tr");

    for(let x=0;x<c;x++){
      const td=document.createElement("td");

      td.textContent = pool[i++] || "—";

      td.onclick = ()=>td.classList.toggle("hidden");

      tr.appendChild(td);
    }

    table.appendChild(tr);
  }
}

load().then(generate);
</script>

</body>
</html>
