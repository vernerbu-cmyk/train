<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лавина</title>

<style>
:root{
  --blue:#1E3F8A;
  --orange:#FF6A00;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f6f7fb;
}

/* ===== HEADER ===== */
header{
  background:var(--blue);
  color:#fff;
  padding:10px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:relative;
  gap:12px;
}

.logo{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-weight:800;
  font-style:italic;
  font-size:28px;
  letter-spacing:1px;
  white-space:nowrap;
  pointer-events:none;
}

.speed{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  z-index:2;
}

.toggles{
  display:flex;
  gap:10px;
  font-size:13px;
  z-index:2;
}

input[type=range],
input[type=checkbox]{
  accent-color:var(--orange);
}

input[type=range]{
  width:140px;
}

/* ===== BUTTONS ===== */
.controls{
  margin:12px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}

button.main{
  background:var(--orange);
  color:#fff;
  border:none;
  border-radius:8px;
  padding:10px 16px;
  font-size:16px;
  cursor:pointer;
  box-shadow:0 4px 0 #c24f00;
}

button.main:active{
  transform:translateY(2px);
  box-shadow:0 1px 0 #c24f00;
}

/* ===== SETTINGS ===== */
#settings{
  display:none;
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

#settings select,
#settings textarea{
  width:100%;
  margin-top:8px;
  padding:6px;
  font-size:15px;
  box-sizing:border-box;
}

/* ===== TEXT ===== */
#text{
  padding:20px;
  max-width:900px;
  margin:auto;
  font-size:30px;
  line-height:1.6;
  text-align:justify;
  background:#fff;
  border-radius:10px;
}

/* ===== INFO ===== */
#words,#time{
  position:fixed;
  right:10px;
  padding:6px 10px;
  border-radius:8px;
  font-size:14px;
  background:#fff;
}

#words{bottom:10px;}
#time{bottom:46px;}

/* ===== COPYRIGHT ===== */
#author{
  position:fixed;
  right:10px;
  bottom:4px;
  font-size:10px;
  color:#9aa0a6;
  opacity:.8;
  pointer-events:none;
}

/* ===== MOBILE FIX ===== */
@media (max-width:768px){

  header{
    flex-direction:column;
    align-items:stretch;
    padding:10px;
  }

  /* главное исправление:
     убираем absolute центрирование на телефоне */
  .logo{
    position:static;
    transform:none;
    order:1;
    text-align:center;
    font-size:24px;
    margin-bottom:4px;
  }

  .speed{
    order:2;
    width:100%;
    justify-content:space-between;
    flex-wrap:wrap;
    font-size:12px;
  }

  .toggles{
    order:3;
    width:100%;
    justify-content:space-between;
    flex-wrap:wrap;
    font-size:12px;
  }

  input[type=range]{
    width:100%;
    margin:4px 0;
  }

  button.main{
    flex:1 1 40%;
    font-size:15px;
  }

  #text{
    font-size:22px;
    padding:14px;
    margin:10px;
  }

  #words,#time{
    font-size:12px;
    right:6px;
  }
}
</style>
</head>

<body>

<header>

  <div class="logo">Лавина</div>

  <div class="speed">
    <span>Медленно</span>
    <input id="speed" type="range" min="0" max="9" value="4">
    <span>Быстро</span>
  </div>

  <div class="toggles">
    <label><input type="checkbox" id="paint"> белый</label>
    <label><input type="checkbox" id="reverseMode"> реверс</label>
  </div>

</header>

<div class="controls">
  <button class="main" id="start">Старт</button>
  <button class="main" id="stop">Стоп</button>
  <button class="main" id="repeat">Повтор</button>
  <button class="main" id="toggleSettings">Настройки</button>
</div>

<div id="settings">
  <select id="selector"></select>
  <textarea id="newText" placeholder="Вставь текст"></textarea>
  <button class="main" id="add">Добавить</button>
</div>

<div id="text"></div>

<div id="words"></div>
<div id="time">Время: 0 сек</div>

<div id="author">© verner</div>

<script>
const speeds=[2,1.75,1.5,1.25,1,0.75,0.5,0.4,0.25,0.1];

let texts=[];
let spans=[],originalWords=[];
let i=0,running=false,timer=null;

let startTime=0;
let clockInterval=null;
let currentDelay=speeds[4]*1000;

const textBox=document.getElementById("text");
const selector=document.getElementById("selector");
const settings=document.getElementById("settings");
const toggleSettings=document.getElementById("toggleSettings");

const speed=document.getElementById("speed");
const paint=document.getElementById("paint");
const reverseMode=document.getElementById("reverseMode");

const startBtn=document.getElementById("start");
const stopBtn=document.getElementById("stop");
const repeatBtn=document.getElementById("repeat");

const newText=document.getElementById("newText");
const add=document.getElementById("add");

const wordsBox=document.getElementById("words");
const timeBox=document.getElementById("time");

async function loadTexts(){
  const res=await fetch("texts2.json");
  texts=await res.json();
  updateSelector();
  selector.selectedIndex=0;
  showText();
}

function updateSelector(){
  selector.innerHTML="";
  texts.forEach((_,n)=>{
    const o=document.createElement("option");
    o.value=n;
    o.textContent="Текст "+(n+1);
    selector.appendChild(o);
  });
}

function formatWord(w){
  if(reverseMode.checked){
    let p="";
    if(/[\.,!?:;]$/.test(w)){
      p=w.slice(-1);
      w=w.slice(0,-1);
    }
    return w.split("").reverse().join("")+p;
  }
  return w;
}

function showText(){
  const t=texts[selector.value];
  if(!t) return;

  originalWords=t.split(" ");
  textBox.innerHTML=originalWords.map(w=>`<span>${formatWord(w)}</span>`).join(" ");
  spans=[...textBox.querySelectorAll("span")];

  i=0;
  wordsBox.textContent="Слов: "+spans.length;
  timeBox.textContent="Время: 0 сек";
}

selector.onchange=showText;

toggleSettings.onclick=()=>{
  settings.style.display=settings.style.display==="block"?"none":"block";
};

add.onclick=()=>{
  const t=newText.value.trim();
  if(!t) return;
  texts.push(t);
  updateSelector();
  selector.selectedIndex=texts.length-1;
  showText();
};

function startClock(){
  clearInterval(clockInterval);
  clockInterval=setInterval(()=>{
    timeBox.textContent="Время: "+Math.floor((Date.now()-startTime)/1000)+" сек";
  },200);
}

function go(){
  if(!running || i>=spans.length) return;

  for(let j=i;j<spans.length;j++){
    spans[j].textContent=formatWord(originalWords[j]);
  }

  spans[i].style.color=paint.checked ? "white" : "transparent";

  i++;
  wordsBox.textContent="Слов: "+(spans.length-i);

  if(i<spans.length){
    timer=setTimeout(go,currentDelay);
  }else{
    running=false;
  }
}

startBtn.onclick=()=>{
  stopBtn.onclick();
  running=true;
  i=0;
  startTime=Date.now();
  startClock();
  go();
};

stopBtn.onclick=()=>{
  running=false;
  clearTimeout(timer);
};

repeatBtn.onclick=()=>{
  stopBtn.onclick();
  showText();
  running=true;
  startTime=Date.now();
  startClock();
  go();
};

speed.oninput=()=>{
  currentDelay=speeds[speed.value]*1000;
};

loadTexts();
</script>

</body>
</html>
