<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Исчезающий текст</title>

<style>
body { margin:0; font-family: Arial, sans-serif; background:#fffaf2; }

header{
  background:orange;
  color:white;
  padding:8px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo{font-weight:bold;font-size:20px;}

.speed{display:flex;align-items:center;gap:6px;font-size:14px;}
input[type=range]{width:130px;}

.toggles{display:flex;gap:12px;font-size:14px;}

.controls{
  margin:12px;
  display:flex;
  justify-content:center;
  gap:12px;
}

button.main{
  font-size:18px;
  padding:8px 18px;
  background:orange;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

#settings{
  display:none;
  background:#fff3e0;
  padding:12px;
}

#settings textarea,
#settings select{
  width:100%;
  margin-top:8px;
  font-size:16px;
}

#text{
  padding:20px;
  max-width:900px;
  margin:auto;
  font-size:30px;
  line-height:1.6;
  text-align:justify;
  background:white;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#words,#time{
  position:fixed;
  right:10px;
  padding:6px 10px;
  border-radius:6px;
  font-size:16px;
}

#words{ bottom:10px; background:#ffe0b2; }
#time{ bottom:48px; background:#c8e6c9; }
</style>
</head>

<body>

<header>
  <div class="logo">ЛидерГен</div>

  <div class="speed">
    <span>Медленно</span>
    <input id="speed" type="range" min="0" max="9" value="4">
    <span>Быстро</span>
  </div>

  <div class="toggles">
    <label><input type="checkbox" id="paint"> Белый</label>
    <label><input type="checkbox" id="reverseMode"> Задом наперёд</label>
  </div>

  <button id="toggleSettings">⬇</button>
</header>

<div class="controls">
  <button class="main" id="start">Старт</button>
  <button class="main" id="stop">Стоп</button>
  <button class="main" id="repeat">Повтор</button>
</div>

<div id="settings">
  <select id="selector"></select>
  <textarea id="newText" placeholder="Вставь свой текст"></textarea>
  <button class="main" id="add">Добавить текст</button>
</div>

<div id="text"></div>
<div id="words"></div>
<div id="time">Время: 0 сек</div>

<script>

const speeds=[2,1.75,1.5,1.25,1,0.75,0.5,0.4,0.25,0.1];

let texts = []; // только JSON источник

let spans=[], originalWords=[];
let i=0, running=false, timer=null;
let startTime=0, clockInterval=null;

const textBox=document.getElementById("text");
const selector=document.getElementById("selector");
const wordsBox=document.getElementById("words");
const timeBox=document.getElementById("time");
const paint=document.getElementById("paint");
const reverseMode=document.getElementById("reverseMode");
const newText=document.getElementById("newText");
const add=document.getElementById("add");
const speed=document.getElementById("speed");
const startBtn=document.getElementById("start");
const stopBtn=document.getElementById("stop");
const repeatBtn=document.getElementById("repeat");
const settings=document.getElementById("settings");
const toggleSettings=document.getElementById("toggleSettings");

/* ===== LOAD JSON ===== */
async function loadTexts(){
  try{
    const res = await fetch("texts2.json");
    const data = await res.json();

    if(Array.isArray(data) && data.length){
      texts = data;

      updateSelector();

      // фикс залипания выбора
      setTimeout(() => {
        selector.selectedIndex = 0;
        showText();
      }, 0);
    }
  }catch(e){
    console.log("texts2.json не загружен", e);
  }
}

/* ===== SELECTOR ===== */
function updateSelector(){
  selector.innerHTML="";
  texts.forEach((_,idx)=>{
    const o=document.createElement("option");
    o.value=idx;
    o.textContent="Текст "+(idx+1);
    selector.appendChild(o);
  });
}

/* ===== FORMAT WORD ===== */
function formatWord(word){
  if(reverseMode.checked){
    let punct="";
    if(/[\.,!?:;]$/.test(word)){
      punct = word.slice(-1);
      word = word.slice(0,-1);
    }
    return word.split("").reverse().join("") + punct;
  }
  return word;
}

/* ===== SHOW TEXT ===== */
function showText(){
  let t=texts[selector.value];
  if(!t) return;

  originalWords=t.split(" ");
  textBox.innerHTML=originalWords.map(w=>`<span>${formatWord(w)}</span>`).join(" ");
  spans=[...textBox.querySelectorAll("span")];

  wordsBox.textContent="Слов: "+spans.length;
  timeBox.textContent="Время: 0 сек";
  i=0;
}

selector.onchange=showText;

/* ===== SETTINGS ===== */
toggleSettings.onclick=()=>{
  settings.style.display=settings.style.display==="block"?"none":"block";
};

add.onclick=()=>{
  const t=newText.value.replace(/\s+/g," ").trim();
  if(!t) return;

  texts.push(t);

  updateSelector();
  selector.selectedIndex=texts.length-1;
  newText.value="";
  showText();
};

/* ===== TIMER ===== */
function startClock(){
  clockInterval=setInterval(()=>{
    let seconds=Math.floor((Date.now()-startTime)/1000);
    timeBox.textContent="Время: "+seconds+" сек";
  },200);
}

function stopClock(){
  clearInterval(clockInterval);
}

/* ===== DISAPPEAR ===== */
function disappearWord(){
  if(!running || i>=spans.length) return;

  for(let j=i;j<spans.length;j++){
    spans[j].textContent=formatWord(originalWords[j]);
  }

  if(paint.checked) spans[i].style.color="white";
  else spans[i].style.display="none";

  i++;
  wordsBox.textContent="Слов: "+(spans.length-i);

  if(i<spans.length){
    timer=setTimeout(disappearWord, speeds[speed.value]*1000);
  }else{
    running=false;
    stopClock();
  }
}

/* ===== CONTROLS ===== */
startBtn.onclick=()=>{
  stopBtn.onclick();
  running=true;
  i=0;
  startTime=Date.now();
  startClock();
  disappearWord();
};

stopBtn.onclick=()=>{
  running=false;
  clearTimeout(timer);
  stopClock();
};

repeatBtn.onclick=()=>{
  stopBtn.onclick();
  showText();
  running=true;
  startTime=Date.now();
  startClock();
  disappearWord();
};

/* ===== SPEED ===== */
speed.oninput=()=>{
  if(running){
    clearTimeout(timer);
    timer=setTimeout(disappearWord, speeds[speed.value]*1000);
  }
};

/* ===== INIT ===== */
loadTexts();

</script>
</body>
</html>
