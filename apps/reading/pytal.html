<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Анаграммы</title>

<style>
:root{
--blue:#1E3F8A;
--orange:#FF6A00;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.app{
width:720px;
max-width:95vw;
background:#fff;
border-radius:14px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
position:relative;
}

.header{
background:var(--blue);
color:white;
text-align:center;
padding:14px 10px;
font-style:italic;
font-size:20px;
}

.content{
padding:18px;
}

/* TOGGLE */
.toggleBtn{
width:100%;
margin-bottom:10px;
background:#ddd;
color:#333;
border:none;
padding:8px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

/* PANELS */
.settings{
background:#f7f7f7;
padding:12px;
border-radius:10px;
margin-bottom:12px;
display:block;
}

.hidden{
display:none;
}

/* LABELS */
label{
display:block;
margin-top:12px;
font-size:14px;
color:#333;
}

/* INPUTS */
select, input[type=range]{
width:100%;
margin-top:6px;
}

textarea{
width:100%;
height:140px;
resize:none;
padding:10px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
outline:none;
margin-bottom:12px;
}

textarea:focus{
border-color:var(--orange);
}

input[type=range]{
accent-color:var(--orange);
}

/* BUTTONS */
.btns{
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:var(--orange);
color:#fff;
font-weight:600;
cursor:pointer;
box-shadow:0 4px 0 #c24f00;
}

button:active{
transform:translateY(3px);
box-shadow:0 1px 0 #c24f00;
}

/* OUTPUT — УВЕЛИЧЕН */
#out{
margin-top:16px;
padding:18px;
border:1px solid #e5e5e5;
border-radius:12px;
min-height:120px;
white-space:pre-wrap;
background:#fafafa;
font-size:26px;   /* 🔥 увеличено */
line-height:1.5;
}

/* FOOTER */
.footer{
position:absolute;
bottom:6px;
right:10px;
font-size:11px;
color:#999;
}

/* DESKTOP */
@media (min-width:1024px){

.app{
width:980px;
}

#out{
font-size:30px; /* 🔥 ещё крупнее на ПК */
min-height:160px;
}

textarea{
height:170px;
}
}

/* MOBILE */
@media (max-width:600px){

.header{
font-size:18px;
}

#out{
font-size:20px;
}
}
</style>
</head>

<body>

<div class="app">

<div class="header">Анаграммы</div>

<div class="content">

<button class="toggleBtn" onclick="toggleUI()">⚙ Показать / скрыть настройки</button>

<!-- SETTINGS + INPUT WRAPPER -->
<div id="panel">

<div class="settings" id="settings">

<label>Режим</label>
<select id="mode">
<option value="words">Слова</option>
<option value="text">Текст</option>
</select>

<label>Сложность <span id="lvl">2</span></label>
<input type="range" id="level" min="1" max="5" value="2">

<label>Шрифт</label>
<select id="font">
<option value="Arial">Arial</option>
<option value="Georgia">Georgia</option>
<option value="Courier New">Courier New</option>
<option value="Verdana">Verdana</option>
</select>

<label>Размер текста <span id="sz">18</span></label>
<input type="range" id="size" min="12" max="36" value="18">

</div>

<textarea id="input">кот
дом
лес
мама пошла в школу</textarea>

</div>

<div class="btns">
<button onclick="generate()">Сгенерировать</button>
<button onclick="regenerate()">Повтор</button>
</div>

<div id="out"></div>

</div>

<div class="footer">© verner</div>

</div>

<script>

const out = document.getElementById("out")

function toggleUI(){
document.getElementById("panel").classList.toggle("hidden")
}

document.getElementById("level").oninput = e=>{
document.getElementById("lvl").textContent = e.target.value
}

document.getElementById("size").oninput = e=>{
document.getElementById("sz").textContent = e.target.value
out.style.fontSize = e.target.value + "px"
}

document.getElementById("font").onchange = e=>{
out.style.fontFamily = e.target.value
}

function swap(arr,i,j){
let t=arr[i];arr[i]=arr[j];arr[j]=t
}

function transform(word, level){

word = (word || "").trim()
if(word.length < 2) return word

let arr = word.split("")

if(level == 1){
swap(arr,0,arr.length-1)
}
else if(level == 2){
for(let i=0;i<arr.length-1;i+=2){
swap(arr,i,i+1)
}
}
else if(level == 3){
for(let i=0;i<Math.floor(arr.length/2);i++){
swap(arr,i,arr.length-1-i)
}
}
else if(level == 4){
for(let i=1;i<arr.length-1;i++){
swap(arr,i,(i+1)%arr.length)
}
}
else if(level == 5){
arr.reverse()
}

return arr.join("")
}

function generate(){

let mode = document.getElementById("mode").value
let level = +document.getElementById("level").value
let input = document.getElementById("input").value || ""

let result = ""

if(mode === "words"){

let lines = input.split("\n").map(w=>w.trim()).filter(Boolean)

for(let w of lines){
result += transform(w,level) + "\n"
}

}

else if(mode === "text"){

let parts = input.split(/(\s+|[.,!?;:—])/)

for(let p of parts){

if(/^[А-Яа-яЁё]+$/.test(p)){
result += transform(p,level)
}else{
result += p
}

}

}

out.textContent = result
}

function regenerate(){
generate()
}

</script>

</body>
</html>
