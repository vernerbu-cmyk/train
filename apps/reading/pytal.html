<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Лидерген</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ece9e6,#ffffff);
font-family:Arial;
}

.container{
width:650px;
background:#fff;
padding:24px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
box-sizing:border-box;
}

h3{
margin-top:0;
text-align:center;
font-size:22px;
}

.controls{
background:#f7f7f7;
padding:12px;
border-radius:10px;
margin-bottom:15px;
}

label{
font-size:14px;
display:block;
margin-top:10px;
color:#333;
}

select, input[type=range]{
width:100%;
margin-top:5px;
}

textarea{
width:100%;
height:120px;
font-size:16px;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
margin-top:10px;
resize:none;
}

.buttons{
display:flex;
gap:10px;
margin-top:12px;
}

button{
flex:1;
padding:10px;
border:0;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:translateY(-1px);
}

.primary{
background:#ff7a18;
color:white;
}

.secondary{
background:#eee;
color:#333;
}

#out{
margin-top:18px;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
min-height:90px;
white-space:pre-wrap;
background:#fafafa;
font-size:18px;
}

.small{
font-size:12px;
color:#666;
text-align:center;
margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

<h3>🧠 Лидерген</h3>

<div class="controls">

<label>Режим</label>
<select id="mode">
<option value="words">Слова</option>
<option value="text">Текст</option>
</select>

<label>Сложность <span id="lvl">2</span></label>
<input type="range" id="level" min="1" max="5" value="2">

<label>Шрифт</label>
<select id="font">
<option value="Arial">Arial</option>
<option value="Georgia">Georgia</option>
<option value="Courier New">Courier New</option>
<option value="Verdana">Verdana</option>
</select>

<label>Размер текста <span id="sz">18</span></label>
<input type="range" id="size" min="12" max="36" value="18">

</div>

<textarea id="input">кот
дом
лес
мама пошла в школу</textarea>

<div class="buttons">
<button class="primary" onclick="generate()">Сгенерировать</button>
<button class="secondary" onclick="regenerate()">Повтор</button>
</div>

<div id="out"></div>

<div class="small">анаграмм-тренажёр</div>

</div>

<script>

const out = document.getElementById("out")

document.getElementById("level").oninput = e=>{
document.getElementById("lvl").textContent = e.target.value
}

document.getElementById("size").oninput = e=>{
document.getElementById("sz").textContent = e.target.value
out.style.fontSize = e.target.value + "px"
}

document.getElementById("font").onchange = e=>{
out.style.fontFamily = e.target.value
}

function swap(arr,i,j){
let t=arr[i];arr[i]=arr[j];arr[j]=t
}

function transform(word, level){

word = (word || "").trim()
if(word.length < 2) return word

let arr = word.split("")

if(level == 1){
swap(arr,0,arr.length-1)
}

else if(level == 2){
for(let i=0;i<arr.length-1;i+=2){
swap(arr,i,i+1)
}
}

else if(level == 3){
for(let i=0;i<Math.floor(arr.length/2);i++){
swap(arr,i,arr.length-1-i)
}
}

else if(level == 4){
for(let i=1;i<arr.length-1;i++){
swap(arr,i,(i+1)%arr.length)
}
}

else if(level == 5){
arr.reverse()
}

return arr.join("")
}

function generate(){

let mode = document.getElementById("mode").value
let level = +document.getElementById("level").value
let input = document.getElementById("input").value || ""

let result = ""

if(mode === "words"){

let lines = input.split("\n").map(w=>w.trim()).filter(Boolean)

for(let w of lines){
result += transform(w,level) + "\n"
}

}

else if(mode === "text"){

let parts = input.split(/(\s+|[.,!?;:—])/)

for(let p of parts){

if(/^[А-Яа-яЁё]+$/.test(p)){
result += transform(p,level)
}else{
result += p
}

}

}

out.textContent = result
}

function regenerate(){
generate()
}

</script>

</body>
</html>
