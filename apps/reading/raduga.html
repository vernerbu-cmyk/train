<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Радуга</title>

<style>
:root{
  --blue:#1E3F8A;
  --accent:#FF6A00;
}

html,body{
  margin:0;
  height:100%;
  background:#f7f7f7;
  font-family:'Times New Roman', Times, serif;
  user-select:none;
  overflow:hidden;
}

/* ===== TOP BAR ===== */
.topbar{
  position:fixed;
  top:0; left:0; right:0;
  background:var(--blue);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:8px 10px;
  box-sizing:border-box;
}

/* TITLE */
.brand{
  color:#fff;
  font-style:italic;
  font-weight:700;
  font-size:clamp(20px,5vw,34px);
  text-align:center;
}

/* CONTROLS UNDER TITLE */
.controls{
  margin-top:6px;
  display:flex;
  flex-direction:column;
  gap:6px;
  align-items:center;
  width:100%;
}

.controls-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  align-items:center;
}

label{
  font-size:13px;
  color:#fff;
  display:flex;
  align-items:center;
  gap:4px;
  white-space:nowrap;
}

/* SLIDERS */
input[type=range]{
  width:120px;
  accent-color:var(--accent);
}

output{
  color:var(--accent);
  font-size:12px;
  min-width:45px;
}

/* ===== BUTTONS (ORANGE) ===== */
.btn{
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:6px;
  padding:6px 10px;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  box-shadow:0 4px 0 #c44f00;
  transition:0.05s;
}

.btn:active{
  transform:translateY(3px);
  box-shadow:0 1px 0 #c44f00;
}

/* ===== STAGE ===== */
#stage{
  position:absolute;
  top:150px;
  left:0;
  right:0;
  bottom:0;
  overflow:hidden;
}

/* WORD */
.word{
  position:absolute;
  font-weight:900;
  font-size:clamp(48px,10vw,100px);
  text-transform:uppercase;
  line-height:1;
  opacity:0;
  text-align:center;
}

/* HAND */
.hand{
  position:absolute;
  font-weight:700;
  font-size:clamp(48px,10vw,100px);
  line-height:1;
  color:#000;
}

/* FOOTER */
.footer{
  position:fixed;
  right:10px;
  bottom:6px;
  font-size:11px;
  color:#888;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="brand">Радуга</div>

  <div class="controls">

    <div class="controls-row">
      <label>Скорость</label>
      <input id="speed" type="range" min="0" max="14" value="4">
      <output id="speedOut">2.00s</output>

      <label><input id="handsMode" type="checkbox" checked> Руки</label>
    </div>

    <div class="controls-row">
      <label>Хлопки</label>
      <input id="clapChance" type="range" min="0" max="100" step="5" value="20">
      <output id="clapOut">20%</output>

      <button id="startButton" class="btn">Старт</button>
      <button id="stopButton" class="btn">Стоп</button>
    </div>

  </div>
</header>

<main id="stage"></main>

<div class="footer">© verner</div>

<script>
const COLORS=[
  {name:'КРАСНЫЙ',color:'red'},
  {name:'ОРАНЖЕВЫЙ',color:'#FF6A00'},
  {name:'ЖЁЛТЫЙ',color:'#FDE910'},
  {name:'ЗЕЛЁНЫЙ',color:'green'},
  {name:'ГОЛУБОЙ',color:'#00BFFF'},
  {name:'СИНИЙ',color:'blue'},
  {name:'ФИОЛЕТОВЫЙ',color:'purple'}
];

const HANDS=['Л','П','О'];

const SPEED=[
  4000,3500,3000,2500,2000,
  1750,1500,1250,1000,750,
  500,400,300,200,100
];

const stage=document.getElementById('stage');
const speed=document.getElementById('speed');
const speedOut=document.getElementById('speedOut');
const clap=document.getElementById('clapChance');
const clapOut=document.getElementById('clapOut');
const hands=document.getElementById('handsMode');
const start=document.getElementById('startButton');
const stop=document.getElementById('stopButton');

let timer=null;
let run=false;

const M=12;

function r(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

function draw(){
  stage.replaceChildren();

  const w=document.createElement('div');
  w.className='word';

  const t=document.createElement('div');

  if(Math.random()<clap.value/100){
    t.textContent='ХЛОПОК';
    t.style.color=pick(COLORS).color;
  }else{
    const c=pick(COLORS);
    t.textContent=c.name;
    t.style.color=Math.random()<0.2 ? c.color : pick(COLORS).color;
  }

  w.appendChild(t);
  stage.appendChild(w);

  const rect=w.getBoundingClientRect();
  const extra=hands.checked?rect.height:0;

  const left=r(M, stage.clientWidth-rect.width-M);
  const top=r(M, stage.clientHeight-rect.height-extra-M);

  w.style.left=left+'px';
  w.style.top=top+'px';
  w.style.opacity=1;

  if(hands.checked){
    const h=document.createElement('div');
    h.className='hand';
    h.textContent=pick(HANDS);
    h.style.left=(left+rect.width/2-20)+'px';
    h.style.top=(top+rect.height)+'px';
    stage.appendChild(h);
  }
}

function delay(){return SPEED[speed.value];}

function startFn(){
  if(run) return;
  draw();
  timer=setInterval(draw,delay());
  run=true;
}

function stopFn(){
  clearInterval(timer);
  run=false;
}

start.onclick=startFn;
stop.onclick=stopFn;

speed.oninput=()=>{
  speedOut.textContent=(SPEED[speed.value]/1000).toFixed(2)+'s';
  if(run){
    clearInterval(timer);
    timer=setInterval(draw,delay());
  }
};

clap.oninput=()=>clapOut.textContent=clap.value+'%';

window.onresize=draw;
</script>

</body>
</html>
