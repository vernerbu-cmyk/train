<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Перевертон</title>

<style>
  :root{
    --blue:#1E3F8A;
    --blue-dark:#16336f;
    --orange:#FF6A00;
  }

  body { 
    margin: 0; 
    font-family: Arial, sans-serif;
    background:#f4f6fb;
  }

  header{
    background: var(--blue);
    color:white;
    padding:10px;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  header h1{
    margin:0;
    text-align:center;
    font-style:italic;
    font-weight:600;
    font-size:20px;
  }

  #controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    justify-content:center;
  }

  textarea{
    flex:1;
    min-width:180px;
    height:80px;
    border:none;
    border-radius:8px;
    padding:8px;
    font-size:14px;
    box-sizing:border-box;
  }

  button{
    background: var(--orange);
    color:white;
    border:none;
    border-radius:8px;
    padding:10px 12px;
    cursor:pointer;
    font-size:15px;
    box-shadow:0 4px 0 #c94f00;
    transition:0.08s;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  button:active{
    transform:translateY(3px);
    box-shadow:0 1px 0 #c94f00;
  }

  .icon-rotate{
    transition: transform 0.35s ease;
  }

  .icon-rotate.active{
    transform: rotate(360deg);
  }

  select,input[type=range]{
    accent-color: var(--orange);
  }

  #output{
    margin:15px;
    background:white;
    border-radius:10px;
    padding:15px;
    min-height:120px;
    font-family:"Verdana","Segoe UI",Arial;
    font-size:48px;
    line-height:1.2;
    white-space:pre-wrap;
  }

  .sign{
    position:fixed;
    right:10px;
    bottom:6px;
    font-size:11px;
    color:#999;
  }

  @media(max-width:600px){
    #controls{
      flex-direction:column;
      align-items:stretch;
    }

    textarea, button{
      width:100%;
    }

    #output{
      font-size:28px;
    }
  }
</style>
</head>

<body>

<header>
  <h1>Перевертон</h1>

  <div id="controls">

    <textarea id="inputText" placeholder="Вставьте сюда текст..."></textarea>

    <button onclick="reverseWords()">
      <svg class="icon-rotate" id="rotateIcon" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M3 12a9 9 0 0 1 15.54-6.36" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M18 3v5h-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M21 12a9 9 0 0 1-15.54 6.36" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M6 21v-5h5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button id="hideBtn" onclick="hideInput()">Скрыть поле</button>
    <button id="showBtn" onclick="showInput()" style="display:none;">Показать поле</button>

    <select id="fontSelect" onchange="updateFont()">
      <option value="Verdana">Verdana</option>
      <option value="Segoe UI">Segoe UI</option>
      <option value="Arial">Arial</option>
      <option value="Tahoma">Tahoma</option>
      <option value="Courier New">Courier New</option>
    </select>

    <input type="range" id="fontSizeRange" min="24" max="100" value="48" onchange="updateFontSize()">

  </div>
</header>

<div id="output"></div>

<div class="sign">© verner</div>

<script>

function reverseWords(){
  const icon = document.getElementById('rotateIcon');

  icon.classList.remove('active');
  void icon.offsetWidth;
  icon.classList.add('active');

  const text = document.getElementById('inputText').value;

  const result = text.split(/(\s+)/).map(token=>{
    if(/^\s+$/.test(token)) return token;

    const m = token.match(/^([\p{L}\p{N}]+)(.*)$/u);
    if(m){
      return Array.from(m[1]).reverse().join('') + (m[2]||'');
    }
    return token;
  }).join('');

  document.getElementById('output').innerText = result;
}

function hideInput(){
  document.getElementById('inputText').style.display='none';
  document.getElementById('hideBtn').style.display='none';
  document.getElementById('showBtn').style.display='inline-block';
}

function showInput(){
  document.getElementById('inputText').style.display='block';
  document.getElementById('hideBtn').style.display='inline-block';
  document.getElementById('showBtn').style.display='none';
}

function updateFont(){
  document.getElementById('output').style.fontFamily =
    document.getElementById('fontSelect').value;
}

function updateFontSize(){
  document.getElementById('output').style.fontSize =
    document.getElementById('fontSizeRange').value + "px";
}

</script>

</body>
</html>
