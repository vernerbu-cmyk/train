<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тренажёр слов — таблицы</title>
<style>
body { font-family: Arial, sans-serif; background: #f2f2f2; padding: 20px; }
h1 { text-align: center; }
.controls { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 10px; }
textarea { width: 90%; max-width: 600px; height: 140px; resize: vertical; }
.user-words { text-align: center; margin-bottom: 12px; }
.user-words.hidden { display: none; }
.small-controls { margin-top: 6px; }
table { border-collapse: collapse; margin: 0 auto; }
td { border: 1px solid #444; padding: 12px 16px; text-align: center; cursor: pointer; user-select: none; min-width: 90px; }
td.hidden { background: #bbb; }
</style>
</head>
<body>

<h1>Тренажёр слов</h1>

<div class="controls">
  <label>Строки <input type="number" id="rows" value="5" min="1" max="10"></label>
  <label>Столбцы <input type="number" id="cols" value="5" min="1" max="10"></label>

  <label><input type="checkbox" id="s1" checked> 1 слог</label>
  <label><input type="checkbox" id="s2" checked> 2 слога</label>
  <label><input type="checkbox" id="s3" checked> 3 слога</label>
  <label><input type="checkbox" id="s4"> 4 слога</label>

  <label>Размер
    <select id="size">
      <option value="18px">18</option>
      <option value="22px" selected>22</option>
      <option value="26px">26</option>
      <option value="30px">30</option>
    </select>
  </label>

  <button onclick="generate()">Сгенерировать</button>
  <button onclick="toggleAll()">Скрыть / показать всё</button>
  <button onclick="copyTable()">Скопировать HTML</button>
  <button onclick="copyForPowerPoint()">Копировать для PowerPoint</button>
</div>

<div style="text-align:center; margin-bottom:8px;">
  <button onclick="toggleUserWords()">Скрыть / показать свои слова</button>
</div>

<div id="userWordsBlock" class="user-words">
  <textarea id="customWords" placeholder="Свои слова — по одному в строке"></textarea>
  <div class="small-controls">
    <button onclick="removeDuplicates()">Очистить дубликаты</button>
  </div>
</div>

<table id="table"></table>

<script>
/* ===== БАЗА ===== */
const builtIn = {
  1: ["дом","кот","лес","мяч","шар","стол","лист","гриб","нос","сыр","мак","сон","луг","хлеб","глаз"],
  2: ["мама","папа","рука","нога","река","лиса","вода","гора","книга","шапка","ложка","чашка","кошка","мышка","рыба","утка","заяц"],
  3: ["машина","корова","малина","собака","дорога","капуста","телега","карандаш","ворона","берёза","апельсин","самолёт"],
  4: ["паровозик","самолётик","телевизор","крокодил","пианино","библиотека","черепаха","аквариум"]
};

const vowels = "аеёиоуыэюя";
let allHidden = false;

/* ===== УТИЛИТЫ ===== */
function shuffleSafe(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function countSyllables(word){ return [...word.toLowerCase()].filter(ch=>vowels.includes(ch)).length; }

/* ===== ПОЛЬЗОВАТЕЛЬСКИЕ СЛОВА ===== */
function getCustomWordsRaw(){ return customWords.value.split("\n").map(w=>w.trim()).filter(Boolean); }
function removeDuplicates(){
  const seen=new Set(), unique=[];
  getCustomWordsRaw().forEach(w=>{ const k=w.toLowerCase(); if(!seen.has(k)){seen.add(k); unique.push(w);} });
  customWords.value = unique.join("\n");
  saveCustomWords();
}
function saveCustomWords(){ localStorage.setItem("wordsBase",customWords.value); }
function loadCustomWords(){ const saved=localStorage.getItem("wordsBase"); if(saved) customWords.value=saved; }
customWords.addEventListener("input", saveCustomWords);
function toggleUserWords(){ userWordsBlock.classList.toggle("hidden"); }

/* ===== ГЕНЕРАЦИЯ ===== */
function buildUserBase(){
  const base={1:[],2:[],3:[],4:[]};
  getCustomWordsRaw().forEach(word=>{
    const s=countSyllables(word);
    if(base[s]) base[s].push(word);
  });
  return base;
}

function generate(){
  const r=+rows.value, c=+cols.value, need=r*c;
  let pool=[]; const hasCustom=getCustomWordsRaw().length>0;
  if(hasCustom){
    const userBase=buildUserBase();
    if(s1.checked) pool.push(...userBase[1]);
    if(s2.checked) pool.push(...userBase[2]);
    if(s3.checked) pool.push(...userBase[3]);
    if(s4.checked) pool.push(...userBase[4]);
  } else {
    if(s1.checked) pool.push(...builtIn[1]);
    if(s2.checked) pool.push(...builtIn[2]);
    if(s3.checked) pool.push(...builtIn[3]);
    if(s4.checked) pool.push(...builtIn[4]);
  }

  if(pool.length<need){ alert(`Недостаточно слов: нужно ${need}, есть ${pool.length}`); return; }

  pool=shuffleSafe(pool);
  table.innerHTML="";
  table.style.fontSize=size.value;
  let idx=0;
  for(let i=0;i<r;i++){
    const tr=document.createElement("tr");
    for(let j=0;j<c;j++){
      const td=document.createElement("td");
      const word=pool[idx++];
      td.dataset.word=word;
      td.textContent=word;
      td.onclick=()=>{ td.classList.toggle("hidden"); td.textContent=td.classList.contains("hidden")?"":td.dataset.word; };
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
  allHidden=false;
}

/* ===== СКРЫТЬ / ПОКАЗАТЬ ВСЁ ===== */
function toggleAll(){
  allHidden=!allHidden;
  document.querySelectorAll("#table td").forEach(td=>{
    td.classList.toggle("hidden",allHidden);
    td.textContent=allHidden?"":td.dataset.word;
  });
}

/* ===== КОПИРОВАНИЕ ===== */
function copyTable(){
  navigator.clipboard.writeText(table.outerHTML).then(()=>alert("Таблица скопирована")).catch(()=>alert("Ошибка"));
}

/* ===== КОПИРОВАНИЕ ДЛЯ POWERPOINT ===== */
function copyForPowerPoint(){
  const rows=document.querySelectorAll("#table tr");
  let text="";
  rows.forEach(tr=>{
    const cells=tr.querySelectorAll("td");
    const line=Array.from(cells).map(td=>td.dataset.word).join("\t");
    text+=line+"\n";
  });
  navigator.clipboard.writeText(text).then(()=>alert("Таблица скопирована для PowerPoint")).catch(()=>alert("Ошибка"));
}

/* ===== СТАРТ ===== */
loadCustomWords();
generate();
</script>

</body>
</html>
