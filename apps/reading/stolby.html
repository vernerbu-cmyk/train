<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Столбики</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#fff;
}

/* =========================
   TOP BAR (NEUROX STYLE)
========================= */
.top{
  background:#1E3F8A;
  color:#fff;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  justify-content:center;
  position:sticky;
  top:0;
}

/* заголовок */
.top-title{
  width:100%;
  text-align:center;
  font-style:italic;
  font-size:22px;
  font-weight:600;
  margin-bottom:5px;
}

/* =========================
   CONTROLS
========================= */
label{
  font-size:14px;
  color:#fff;
}

input[type="range"]{
  accent-color:#FF6A00;
}

input[type="number"], select{
  border-radius:6px;
  border:none;
  padding:4px;
}

/* =========================
   BUTTONS
========================= */
button{
  background:#FF6A00;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  box-shadow:0 4px 0 #c84f00;
  cursor:pointer;
  transition:0.05s;
}

button:active{
  transform:translateY(2px);
  box-shadow:0 2px 0 #c84f00;
}

/* =========================
   WORD DISPLAY
========================= */
.word{
  margin-top:70px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  user-select:none;
  padding:10px;
}

/* =========================
   PANEL
========================= */
.panel{
  position:fixed;
  top:70px;
  left:5%;
  width:90%;
  max-width:600px;
  background:#fff;
  border:1px solid #ddd;
  padding:10px;
  display:none;
  z-index:1000;
  overflow:auto;
  max-height:80vh;
  border-radius:10px;
}

textarea{
  width:100%;
  margin-top:5px;
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
}

/* =========================
   BASE LIST
========================= */
.wordItem{
  display:flex;
  justify-content:space-between;
  padding:5px;
  border-bottom:1px solid #eee;
}

.wordText{flex:1;cursor:pointer;}

.deleteBtn{
  color:#FF6A00;
  cursor:pointer;
  font-weight:bold;
}

.levelTitle{
  margin-top:10px;
  font-weight:bold;
  color:#1E3F8A;
}

/* =========================
   HIGHLIGHT
========================= */
.highlight{
  color:#FF6A00;
  font-weight:bold;
}

/* =========================
   AUTHOR
========================= */
.author{
  position:fixed;
  right:8px;
  bottom:6px;
  font-size:11px;
  color:#aaa;
}

/* =========================
   MOBILE
========================= */
@media (max-width:600px){
  .word{
    font-size:24px;
    margin-top:60px;
  }

  .top-title{
    font-size:18px;
  }

  label{
    font-size:12px;
  }
}

/* 🔴 ДОБАВЛЕНО: кнопка назад */
.backBtn{
  position:absolute;
  left:10px;
  top:10px;
  background:#FF6A00;
  border:none;
  color:#fff;
  border-radius:8px;
  padding:6px 10px;
  box-shadow:0 3px 0 #c84f00;
  cursor:pointer;
  z-index:10;
}

.backBtn:active{
  transform:translateY(2px);
  box-shadow:0 1px 0 #c84f00;
}

</style>
</head>

<body>

<div class="top">

  <!-- 🔴 ИЗМЕНЕНО ТОЛЬКО ТУТ -->
  <button class="backBtn" onclick="smartBack()">❮</button>

  <div class="top-title">Столбики</div>

  <label>Скорость
    <input type="range" id="speed" min="0" max="10" value="0">
  </label>

  <label>Уровень
    <select id="level">
      <option value="random">Случайно</option>
      <option value="1">1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option>
      <option value="5">5</option><option value="6">6</option>
      <option value="7">7</option><option value="8">8</option>
    </select>
  </label>

  <label><input type="checkbox" id="syllables"> слоги</label>
  <label><input type="checkbox" id="highlight"> подсветка</label>
  <label><input type="checkbox" id="auto" checked> авто</label>

  <label>Размер
    <input type="number" id="fontSize" value="28" min="12" max="120">
  </label>

  <label>Шрифт
    <select id="fontFamily">
      <option value="Arial">Arial</option>
      <option value="Georgia">Georgia</option>
      <option value="Verdana">Verdana</option>
      <option value="Tahoma">Tahoma</option>
      <option value="Courier New">Courier New</option>
    </select>
  </label>

  <button id="bookBtn">📖</button>

</div>

<div class="panel" id="basePanel">

<textarea id="newWords"></textarea>

<button id="addBtn">Добавить</button>
<button id="dedupBtn">Дубликаты</button>
<button id="clearBtn">Очистить</button>

<div id="baseList"></div>

</div>

<div class="word" id="wordDisplay">Загрузка...</div>

<div class="author">© verner</div>

<script>

/* =========================
   SMART BACK (ДОБАВЛЕНО)
========================= */
function smartBack(){
  window.location.href = "index.html";
}
/* =========================
   BASE LOAD (НЕ ТРОГАЕМ ЛОГИКУ)
========================= */

let wordBase = {};

async function loadBase(){
  try{
    const url = new URL("./base.json", window.location.href).href;
    const res = await fetch(url);

    if(!res.ok) throw new Error("no json");

    wordBase = await res.json();

    if(Array.isArray(wordBase)){
      const structured = {1:[],2:[],3:[],4:[],5:[],6:[],7:[],8:[]};
      wordBase.forEach(w=>{
        let lvl = detectLevel(w);
        structured[lvl].push(w);
      });
      wordBase = structured;
    }

    show();
    restart();

  } catch(e){
    wordDisplay.textContent="Ошибка загрузки";
  }
}

loadBase();

/* ========================= */

const vowels="аеёиоуыэюя";
const speedTable = [
3000,
2200,
1600,
1100,
800,
550,
380,
250,
170,
110,
70
];
let timer;

/* =========================
   LEVELS (НЕ ТРОГАЕМ)
========================= */

function detectLevel(w){
  let word=w.trim().toLowerCase();
  let v=[...word].filter(c=>vowels.includes(c)).length;
  let len=word.length;

  if(v===1) return 1;
  if(v===2 && len<=5) return 2;
  if(v===2 && len>=6) return 3;
  if(v===3 && len<=7) return 4;
  if(v===3) return 5;
  if(v===4 && len<=9) return 6;
  if(v===4) return 7;
  if(v>=5) return 8;

  return 7;
}

/* ========================= */

function split(word){
  word=word.toLowerCase();
  let res=[],cur="";

  for(let i=0;i<word.length;i++){
    cur+=word[i];
    if(vowels.includes(word[i])){
      if(word[i+1]==="ь"){cur+=word[i+1];i++;}
      res.push(cur);
      cur="";
    }
  }

  if(cur) res[res.length-1]+=cur;

  return res;
}

/* ========================= */

function decorate(w){
  let parts=split(w);

  if(highlight.checked){
    parts=parts.map(p=>"<span class='highlight'>"+p[0]+"</span>"+p.slice(1));
  }

  return syllables.checked ? parts.join("-") : parts.join("");
}

/* ========================= */

function show(){
  let pool=[];

  if(level.value==="random"){
    for(let i=1;i<=8;i++){
      if(wordBase[i]) pool.push(...wordBase[i]);
    }
  }else{
    pool = wordBase[level.value] || [];
  }

  if(!pool.length){
    wordDisplay.textContent="—";
    return;
  }

  let w=pool[Math.floor(Math.random()*pool.length)];

  wordDisplay.innerHTML=decorate(w);
  wordDisplay.style.fontSize=fontSize.value+"px";
  wordDisplay.style.fontFamily=fontFamily.value;
}

/* ========================= */

function restart(){
  clearInterval(timer);
  if(auto.checked){
    timer=setInterval(show,speedTable[speed.value]);
  }
}

/* ========================= */

speed.oninput=restart;
level.onchange=show;
syllables.onchange=show;
highlight.onchange=show;
auto.onchange=restart;
fontSize.oninput=show;
fontFamily.onchange=show;

document.addEventListener("keydown",e=>{
  if(!auto.checked && e.code==="Space"){
    e.preventDefault();
    show();
  }
});

wordDisplay.onclick=()=>{if(!auto.checked) show();};

</script>

</body>
</html>
