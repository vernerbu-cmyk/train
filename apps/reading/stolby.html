<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Столбики</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff;
}

.top{
  background:#1E3F8A;
  color:#fff;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.top-row{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.title{
  font-style:italic;
  font-weight:600;
  font-size:22px;
}

.settings-btn{
  position:absolute;
  right:0;
  background:#FF6A00;
  color:#fff;
  border:none;
  padding:8px 10px;
  border-radius:8px;
  font-size:14px;
  box-shadow:0 3px 0 #c94f00;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  align-items:center;
}

button{
  background:#FF6A00;
  color:#fff;
  border:none;
  padding:10px 12px;
  font-size:15px;
  border-radius:8px;
  box-shadow:0 4px 0 #c94f00;
}

button:active{
  transform:translateY(2px);
  box-shadow:0 2px 0 #c94f00;
}

input[type="range"]{
  accent-color:#FF6A00;
}

.word{
  margin-top:80px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  user-select:none;
  padding:10px;
}

.panel{
  position:fixed;
  top:60px;
  left:5%;
  width:90%;
  max-width:600px;
  background:#fff;
  border:1px solid #ddd;
  padding:10px;
  display:none;
  z-index:1000;
  overflow:auto;
  max-height:80vh;
  border-radius:10px;
}

textarea,input,select{
  width:100%;
  margin-top:6px;
  font-size:16px;
  padding:8px;
  box-sizing:border-box;
  border:1px solid #ccc;
  border-radius:6px;
}

.wordItem{
  display:flex;
  justify-content:space-between;
  padding:6px;
  border-bottom:1px solid #eee;
}

.wordText{flex:1;cursor:pointer;}

.deleteBtn{color:#FF6A00;font-weight:bold;cursor:pointer;}

.levelTitle{margin-top:10px;font-weight:bold;}

.highlight{
  color:#FF6A00;
  font-weight:bold;
}

.author{
  position:fixed;
  right:8px;
  bottom:6px;
  font-size:11px;
  color:#999;
}
</style>
</head>

<body>

<div class="top">

  <div class="top-row">
    <div class="title">Столбики</div>
    <button class="settings-btn" id="toggleSettings">⚙</button>
  </div>

  <div class="controls" id="controls">

    <label>Скорость <input type="range" id="speed" min="0" max="10" value="0"></label>

    <label>Уровень
      <select id="level">
        <option value="random">Случайно</option>
        <option value="1">1</option><option value="2">2</option>
        <option value="3">3</option><option value="4">4</option>
        <option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option>
      </select>
    </label>

    <label><input type="checkbox" id="syllables"> слоги</label>
    <label><input type="checkbox" id="highlight"> подсветка</label>
    <label><input type="checkbox" id="auto" checked> авто</label>

    <label>Размер <input type="number" id="fontSize" value="28" min="12" max="120"></label>

    <button id="bookBtn">📖</button>

  </div>
</div>

<div class="panel" id="basePanel">

<textarea id="newWords"></textarea>
<textarea id="sentences"></textarea>

<button id="saveBtn">Сохранить</button>

<div id="baseList"></div>

<button id="dedupBtn">Удалить дубликаты</button>
<button id="clearBtn">Очистить</button>

</div>

<div class="word" id="wordDisplay">—</div>

<div class="author">© verner</div>

<script>

/* =========================
   📡 ЗАГРУЗКА БАЗЫ (JSON + fallback)
========================= */

let wordBase;

const defaultBase = {
1:["дом","кот","мир"],
2:["мама","рама","каша"],
3:[],
4:["собака","машина","молоко"],
5:["тетрадь","лошадь","камень"],
6:["пылесос","табурет"],
7:["обогреватель","самолёт","телевизор"],
8:["Мама мыла раму","Кот сидит на окне"]
};

async function loadBase(){
  try{
    const res = await fetch("base.json", {cache:"no-store"});
    if(!res.ok) throw new Error("no json");

    const data = await res.json();
    wordBase = data;

    console.log("База загружена с JSON");
  }catch(e){

    const local = localStorage.getItem("base");

    if(local){
      wordBase = JSON.parse(local);
      console.log("База загружена из localStorage");
    }else{
      wordBase = defaultBase;
      console.log("База загружена по умолчанию");
    }

  }

  save();
  render();
  show();
}

/* ========================= */

const vowels="аеёиоуыэюя";
const speedTable=[2000,1500,1200,1000,800,600,500,400,300,200,100];
let timer;

function save(){
  localStorage.setItem("base",JSON.stringify(wordBase));
}

/* уровни */
function detectLevel(w){
  let word=w.toLowerCase();
  let v=[...word].filter(c=>vowels.includes(c)).length;
  let len=word.length;

  if(v===1) return 1;
  if(v===2 && len<=5) return 2;
  if(v===2 && len>=6) return 3;
  if(v===3 && len>=5 && len<=7) return 4;
  if(v===3 && len>=7) return 5;
  if(v===4 && len>=7 && len<=9) return 6;
  if(v===4 && len>=9) return 7;
  if(v>=5) return 8;
  return 7;
}

/* слоги */
function split(word){
  word=word.toLowerCase();
  let res=[],cur="";
  for(let i=0;i<word.length;i++){
    cur+=word[i];
    if(vowels.includes(word[i])){
      if(word[i+1]==="ь"){cur+=word[i+1];i++;}
      res.push(cur);
      cur="";
    }
  }
  if(cur) res[res.length-1]+=cur;
  return res;
}

/* отображение */
function decorate(w){
  let parts=split(w);
  if(highlight.checked){
    parts=parts.map(p=>"<span class='highlight'>"+p[0]+"</span>"+p.slice(1));
  }
  return syllables.checked ? parts.join("-") : parts.join("");
}

function show(){
  let pool=[];
  if(level.value==="random"){
    for(let i=1;i<=7;i++) pool=pool.concat(wordBase[i]);
  }else pool=wordBase[level.value];

  if(!pool.length){wordDisplay.textContent="—";return;}

  let w=pool[Math.floor(Math.random()*pool.length)];
  wordDisplay.innerHTML=decorate(w);
  wordDisplay.style.fontSize=fontSize.value+"px";
}

function restart(){
  clearInterval(timer);
  if(auto.checked){
    timer=setInterval(show,speedTable[speed.value]);
  }
}

restart();

/* init */
loadBase();

/* controls */
speed.oninput=restart;
level.onchange=show;
syllables.onchange=show;
highlight.onchange=show;
auto.onchange=restart;
fontSize.oninput=show;

/* пробел */
document.addEventListener("keydown",e=>{
  if(!auto.checked && e.code==="Space"){
    e.preventDefault();
    show();
  }
});

/* тап */
wordDisplay.addEventListener("pointerup",()=>{
  if(!auto.checked) show();
});

/* UI toggle */
toggleSettings.onclick=()=>{
  controls.style.display =
    controls.style.display==="none" ? "flex" : "none";
};

/* база */
bookBtn.onclick=()=>{
  basePanel.style.display =
    basePanel.style.display==="block"?"none":"block";
  render();
};

function render(){
  baseList.innerHTML="";

  for(let lvl=1;lvl<=8;lvl++){
    let title=document.createElement("div");
    title.className="levelTitle";
    title.textContent="Уровень "+lvl;
    baseList.appendChild(title);

    wordBase[lvl].forEach((w,i)=>{
      let row=document.createElement("div");
      row.className="wordItem";

      let text=document.createElement("div");
      text.className="wordText";
      text.textContent=w;

      text.onclick=()=>{
        let nw=prompt("Редактировать",w);
        if(nw){
          wordBase[lvl][i]=nw.trim();
          save();
          render();
        }
      };

      let del=document.createElement("div");
      del.className="deleteBtn";
      del.textContent="✖";

      del.onclick=()=>{
        wordBase[lvl].splice(i,1);
        save();
        render();
      };

      row.appendChild(text);
      row.appendChild(del);
      baseList.appendChild(row);
    });
  }
}

/* add */
saveBtn.onclick=()=>{
  newWords.value.split("\n")
    .map(w=>w.trim())
    .filter(Boolean)
    .forEach(w=>{
      wordBase[detectLevel(w)].push(w);
    });

  save(); render(); show(); newWords.value="";
};

dedupBtn.onclick=()=>{
  for(let i=1;i<=8;i++){
    wordBase[i]=[...new Set(wordBase[i])];
  }
  save(); render();
};

clearBtn.onclick=()=>{
  if(confirm("Очистить?")){
    wordBase=JSON.parse(JSON.stringify(defaultBase));
    save(); render(); show();
  }
};

</script>

</body>
</html>
