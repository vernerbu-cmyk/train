<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ЛидерГен — тренажёр</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff;
}

/* ===== TOP BAR ===== */
.top{
  background:#f57c00;
  color:#fff;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  font-size:14px;
}

.top label{
  display:flex;
  align-items:center;
  gap:5px;
}

/* кнопка */
button{
  padding:10px;
  font-size:16px;
}

/* ===== СЛОВО ===== */
.word{
  margin-top:80px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  user-select:none;
  padding:10px;
}

/* ===== ПАНЕЛЬ ===== */
.panel{
  position:fixed;
  top:60px;
  left:5%;
  width:90%;
  max-width:600px;
  background:#fff;
  border:1px solid #ccc;
  padding:10px;
  display:none;
  z-index:1000;
  overflow:auto;
  max-height:80vh;
  border-radius:10px;
}

/* textarea / input */
textarea,input,select{
  width:100%;
  margin-top:6px;
  font-size:16px;
  padding:8px;
  box-sizing:border-box;
}

/* ===== БАЗА ===== */
.wordItem{
  display:flex;
  justify-content:space-between;
  padding:6px;
  border-bottom:1px solid #eee;
  font-size:16px;
}

.wordText{
  flex:1;
  cursor:pointer;
}

.deleteBtn{
  color:red;
  padding-left:10px;
  cursor:pointer;
  font-size:18px;
}

.levelTitle{
  margin-top:10px;
  font-weight:bold;
  font-size:16px;
}

/* ===== МОБИЛЬНЫЕ ===== */
@media (max-width:600px){

  .top{
    font-size:12px;
    gap:6px;
  }

  .word{
    font-size:24px;
    margin-top:70px;
  }

  button{
    font-size:14px;
    padding:8px;
  }

  .panel{
    left:2%;
    width:96%;
  }
}
</style>
</head>

<body>

<div class="top">

<label>Скорость <input type="range" id="speed" min="0" max="10" value="0"></label>

<label>Уровень
<select id="level">
<option value="random">Случайно</option>
<option value="1">1</option><option value="2">2</option>
<option value="3">3</option><option value="4">4</option>
<option value="5">5</option><option value="6">6</option>
<option value="7">7</option><option value="8">8</option>
</select>
</label>

<label><input type="checkbox" id="syllables"> слоги</label>
<label><input type="checkbox" id="highlight"> подсветка</label>
<label><input type="checkbox" id="auto" checked> авто</label>

<label>Размер <input type="number" id="fontSize" value="28" min="12" max="120"></label>

<button id="bookBtn">📖</button>

</div>

<div class="panel" id="basePanel">

<textarea id="newWords" placeholder="слова"></textarea>
<textarea id="sentences" placeholder="предложения"></textarea>

<button id="saveBtn">Сохранить</button>

<div id="baseList"></div>

<button id="dedupBtn">Удалить дубликаты</button>
<button id="clearBtn">Очистить</button>

</div>

<div class="word" id="wordDisplay">—</div>

<script>

let wordBase = JSON.parse(localStorage.getItem("base")) || {
1:["дом","кот","мир"],
2:["мама","рама","каша"],
3:[],
4:["собака","машина","молоко"],
5:["тетрадь","лошадь","камень"],
6:["пылесос","табурет"],
7:["обогреватель","самолёт","телевизор"],
8:["Мама мыла раму","Кот сидит на окне"]
};

const vowels="аеёиоуыэюя";
const speedTable=[2000,1500,1200,1000,800,600,500,400,300,200,100];
let timer;

function save(){
  localStorage.setItem("base",JSON.stringify(wordBase));
}

/* ===== УРОВНИ (ТВОИ ПРАВИЛА) ===== */

function detectLevel(w){
  let word=w.toLowerCase();
  let v=[...word].filter(c=>vowels.includes(c)).length;
  let len=word.length;

  if(v===1) return 1;

  if(v===2 && len<=5) return 2;
  if(v===2 && len>=6) return 3;

  if(v===3 && len>=5 && len<=7) return 4;
  if(v===3 && len>=7) return 5;

  if(v===4 && len>=7 && len<=9) return 6;
  if(v===4 && len>=9) return 7;

  if(v>=5) return 8;

  return 7;
}

/* ===== СЛОГИ ===== */

function split(word){
  word=word.toLowerCase();
  let res=[],cur="";

  for(let i=0;i<word.length;i++){
    cur+=word[i];

    if(vowels.includes(word[i])){
      if(word[i+1]==="ь"){
        cur+=word[i+1];
        i++;
      }
      res.push(cur);
      cur="";
    }
  }

  if(cur) res[res.length-1]+=cur;

  return res;
}

/* ===== ОТОБРАЖЕНИЕ ===== */

function decorate(w){
  let parts=split(w);

  if(highlight.checked){
    parts=parts.map(p=>"<span style='color:red;font-weight:bold'>"+p[0]+"</span>"+p.slice(1));
  }

  return syllables.checked ? parts.join("-") : parts.join("");
}

function show(){
  let pool=[];

  if(level.value==="random"){
    for(let i=1;i<=7;i++) pool=pool.concat(wordBase[i]);
  }else pool=wordBase[level.value];

  if(!pool.length){
    wordDisplay.textContent="—";
    return;
  }

  let w=pool[Math.floor(Math.random()*pool.length)];

  wordDisplay.innerHTML=decorate(w);
  wordDisplay.style.fontSize=fontSize.value+"px";
}

function restart(){
  clearInterval(timer);
  if(auto.checked){
    timer=setInterval(show,speedTable[speed.value]);
  }
}

restart(); show();

/* ===== УПРАВЛЕНИЕ ===== */

speed.oninput=restart;
level.onchange=show;
syllables.onchange=show;
highlight.onchange=show;
auto.onchange=restart;
fontSize.oninput=show;

/* ===== ПЕРЕКЛЮЧЕНИЕ ===== */

document.addEventListener("keydown",e=>{
  if(!auto.checked && e.code==="Space"){
    e.preventDefault();
    show();
  }
});

wordDisplay.addEventListener("pointerup",()=>{
  if(!auto.checked) show();
});

/* ===== БАЗА ===== */

bookBtn.onclick=()=>{
  basePanel.style.display=
  basePanel.style.display==="block"?"none":"block";
  render();
};

function render(){
  baseList.innerHTML="";

  for(let lvl=1;lvl<=8;lvl++){

    let title=document.createElement("div");
    title.className="levelTitle";
    title.textContent="Уровень "+lvl;
    baseList.appendChild(title);

    wordBase[lvl].forEach((w,i)=>{

      let row=document.createElement("div");
      row.className="wordItem";

      let text=document.createElement("div");
      text.className="wordText";
      text.textContent=w;

      text.onclick=()=>{
        let nw=prompt("Редактировать",w);
        if(nw){
          wordBase[lvl][i]=nw.trim();
          save();
          render();
        }
      };

      let del=document.createElement("div");
      del.className="deleteBtn";
      del.textContent="✖";

      del.onclick=()=>{
        wordBase[lvl].splice(i,1);
        save();
        render();
      };

      row.appendChild(text);
      row.appendChild(del);
      baseList.appendChild(row);
    });
  }
}

/* ===== КНОПКИ ===== */

saveBtn.onclick=()=>{
  newWords.value.split("\n")
  .map(w=>w.trim())
  .filter(Boolean)
  .forEach(w=>{
    wordBase[detectLevel(w)].push(w);
  });

  save();
  render();
  show();
  newWords.value="";
};

dedupBtn.onclick=()=>{
  for(let i=1;i<=8;i++){
    wordBase[i]=[...new Set(wordBase[i])];
  }
  save();
  render();
};

clearBtn.onclick=()=>{
  if(confirm("Очистить?")){
    wordBase={1:[],2:[],3:[],4:[],5:[],6:[],7:[],8:[]};
    save();
    render();
    show();
  }
};

</script>

</body>
</html>
