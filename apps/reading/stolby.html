<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ЛидерГен — тренажёр</title>

<style>
body{margin:0;font-family:Arial;background:#fff;}

.top{
  background:#f57c00;
  color:#fff;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

.word{
  margin-top:80px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  user-select:none;
}

.panel{
  position:fixed;
  top:60px;
  left:10%;
  width:80%;
  max-width:600px;
  background:#fff;
  border:1px solid #ccc;
  padding:10px;
  display:none;
  z-index:1000;
  overflow:auto;
  max-height:80vh;
}

textarea,input,select{width:100%;margin-top:5px;}
button{width:100%;margin-top:5px;}

.highlight{color:red;font-weight:bold;}

.wordItem{display:flex;justify-content:space-between;padding:4px;border-bottom:1px solid #eee;}
.wordText{flex:1;cursor:pointer;}
.deleteBtn{color:red;cursor:pointer;padding-left:10px;}
.levelTitle{margin-top:10px;font-weight:bold;}
</style>
</head>

<body>

<div class="top">

<label>Скорость
<input type="range" id="speed" min="0" max="10" value="0">
</label>

<label>Уровень
<select id="level">
<option value="random">Случайно</option>
<option value="1">1</option><option value="2">2</option>
<option value="3">3</option><option value="4">4</option>
<option value="5">5</option><option value="6">6</option>
<option value="7">7</option><option value="8">8</option>
</select>
</label>

<label><input type="checkbox" id="syllables"> слоги</label>
<label><input type="checkbox" id="highlight"> подсветка</label>
<label><input type="checkbox" id="auto" checked> авто</label>

<label>Размер <input type="number" id="fontSize" value="28" min="12" max="120"></label>

<label>Шрифт
<select id="fontFamily">
<option value="Arial">Arial</option>
<option value="Georgia">Georgia</option>
<option value="Verdana">Verdana</option>
<option value="Tahoma">Tahoma</option>
<option value="Courier New">Courier New</option>
</select>
</label>

<button id="bookBtn">📖</button>

</div>

<div class="panel" id="basePanel">

<textarea id="newWords" placeholder="слова (сессия)"></textarea>

<button id="addBtn">Добавить</button>
<button id="dedupBtn">Удалить дубликаты</button>
<button id="clearBtn">Очистить</button>

<div id="baseList"></div>

</div>

<div class="word" id="wordDisplay">Загрузка...</div>

<script>

let wordBase = {};
let timer = null;

const vowels = "аеёиоуыэюя";
const speedTable = [2000,1500,1200,1000,800,600,500,400,300,200,100];

/* =========================
   ЭЛЕМЕНТЫ
========================= */

const el = id => document.getElementById(id);

const levelEl = el("level");
const speedEl = el("speed");
const syllablesEl = el("syllables");
const highlightEl = el("highlight");
const autoEl = el("auto");
const fontSizeEl = el("fontSize");
const fontFamilyEl = el("fontFamily");

const wordDisplay = el("wordDisplay");
const baseList = el("baseList");
const basePanel = el("basePanel");
const newWords = el("newWords");

/* =========================
   JSON LOAD (СТАБИЛЬНЫЙ ПУТЬ)
========================= */

async function loadBase(){
  try{

    // автоматически определяем путь сайта
    const baseUrl = new URL("base.json", window.location.href);

    const res = await fetch(baseUrl.href + "?v=" + Date.now());

    wordBase = await res.json();

    cleanDuplicates(wordBase);

    show();
    restart();

  }catch(e){
    console.error(e);
    wordDisplay.textContent = "Ошибка загрузки base.json";
  }
}

loadBase();

/* =========================
   CLEAN DUPLICATES
========================= */

function cleanDuplicates(base){
  for(const lvl in base){
    const set = new Set();

    base[lvl] = base[lvl]
      .map(w => w.trim())
      .filter(w => {
        if(!w) return false;
        if(set.has(w)) return false;
        set.add(w);
        return true;
      });
  }
}

/* =========================
   LOGIC
========================= */

function detectLevel(w){
  let word = w.toLowerCase();
  let v = [...word].filter(c=>vowels.includes(c)).length;
  let len = word.length;

  if(v === 1) return 1;
  if(v === 2 && len <= 5) return 2;
  if(v === 2 && len >= 6) return 3;
  if(v === 3 && len <= 7) return 4;
  if(v === 3) return 5;
  if(v === 4 && len <= 9) return 6;
  if(v === 4) return 7;
  if(v >= 5) return 8;

  return 7;
}

/* ========================= */

function split(word){
  word = word.toLowerCase();
  let res=[],cur="";

  for(let i=0;i<word.length;i++){
    cur+=word[i];

    if(vowels.includes(word[i])){
      if(word[i+1]==="ь"){
        cur+=word[i+1];
        i++;
      }
      res.push(cur);
      cur="";
    }
  }

  if(cur) res[res.length-1]+=cur;

  return res;
}

/* ========================= */

function decorate(w){
  let parts = split(w);

  if(highlightEl.checked){
    parts = parts.map(p =>
      "<span class='highlight'>"+p[0]+"</span>"+p.slice(1)
    );
  }

  return syllablesEl.checked ? parts.join("-") : parts.join("");
}

/* ========================= */

function show(){
  let pool=[];

  if(levelEl.value==="random"){
    for(let i=1;i<=7;i++){
      if(wordBase[i]) pool.push(...wordBase[i]);
    }
  } else {
    pool = wordBase[levelEl.value] || [];
  }

  if(!pool.length){
    wordDisplay.textContent="—";
    return;
  }

  const w = pool[Math.floor(Math.random()*pool.length)];

  wordDisplay.innerHTML = decorate(w);
  wordDisplay.style.fontSize = fontSizeEl.value+"px";
  wordDisplay.style.fontFamily = fontFamilyEl.value;
}

/* ========================= */

function restart(){
  clearInterval(timer);
  if(autoEl.checked){
    timer = setInterval(show, speedTable[speedEl.value]);
  }
}

/* ========================= */

speedEl.oninput = restart;
levelEl.onchange = show;
syllablesEl.onchange = show;
highlightEl.onchange = show;
autoEl.onchange = restart;
fontSizeEl.oninput = show;
fontFamilyEl.onchange = show;

/* ========================= */

document.addEventListener("keydown",e=>{
  if(!autoEl.checked && e.code==="Space"){
    e.preventDefault();
    show();
  }
});

wordDisplay.onclick = ()=>{
  if(!autoEl.checked) show();
};

/* =========================
   EDITOR (СЕССИЯ)
========================= */

bookBtn.onclick = ()=>{
  basePanel.style.display =
    basePanel.style.display==="block"?"none":"block";
  render();
};

addBtn.onclick = ()=>{
  newWords.value.split("\n")
    .map(w=>w.trim())
    .filter(Boolean)
    .forEach(w=>{
      const lvl = detectLevel(w);
      if(!wordBase[lvl]) wordBase[lvl]=[];
      wordBase[lvl].push(w);
    });

  render();
  show();
  newWords.value="";
};

dedupBtn.onclick = ()=>{
  cleanDuplicates(wordBase);
  render();
};

clearBtn.onclick = ()=>{
  if(confirm("Очистить сессию?")){
    wordBase={1:[],2:[],3:[],4:[],5:[],6:[],7:[],8:[]};
    render();
    show();
  }
};

/* ========================= */

function render(){
  baseList.innerHTML="";

  for(let lvl=1;lvl<=8;lvl++){

    const title = document.createElement("div");
    title.className="levelTitle";
    title.textContent="Уровень "+lvl;
    baseList.appendChild(title);

    (wordBase[lvl]||[]).forEach((w,i)=>{

      const row=document.createElement("div");
      row.className="wordItem";

      const text=document.createElement("div");
      text.className="wordText";
      text.textContent=w;

      text.onclick=()=>{
        const nw=prompt("Редактировать",w);
        if(nw){
          wordBase[lvl][i]=nw.trim();
          render();
          show();
        }
      };

      const del=document.createElement("div");
      del.className="deleteBtn";
      del.textContent="✖";

      del.onclick=()=>{
        wordBase[lvl].splice(i,1);
        render();
        show();
      };

      row.appendChild(text);
      row.appendChild(del);
      baseList.appendChild(row);
    });
  }
}

</script>

</body>
</html>
