<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ЛидерГен — тренажёр</title>

<style>
body{margin:0;font-family:Arial;background:#fff;}

.top{
  background:#f57c00;
  color:#fff;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

.word{
  margin-top:80px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  user-select:none;
}

.panel{
  position:fixed;
  top:60px;
  left:10%;
  width:80%;
  max-width:600px;
  background:#fff;
  border:1px solid #ccc;
  padding:10px;
  display:none;
  z-index:1000;
  overflow:auto;
  max-height:80vh;
}

textarea,input,select{width:100%;margin-top:5px;}
button{width:100%;margin-top:5px;}

.highlight{color:red;font-weight:bold;}

.wordItem{display:flex;justify-content:space-between;padding:4px;border-bottom:1px solid #eee;}
.wordText{flex:1;cursor:pointer;}
.deleteBtn{color:red;cursor:pointer;padding-left:10px;}
.levelTitle{margin-top:10px;font-weight:bold;}
</style>
</head>

<body>

<div class="top">

<label>Скорость
<input type="range" id="speed" min="0" max="10" value="0">
</label>

<label>Уровень
<select id="level">
<option value="random">Случайно</option>
<option value="1">1</option><option value="2">2</option>
<option value="3">3</option><option value="4">4</option>
<option value="5">5</option><option value="6">6</option>
<option value="7">7</option><option value="8">8</option>
</select>
</label>

<label><input type="checkbox" id="syllables"> слоги</label>
<label><input type="checkbox" id="highlight"> подсветка</label>
<label><input type="checkbox" id="auto" checked> авто</label>

<label>Размер
<input type="number" id="fontSize" value="28" min="12" max="120">
</label>

<label>Шрифт
<select id="fontFamily">
<option value="Arial">Arial</option>
<option value="Georgia">Georgia</option>
<option value="Verdana">Verdana</option>
<option value="Tahoma">Tahoma</option>
<option value="Courier New">Courier New</option>
</select>
</label>

<button id="bookBtn">📖</button>

</div>

<div class="panel" id="basePanel">

<textarea id="newWords" placeholder="слова (только для сессии)"></textarea>

<button id="addBtn">Добавить</button>
<button id="dedupBtn">Удалить дубликаты</button>
<button id="clearBtn">Очистить</button>

<div id="baseList"></div>

</div>

<div class="word" id="wordDisplay">Загрузка...</div>

<script>

let wordBase = {};

const vowels = "аеёиоуыэюя";
const speedTable = [2000,1500,1200,1000,800,600,500,400,300,200,100];
let timer;

/* =========================
   ЗАГРУЗКА JSON (СПИСОК → УРОВНИ)
========================= */

async function loadBase(){
  try {

    const res = await fetch("https://vernerbu-cmyk.github.io/train/base.json");

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const list = await res.json();

    wordBase = {
      1:[],2:[],3:[],4:[],
      5:[],6:[],7:[],8:[]
    };

    if(Array.isArray(list)){
      list.forEach(w=>{
        let lvl = detectLevel(w);
        if(wordBase[lvl]) wordBase[lvl].push(w);
      });
    }

    cleanDuplicates();

    show();
    restart();

  } catch(e){
    console.error(e);
    wordDisplay.textContent = "Ошибка загрузки";
  }
}

loadBase();

/* ========================= */

function detectLevel(w){
  let word = (w || "").toLowerCase();
  let v = [...word].filter(c=>vowels.includes(c)).length;
  let len = word.length;

  if(v === 1) return 1;
  if(v === 2 && len <= 5) return 2;
  if(v === 2 && len >= 6) return 3;
  if(v === 3 && len <= 7) return 4;
  if(v === 3 && len > 7) return 5;
  if(v === 4) return 6;
  if(v >= 5) return 7;

  return 8;
}

/* ========================= */

function cleanDuplicates(){
  for(let k in wordBase){
    wordBase[k] = [...new Set(wordBase[k] || [])];
  }
}

/* ========================= */

function show(){
  let pool = [];

  if(level.value === "random"){
    for(let i=1;i<=8;i++){
      if(wordBase[i]) pool.push(...wordBase[i]);
    }
  } else {
    pool = wordBase[level.value] || [];
  }

  if(pool.length === 0){
    wordDisplay.textContent = "—";
    return;
  }

  let w = pool[Math.floor(Math.random()*pool.length)];

  if(!w){
    wordDisplay.textContent = "—";
    return;
  }

  wordDisplay.textContent = w;
  wordDisplay.style.fontSize = fontSize.value + "px";
  wordDisplay.style.fontFamily = fontFamily.value;
}

/* ========================= */

function restart(){
  clearInterval(timer);
  if(auto.checked){
    timer = setInterval(show, speedTable[speed.value]);
  }
}

/* ========================= */

speed.oninput = restart;
level.onchange = show;
fontSize.oninput = show;
fontFamily.onchange = show;
auto.onchange = restart;

document.addEventListener("keydown",e=>{
  if(!auto.checked && e.code==="Space"){
    e.preventDefault();
    show();
  }
});

wordDisplay.onclick = ()=>{
  if(!auto.checked) show();
};

</script>

</body>
</html>
