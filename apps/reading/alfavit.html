<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>–Ы–Є–і–µ—А–У–µ–љ вАФ –Ґ—А–µ–љ–∞–ґ—С—А –С—Г–Ї–≤</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background-color: white;
  transition: background-color 0.3s ease;
  font-family: Arial, sans-serif;
}

.header {
  position: absolute;
  top: 0;
  width: 100%;
  background-color: orange;
  color: white;
  text-align: center;
  padding: 12px 0;
  font-size: 1.6em;
  font-weight: bold;
}

#lettersContainer {
  text-align: center;
}

.letters {
  font-weight: bold;
  transition: opacity 0.35s ease, transform 0.35s ease, color 0.3s ease;
  line-height: 1.1;
}

#letter1 { font-size: 6rem; }
#letter2 { font-size: 5rem; }
#letter3 { font-size: 4rem; display: none; }

.controls {
  position: absolute;
  bottom: 40px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

input[type="range"] {
  width: 220px;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  background-color: orange;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background-color: darkorange;
}
</style>
</head>

<body>

<div class="header">–Ы–Є–і–µ—А–У–µ–љ</div>

<div id="lettersContainer">
  <div id="letter1" class="letters"></div>
  <div id="letter2" class="letters"></div>
  <div id="letter3" class="letters"></div>
</div>

<div class="controls">
  <label>–°–Ї–Њ—А–Њ—Б—В—М:</label>
  <input id="speed" type="range" min="0" max="10" step="1" value="4">
  <button id="startBtn">–°—В–∞—А—В</button>
  <button id="stopBtn">–°—В–Њ–њ</button>
  <button id="rainbowBtn">–†–∞–і—Г–≥–∞</button>
  <button id="legsBtn">–Э–Њ–≥–Є</button>
</div>

<script>
const letter1 = document.getElementById("letter1");
const letter2 = document.getElementById("letter2");
const letter3 = document.getElementById("letter3");

const speedSlider = document.getElementById("speed");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const rainbowBtn = document.getElementById("rainbowBtn");
const legsBtn = document.getElementById("legsBtn");

const alphabet = "–Р–С–Т–У–Ф–Х–Б–Ц–Ч–Ш–Щ–Ъ–Ы–Ь–Э–Ю–Я–†–°–Ґ–£–§–•–¶–І–®–©–Ђ–≠–Ѓ–ѓ"
  .split("")
  .filter(ch => ch !== "–ђ" && ch !== "–™");

const group = ["–Ы", "–Я", "–Ю"];
const legsLetters = ["–Ы", "–Я"];

const rainbowColors = [
  "#FF0000", // –Ї—А–∞—Б–љ—Л–є
  "#FF7F00", // –Њ—А–∞–љ–ґ–µ–≤—Л–є
  "#FFFF00", // –ґ—С–ї—В—Л–є
  "#00FF00", // –Ј–µ–ї—С–љ—Л–є
  "#00BFFF", // –≥–Њ–ї—Г–±–Њ–є
  "#0000FF", // —Б–Є–љ–Є–є
  "#8A2BE2"  // —Д–Є–Њ–ї–µ—В–Њ–≤—Л–є
];

// –§–Є–Ї—Б–Є—А–Њ–≤–∞–љ–љ—Л–µ —Б–Ї–Њ—А–Њ—Б—В–Є (–≤ —Б–µ–Ї—Г–љ–і–∞—Е)
const speedSteps = [2, 1.75, 1.5, 1.25, 1, 0.75, 0.5, 0.4, 0.3, 0.2, 0.1];

let intervalId = null;
let rainbow = false;
let legsMode = false;
let rainbowIndex = 0;

function getIntervalTime() {
  // —Б–ї–µ–≤–∞ –Љ–µ–і–ї–µ–љ–љ–Њ (2 —Б–µ–Ї), —Б–њ—А–∞–≤–∞ –±—Л—Б—В—А–Њ (0.1 —Б–µ–Ї)
  return speedSteps[speedSlider.value] * 1000;
}

function getContrastColor(bgColor) {
  const hex = bgColor.replace("#","");
  const r = parseInt(hex.substring(0,2),16);
  const g = parseInt(hex.substring(2,4),16);
  const b = parseInt(hex.substring(4,6),16);
  const brightness = (r*299 + g*587 + b*114)/1000;
  return brightness > 128 ? "black" : "white";
}

function showRandomLetters() {

  const l1 = alphabet[Math.floor(Math.random() * alphabet.length)];
  const l2 = group[Math.floor(Math.random() * group.length)];
  const l3 = legsLetters[Math.floor(Math.random() * legsLetters.length)];

  letter1.style.opacity = 0;
  letter2.style.opacity = 0;
  letter3.style.opacity = 0;

  letter1.style.transform = "scale(0.85)";
  letter2.style.transform = "scale(0.85)";
  letter3.style.transform = "scale(0.85)";

  setTimeout(() => {

    letter1.textContent = l1;
    letter2.textContent = l2;

    if (legsMode) {
      letter3.textContent = l3;
      letter3.style.display = "block";
    } else {
      letter3.style.display = "none";
    }

    letter1.style.opacity = 1;
    letter2.style.opacity = 1;
    letter3.style.opacity = 1;

    letter1.style.transform = "scale(1)";
    letter2.style.transform = "scale(1)";
    letter3.style.transform = "scale(1)";

    if (rainbow) {
      const bg = rainbowColors[rainbowIndex];
      document.body.style.backgroundColor = bg;

      const contrast = getContrastColor(bg);
      letter1.style.color = contrast;
      letter2.style.color = contrast;
      letter3.style.color = contrast;

      rainbowIndex = (rainbowIndex + 1) % rainbowColors.length;
    } else {
      document.body.style.backgroundColor = "white";
      letter1.style.color = "black";
      letter2.style.color = "black";
      letter3.style.color = "black";
    }

  }, 80);
}

startBtn.addEventListener("click", () => {
  if (intervalId) clearInterval(intervalId);
  showRandomLetters();
  intervalId = setInterval(showRandomLetters, getIntervalTime());
});

stopBtn.addEventListener("click", () => {
  clearInterval(intervalId);
  intervalId = null;
});

rainbowBtn.addEventListener("click", () => {
  rainbow = !rainbow;
  rainbowBtn.style.backgroundColor = rainbow ? "green" : "orange";
});

legsBtn.addEventListener("click", () => {
  legsMode = !legsMode;
  legsBtn.style.backgroundColor = legsMode ? "green" : "orange";
  letter3.style.display = legsMode ? "block" : "none";
});

speedSlider.addEventListener("input", () => {
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = setInterval(showRandomLetters, getIntervalTime());
  }
});
</script>

</body>
</html>
