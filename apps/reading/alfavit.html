<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Алфавит</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: white;
  font-family: Arial, sans-serif;
}

/* HEADER */
.header {
  position: absolute;
  top: 0;
  width: 100%;
  height: 56px;
  background: #1E3F8A;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1.8em;
  font-weight: bold;
  font-style: italic;
}

/* СТОЛБИК */
#column {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-weight: bold;

  transform: translateX(-50%);
  transition: opacity 0.2s ease;
}

#l1 { font-size: 6rem; }
#l2 { font-size: 5rem; }
#l3 { font-size: 4rem; display: none; }

/* CONTROLS */
.controls {
  position: absolute;
  bottom: 50px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

input[type="range"] {
  width: 220px;
  accent-color: #FF6A00;
}

/* BUTTONS */
button {
  padding: 10px 18px;
  border: none;
  border-radius: 14px;
  background: #1E3F8A;
  color: white;
  font-weight: bold;
  cursor: pointer;

  box-shadow:
    0 4px 0 #142a5e,
    0 6px 12px rgba(0,0,0,0.25);

  transition: all 0.12s ease;
}

button.pressed {
  transform: translateY(3px);
  box-shadow: none;
  filter: brightness(0.9);
}

/* AUTHOR */
.footer {
  position: absolute;
  right: 10px;
  bottom: 8px;
  font-size: 10px;
  color: rgba(0,0,0,0.25);
}
</style>
</head>

<body>

<div class="header">Алфавит</div>

<div id="column">
  <div id="l1"></div>
  <div id="l2"></div>
  <div id="l3"></div>
</div>

<div class="controls">
  <input id="speed" type="range" min="0" max="10" value="4">
  <button id="start">Старт</button>
  <button id="stop">Стоп</button>
  <button id="rainbow">Радуга</button>
  <button id="legs">Ноги</button>
</div>

<div class="footer">© verner</div>

<script>
const column=document.getElementById("column");
const l1=document.getElementById("l1");
const l2=document.getElementById("l2");
const l3=document.getElementById("l3");

const speed=document.getElementById("speed");

const HEADER_HEIGHT = 56;

const alphabet="АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЫЭЮЯ".split("")
  .filter(x=>!["Ь","Ъ","Й"].includes(x));

const group=["Л","П","О"];
const legsArr=["Л","П"];

const steps=[
2000,1750,1500,1250,1000,
900,800,700,600,500,
400
];

/* 🌈 теперь радуга = цвета букв */
const rainbowColors=[
"#FF0000","#FF7F00","#FFFF00",
"#00FF00","#00BFFF","#0000FF","#8A2BE2"
];

let timer=null;
let rainbow=false;
let legs=false;
let colorIndex=0;

/* кнопки press */
function bind(btn){
  btn.addEventListener("mousedown",()=>btn.classList.add("pressed"));
  btn.addEventListener("mouseup",()=>btn.classList.remove("pressed"));
  btn.addEventListener("mouseleave",()=>btn.classList.remove("pressed"));

  btn.addEventListener("touchstart",()=>btn.classList.add("pressed"));
  btn.addEventListener("touchend",()=>btn.classList.remove("pressed"));
}

bind(document.getElementById("start"));
bind(document.getElementById("stop"));
bind(document.getElementById("rainbow"));
bind(document.getElementById("legs"));

function rand(a){
  return a[Math.floor(Math.random()*a.length)];
}

function randPos(){
  const minY = HEADER_HEIGHT + 20;
  const maxY = window.innerHeight - 220;

  column.style.left = (Math.random()*(window.innerWidth-100))+"px";
  column.style.top  = (Math.random()*(maxY-minY)+minY)+"px";
}

/* 🎯 ВАЖНО: теперь меняем ЦВЕТ БУКВ */
function applyRainbowColor(){
  const color = rainbowColors[colorIndex];
  l1.style.color = color;
  l2.style.color = color;
  l3.style.color = color;

  colorIndex = (colorIndex + 1) % rainbowColors.length;
}

function update(){

  column.style.opacity=0;

  setTimeout(()=>{

    l1.textContent=rand(alphabet);
    l2.textContent=rand(group);

    if(legs){
      l3.textContent=rand(legsArr);
      l3.style.display="block";
    } else {
      l3.style.display="none";
    }

    randPos();

    column.style.opacity=1;

    if(rainbow){
      applyRainbowColor();
    } else {
      l1.style.color="black";
      l2.style.color="black";
      l3.style.color="black";
    }

  },60);
}

/* start */
document.getElementById("start").onclick=()=>{
  clearInterval(timer);
  update();
  timer=setInterval(update,steps[speed.value]);
};

/* stop */
document.getElementById("stop").onclick=()=>{
  clearInterval(timer);
};

/* rainbow */
document.getElementById("rainbow").onclick=()=>{
  rainbow=!rainbow;
};

/* legs */
document.getElementById("legs").onclick=()=>{
  legs=!legs;
};

/* speed */
speed.oninput=()=>{
  if(timer){
    clearInterval(timer);
    timer=setInterval(update,steps[speed.value]);
  }
};
</script>

<script src="./nav.js"></script>

</body>
</html>
