<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>СКОРОЧТЕНИЕ</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.topbar{
background:#b80000;
color:#fff;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

h1{
font-size:16px;
margin:0 10px 0 0;
}

.box{
margin:15px;
background:#fff;
padding:20px;
min-height:250px;
white-space:pre-wrap;
border-radius:8px;
font-size:18px;
line-height:1.8;
letter-spacing:0.3px;
word-spacing:1px;
position:relative;
overflow:hidden;
}

/* OVERLAY (помехи) */
#overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:5;
}

/* ШТОРКА */
.shutter-line{
background:white;
width:100%;
margin-bottom:4px;
}

/* ВЕРХ / НИЗ */
.top-mask,
.bottom-mask{
position:absolute;
left:0;
width:100%;
background:white;
z-index:10;
}

.top-mask{ top:0; }
.bottom-mask{ bottom:0; }

.hidden{display:none;}

textarea{
width:200px;
height:60px;
}
</style>
</head>

<body>

<div class="topbar">
<h1>СКОРОЧТЕНИЕ</h1>

<select id="mode">
<option value="none">Без помех</option>
<option value="tilt">Наклон</option>
<option value="curtain">Шторка</option>
<option value="topcut">Без верха</option>
<option value="bottomcut">Без низа</option>
</select>

<select id="fontFamily">
<option>Arial</option>
<option>Georgia</option>
<option>Times New Roman</option>
<option>Verdana</option>
<option>Courier New</option>
</select>

<input type="range" id="fontSize" min="14" max="40" value="18">

<label>Наклон <input type="range" id="tilt" min="0" max="40" value="10"></label>

<label>Интенсивность <input type="range" id="intensity" min="1" max="10" value="5"></label>

<textarea id="input">Загрузка текста...</textarea>

<button id="save">Сохранить</button>
<button id="edit">Редактировать</button>
<button id="del">Удалить</button>

<select id="saved"></select>
</div>

<div id="out" class="box">
<div id="overlay"></div>
</div>

<script>

let input = document.getElementById("input");
let out = document.getElementById("out");
let overlay = document.getElementById("overlay");

let mode = document.getElementById("mode");
let fontSize = document.getElementById("fontSize");
let fontFamily = document.getElementById("fontFamily");
let tilt = document.getElementById("tilt");
let intensity = document.getElementById("intensity");

let saved = document.getElementById("saved");

let data = JSON.parse(localStorage.getItem("texts") || "[]");

/* ================= JSON ================= */
fetch("texts.json")
.then(r=>r.json())
.then(json=>{
if(Array.isArray(json)){
json.forEach(t=>{
if(!data.includes(t)) data.push(t);
});
localStorage.setItem("texts",JSON.stringify(data));
updateList();
render();
}
}).catch(()=>{});

/* ================= LIST ================= */
function updateList(){
saved.innerHTML="";
data.forEach((t,i)=>{
let o=document.createElement("option");
o.value=i;
o.textContent="Текст "+(i+1);
saved.appendChild(o);
});
}
updateList();

/* ================= EFFECT ENGINE ================= */
function applyNoise(type){

overlay.innerHTML="";

/* RESET */
out.style.transform="none";

/* ===== НАКЛОН ===== */
if(type==="tilt"){
let angle = Number(tilt.value);

out.innerHTML = input.value.split("").map(c=>{
let a = Math.random()*angle*2 - angle;
return `<span style="display:inline-block;transform:rotate(${a}deg)">${c}</span>`;
}).join("");

return;
}

/* ===== ШТОРКА ===== */
if(type==="curtain"){
let lines = Number(intensity.value) * 4;

for(let i=0;i<lines;i++){
let div=document.createElement("div");
div.className="shutter-line";
div.style.height = (2 + intensity.value*0.8) + "px";
overlay.appendChild(div);
}
return;
}

/* ===== ВЕРХ ===== */
if(type==="topcut"){
let h = intensity.value * 8;

let top=document.createElement("div");
top.className="top-mask";
top.style.height = h+"px";

overlay.appendChild(top);
return;
}

/* ===== НИЗ ===== */
if(type==="bottomcut"){
let h = intensity.value * 8;

let bottom=document.createElement("div");
bottom.className="bottom-mask";
bottom.style.height = h+"px";

overlay.appendChild(bottom);
return;
}
}

/* ================= RENDER ================= */
function render(){

out.style.fontSize = fontSize.value+"px";
out.style.fontFamily = fontFamily.value;

out.innerHTML = input.value;

applyNoise(mode.value);
}

/* ================= EVENTS ================= */
input.oninput=render;
mode.onchange=render;
fontSize.oninput=render;
fontFamily.onchange=render;
tilt.oninput=render;
intensity.oninput=render;

/* ================= SAVE ================= */
document.getElementById("save").onclick=()=>{
let t=input.value.trim();
if(!t) return;
if(!data.includes(t)){
data.push(t);
localStorage.setItem("texts",JSON.stringify(data));
updateList();
}
};

/* ================= LOAD ================= */
saved.onchange=()=>{
let i=saved.value;
if(i!==""){
input.value=data[i];
render();
}
};

/* ================= EDIT ================= */
document.getElementById("edit").onclick=()=>{
let i=saved.value;
if(i==="") return;
input.value=data[i];
render();
};

/* ================= DELETE ================= */
document.getElementById("del").onclick=()=>{
let i=saved.value;
if(i==="") return;
data.splice(i,1);
localStorage.setItem("texts",JSON.stringify(data));
updateList();
render();
};

render();

</script>

</body>
</html>
