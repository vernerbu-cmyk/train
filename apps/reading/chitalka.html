<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Скорочтение +</title>

<style>
:root{
    --blue:#1E3F8A;
    --accent:#FF6A00;
}

body{
    margin:0;
    font-family:Arial;
    background:#f4f6fb;
}

/* ===== HEADER ===== */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:var(--blue);
    color:white;
    padding:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    box-sizing:border-box;
    z-index:1000;
}

header h1{
    width:100%;
    text-align:center;
    font-style:italic;
    margin:0;
    font-size:20px;
}

/* inputs */
textarea{
    width:100%;
    height:70px;
}

button{
    background:#2f5fb3;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

input[type="range"]{
    accent-color:var(--accent);
}

/* ===== TEXT ===== */
#textContainer{
    margin:220px 10px 40px;
    padding:16px;
    background:white;
    border-radius:10px;
    min-height:320px;
    line-height:1.6;
    position:relative;
    font-size:28px;
}

/* ===== EFFECTS ===== */
.flip{ transform:rotate(180deg); }

.shutter::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(
        to right,
        transparent 0,
        transparent var(--visible-width),
        white var(--visible-width),
        white calc(var(--visible-width) + var(--hide-width))
    );
}

.mask-top span,
.mask-bottom span{ position:relative; }

.mask-top span::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:var(--mask-percent);
    background:white;
}

.mask-bottom span::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:var(--mask-percent);
    background:white;
}

.hidden{ display:none; }

/* verner */
#verner{
    position:fixed;
    right:10px;
    bottom:6px;
    font-size:11px;
    opacity:0.5;
}

/* mobile */
@media(max-width:600px){
    #textContainer{
        margin:240px 10px 60px;
        font-size:18px;
    }
}
</style>
</head>

<body>

<header>

<h1>Скорочтение +</h1>

<textarea id="textInput">Жили-были дед да баба.</textarea>

<input type="file" id="fileInput">

<label>
Сохранённые:
<select id="savedTexts">
<option value="">— выбрать —</option>
</select>
</label>

<label>
Шрифт:
<select id="fontSelect">
<option value="Arial">Arial</option>
<option value="Georgia">Georgia</option>
<option value="Verdana">Verdana</option>
<option value="Times New Roman">Times</option>
<option value="Courier New, monospace">Mono</option>
</select>
</label>

<label>
Размер:
<input type="range" id="fontSize" min="16" max="60" value="28">
</label>

<label>
Помеха:
<select id="noiseSelect">
<option value="none">Без</option>
<option value="tilt">Наклон</option>
<option value="maskTop">Верх</option>
<option value="maskBottom">Низ</option>
<option value="flip">180</option>
<option value="shutter">Шторка</option>
</select>
</label>

<div id="intensityBlock" class="hidden">
<input type="range" id="intensity" min="10" max="80" value="50">
</div>

<div id="tiltBlock" class="hidden">
<input type="range" id="tiltStrength" min="0" max="45" value="15">
</div>

</header>

<div id="textContainer"></div>
<div id="verner">verner</div>

<script>

const textInput=document.getElementById("textInput");
const container=document.getElementById("textContainer");

const noiseSelect=document.getElementById("noiseSelect");
const intensity=document.getElementById("intensity");
const tilt=document.getElementById("tiltStrength");

const intensityBlock=document.getElementById("intensityBlock");
const tiltBlock=document.getElementById("tiltBlock");

const fontSize=document.getElementById("fontSize");
const fontSelect=document.getElementById("fontSelect");

const savedSelect=document.getElementById("savedTexts");

let savedTexts=[];

/* ===== JSON ===== */
fetch("texts.json")
.then(r=>r.json())
.then(data=>{
    if(Array.isArray(data)){
        savedTexts=data;
        updateSavedSelect();
    }
});

function updateSavedSelect(){
    savedSelect.innerHTML='<option value="">— выбрать —</option>';
    savedTexts.forEach((t,i)=>{
        let opt=document.createElement("option");
        opt.value=i;
        opt.textContent=t.length>30 ? t.slice(0,30)+"..." : t;
        savedSelect.appendChild(opt);
    });
}

savedSelect.onchange=function(){
    if(!this.value) return;
    textInput.value=savedTexts[this.value];
    renderText();
};

/* ===== CONTROL VISIBILITY FIX ===== */
function updateControls(){

intensityBlock.classList.add("hidden");
tiltBlock.classList.add("hidden");

if(noiseSelect.value==="tilt"){
    tiltBlock.classList.remove("hidden");
}

if(["maskTop","maskBottom","shutter"].includes(noiseSelect.value)){
    intensityBlock.classList.remove("hidden");
}
}

/* ===== RENDER ===== */
function renderText(){

let text=textInput.value;
let e=noiseSelect.value;

container.style.fontFamily=fontSelect.value;
container.style.fontSize=fontSize.value+"px";

container.className="";
container.innerHTML=text;

if(e==="none"){
container.innerText=text;
return;
}

if(e==="tilt"){
container.innerHTML=wrap(text);
container.querySelectorAll("span").forEach(s=>{
let a=Math.random()*tilt.value*2-tilt.value;
s.style.display="inline-block";
s.style.transform=`rotate(${a}deg)`;
});
}

if(e==="maskTop"){
container.innerHTML=wrap(text);
container.style.setProperty("--mask-percent",intensity.value+"%");
container.classList.add("mask-top");
}

if(e==="maskBottom"){
container.innerHTML=wrap(text);
container.style.setProperty("--mask-percent",intensity.value+"%");
container.classList.add("mask-bottom");
}

if(e==="flip"){
container.innerText=text;
container.classList.add("flip");
}

if(e==="shutter"){
container.innerText=text;

let v=40-intensity.value/2;
let h=4+intensity.value/5;

container.style.setProperty("--visible-width",v+"px");
container.style.setProperty("--hide-width",h+"px");

container.classList.add("shutter");
}
}

function wrap(t){
return t.split("").map(c=>c===" "||c==="\n"?c:`<span>${c}</span>`).join("");
}

/* ===== EVENTS FIX ===== */
textInput.oninput=renderText;

noiseSelect.onchange=function(){
updateControls();
renderText();
};

intensity.oninput=renderText;
tilt.oninput=renderText;

fontSize.oninput=renderText;
fontSelect.onchange=renderText;

/* INIT */
updateControls();
renderText();

</script>

</body>
</html>
