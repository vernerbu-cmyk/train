<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>СКОРОЧТЕНИЕ</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* верхняя панель */
.topbar{
background:#d40000;
color:#fff;
padding:10px;
display:flex;
flex-wrap:wrap;
align-items:center;
gap:10px;
position:sticky;
top:0;
z-index:1000;
}

h1{
font-size:16px;
margin:0 10px 0 0;
}

/* текст */
.box{
margin:15px;
background:#fff;
padding:20px;
min-height:250px;
white-space:pre-wrap;
border-radius:8px;
font-size:18px;
line-height:1.8;
letter-spacing:0.3px;
word-spacing:1px;
}

/* эффекты */
.curtain{
background: repeating-linear-gradient(
90deg,
rgba(0,0,0,0.15) 0px,
rgba(0,0,0,0.15) 2px,
transparent 2px,
transparent 6px
);
}

.topcut{
clip-path: inset(50% 0 0 0);
}

.bottomcut{
clip-path: inset(0 0 50% 0);
}

.skew span{
display:inline-block;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="topbar">
<h1>СКОРОЧТЕНИЕ</h1>

<select id="mode">
<option value="none">Без помех</option>
<option value="tilt">Наклон</option>
<option value="curtain">Шторка</option>
<option value="topcut">Без верха</option>
<option value="bottomcut">Без низа</option>
</select>

<label>
Шрифт
<select id="fontFamily">
<option value="Arial">Arial</option>
<option value="Georgia">Georgia</option>
<option value="Times New Roman">Times</option>
<option value="Verdana">Verdana</option>
<option value="Courier New">Courier</option>
</select>
</label>

<label>
Размер
<input type="range" id="fontSize" min="14" max="40" value="18">
</label>

<textarea id="input" rows="2" style="width:200px;">
Это тестовый текст для проверки тренажёра скорочтения.
Можно менять режимы и смотреть как он читается.
</textarea>

<button id="save">Сохранить</button>
<button id="edit">Редактировать</button>
<button id="del">Удалить</button>

<select id="saved"></select>
</div>

<div id="out" class="box"></div>

<script>

let input = document.getElementById("input");
let out = document.getElementById("out");

let mode = document.getElementById("mode");
let fontSize = document.getElementById("fontSize");
let fontFamily = document.getElementById("fontFamily");

let saved = document.getElementById("saved");

let data = JSON.parse(localStorage.getItem("texts") || "[]");

function updateList(){
saved.innerHTML = "";
data.forEach((t,i)=>{
let o = document.createElement("option");
o.value = i;
o.textContent = "Текст " + (i+1);
saved.appendChild(o);
});
}
updateList();

/* формат текста */
function formatText(t){
return t.split("\n").map(l=>l||" ").join("\n");
}

/* рендер */
function render(){

let text = input.value;
let m = mode.value;

out.className = "box";

if(m==="curtain") out.classList.add("curtain");
if(m==="topcut") out.classList.add("topcut");
if(m==="bottomcut") out.classList.add("bottomcut");

if(m==="tilt"){
text = text.split("").map(c=>{
let a = Math.random()*20-10;
return `<span style="display:inline-block;transform:rotate(${a}deg)">${c}</span>`;
}).join("");
}

out.style.fontSize = fontSize.value + "px";
out.style.fontFamily = fontFamily.value;

out.innerHTML = text;
}

/* события */
input.oninput = render;
mode.onchange = render;
fontSize.oninput = render;
fontFamily.onchange = render;

/* сохранение */
document.getElementById("save").onclick = ()=>{
let t = input.value.trim();
if(!t) return;
if(!data.includes(t)){
data.push(t);
localStorage.setItem("texts",JSON.stringify(data));
updateList();
}
};

/* загрузка */
saved.onchange = ()=>{
input.value = data[saved.value];
render();
};

/* редакт */
document.getElementById("edit").onclick = ()=>{
let i = saved.value;
if(i==="") return;
input.value = data[i];
render();
};

/* удаление */
document.getElementById("del").onclick = ()=>{
let i = saved.value;
if(i==="") return;
data.splice(i,1);
localStorage.setItem("texts",JSON.stringify(data));
updateList();
render();
};

render();

</script>

</body>
</html>
