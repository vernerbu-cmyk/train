<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Скорочтение</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.topbar{
background:#d40000;
color:#fff;
padding:10px;
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.topbar h1{
font-size:16px;
margin:0;
margin-right:10px;
}

button, select, input{
padding:5px;
}

.container{
padding:15px;
}

.textbox{
background:white;
padding:15px;
min-height:200px;
white-space:pre-wrap;
font-size:18px;
border:1px solid #ccc;
}

.hidden{
display:none;
}

.curtain{
background: repeating-linear-gradient(
90deg,
rgba(0,0,0,0.25) 0px,
rgba(0,0,0,0.25) 2px,
transparent 2px,
transparent 6px
);
}

.topcut{
clip-path: inset(50% 0 0 0);
}

.bottomcut{
clip-path: inset(0 0 50% 0);
}

.skew span{
display:inline-block;
}
</style>
</head>

<body>

<div class="topbar">
<h1>СКОРОЧТЕНИЕ</h1>

<select id="mode">
<option value="none">Без помех</option>
<option value="tilt">Наклон</option>
<option value="curtain">Шторка</option>
<option value="topcut">Без верха</option>
<option value="bottomcut">Без низа</option>
</select>

<label>Шрифт <input type="range" id="fontSize" min="14" max="40" value="18"></label>

<label class="hidden" id="intensityBox">
Интенсивность <input type="range" id="intensity" min="1" max="10" value="5">
</label>

<label class="hidden" id="tiltBox">
Наклон <input type="range" id="tilt" min="0" max="30" value="10">
</label>

<button id="toggleInput">Скрыть/показать ввод</button>

<select id="savedList"></select>
<button id="saveBtn">Сохранить</button>
<button id="editBtn">Редактировать</button>
<button id="deleteBtn">Удалить</button>
</div>

<div class="container">

<textarea id="inputText" style="width:100%;height:120px;">
Это тестовый текст для проверки работы тренажёра скорочтения. Здесь можно менять режимы, сохранять тексты и тестировать помехи восприятия.
</textarea>

<br><br>

<div id="output" class="textbox"></div>

</div>

<script>

let input = document.getElementById("inputText");
let output = document.getElementById("output");

let mode = document.getElementById("mode");
let fontSize = document.getElementById("fontSize");

let intensity = document.getElementById("intensity");
let tilt = document.getElementById("tilt");

let intensityBox = document.getElementById("intensityBox");
let tiltBox = document.getElementById("tiltBox");

let savedList = document.getElementById("savedList");

/* =========================
   ДАННЫЕ
========================= */

let savedTexts = JSON.parse(localStorage.getItem("texts") || "[]");
let jsonTexts = [];

/* =========================
   ЗАГРУЗКА JSON
========================= */

async function loadJSON(){
  try{
    const url = "./texts.json?v=" + Date.now();

    const res = await fetch(url, { cache: "no-store" });
    if(!res.ok) return;

    jsonTexts = await res.json();
    if(!Array.isArray(jsonTexts)) jsonTexts = [];

    updateSavedList();

  } catch(e){
    console.log("JSON не загружен (не критично)");
  }
}

loadJSON();

/* =========================
   ОБЪЕДИНЕНИЕ
========================= */

function getAllTexts(){
  return [...jsonTexts, ...savedTexts];
}

/* ========================= */

function updateSavedList(){
  savedList.innerHTML = "";

  let all = getAllTexts();

  all.forEach((t,i)=>{
    let opt = document.createElement("option");
    opt.value = i;
    opt.textContent = "Текст " + (i+1);
    savedList.appendChild(opt);
  });
}

/* ========================= */

function render(){
let text = input.value;
output.className = "textbox";

let m = mode.value;

if(m==="curtain"){
output.classList.add("curtain");
}

if(m==="topcut"){
output.classList.add("topcut");
}

if(m==="bottomcut"){
output.classList.add("bottomcut");
}

if(m==="tilt"){
let deg = tilt.value;
text = text.split("").map(c=>{
return `<span style="transform:rotate(${(Math.random()*deg*2-deg)}deg)">${c}</span>`;
}).join("");
}

output.style.fontSize = fontSize.value + "px";
output.innerHTML = text;
}

/* ========================= */

mode.onchange = ()=>{
intensityBox.classList.add("hidden");
tiltBox.classList.add("hidden");

if(mode.value==="tilt") tiltBox.classList.remove("hidden");
if(["curtain","topcut","bottomcut"].includes(mode.value)) intensityBox.classList.remove("hidden");

render();
};

input.oninput = render;
fontSize.oninput = render;
tilt.oninput = render;
intensity.oninput = render;

/* ========================= */

document.getElementById("toggleInput").onclick = ()=>{
input.classList.toggle("hidden");
};

/* ========================= */

document.getElementById("saveBtn").onclick = ()=>{
let t = input.value.trim();
if(!t) return;

if(!savedTexts.includes(t)){
savedTexts.push(t);
localStorage.setItem("texts", JSON.stringify(savedTexts));
updateSavedList();
}
};

document.getElementById("deleteBtn").onclick = ()=>{
let i = savedList.value;
if(i==="") return;

let all = getAllTexts();
let target = all[i];

savedTexts = savedTexts.filter(x => x !== target);

localStorage.setItem("texts", JSON.stringify(savedTexts));
updateSavedList();
};

document.getElementById("editBtn").onclick = ()=>{
let i = savedList.value;
if(i==="") return;

let all = getAllTexts();
input.value = all[i];
render();
};

savedList.onchange = ()=>{
let i = savedList.value;
if(i!==""){
let all = getAllTexts();
input.value = all[i];
render();
}
};

/* ========================= */

render();

</script>

</body>
</html>
