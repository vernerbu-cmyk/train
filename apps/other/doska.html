<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Доска</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  touch-action:none;
}

#panel{
  position:fixed;
  top:10px;
  left:10px;
  background:rgba(0,0,0,.8);
  color:#fff;
  padding:10px;
  border-radius:10px;
  z-index:1000;
}

#clothCursor,#hlCursor{
  position:absolute;
  pointer-events:none;
  display:none;
  z-index:2000;
}

#clothCursor{
  border-radius:50%;
  background:#ddd;
  opacity:.8;
}

#hlCursor{
  background:rgba(255,255,0,.4);
  border-radius:4px;
}
</style>
</head>
<body>

<div id="panel">
  Инструмент:<br>
  <select id="tool">
    <option value="highlighter">Текстовыделитель</option>
    <option value="pen">Ручка</option>
    <option value="chalk">Мел</option>
    <option value="cloth">Тряпка</option>
  </select><br>

  Цвет:<br>
  <input type="color" id="color" value="#ffff00"><br>

  Размер:<br>
  <input type="range" id="size" min="10" max="80" value="40"><br>

  <button onclick="clearAll()">Очистить</button>
</div>

<canvas id="c"></canvas>

<div id="clothCursor"></div>
<div id="hlCursor"></div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

const cloth=document.getElementById("clothCursor");
const hl=document.getElementById("hlCursor");

let drawing=false;
let last=null;

function resize(){
  c.width=innerWidth;
  c.height=innerHeight;
}
resize();
addEventListener("resize",resize);

function pos(e){
  const r=c.getBoundingClientRect();
  if(e.touches){
    return {
      x:e.touches[0].clientX-r.left,
      y:e.touches[0].clientY-r.top
    };
  }
  return {x:e.clientX-r.left,y:e.clientY-r.top};
}

function start(e){
  e.preventDefault();
  drawing=true;
  last=pos(e);
}

function stop(){
  drawing=false;
  last=null;
  ctx.beginPath();
}

function move(e){
  const p=pos(e);
  const tool=toolSelect.value;
  const size=parseInt(sizeInput.value);
  const color=colorInput.value;

  updateCursor(p);

  if(!drawing) return;

  if(!last) last=p;

  if(tool==="pen"){
    ctx.globalAlpha=1;
    ctx.strokeStyle=color;
    ctx.lineWidth=size/6;
    ctx.lineCap="round";

    ctx.beginPath();
    ctx.moveTo(last.x,last.y);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
  }

  if(tool==="highlighter"){
    ctx.globalAlpha=0.3;
    ctx.strokeStyle=color;
    ctx.lineWidth=size/2;
    ctx.lineCap="butt";

    ctx.beginPath();
    ctx.moveTo(last.x,last.y);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
  }

  if(tool==="chalk"){
    ctx.globalAlpha=0.3;
    ctx.strokeStyle=color;
    ctx.lineWidth=size;
    ctx.lineCap="round";

    ctx.beginPath();
    ctx.moveTo(last.x,last.y);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
  }

  if(tool==="cloth"){
    ctx.globalCompositeOperation="destination-out";
    ctx.beginPath();
    ctx.arc(p.x,p.y,size/2,0,Math.PI*2);
    ctx.fill();
    ctx.globalCompositeOperation="source-over";
  }

  last=p;
}

function updateCursor(p){
  const tool=toolSelect.value;
  const size=parseInt(sizeInput.value);

  cloth.style.display="none";
  hl.style.display="none";

  if(tool==="cloth"){
    cloth.style.display="block";
    cloth.style.width=size+"px";
    cloth.style.height=size+"px";
    cloth.style.left=(p.x-size/2)+"px";
    cloth.style.top=(p.y-size/2)+"px";
  }

  if(tool==="highlighter"){
    hl.style.display="block";
    hl.style.width=size+"px";
    hl.style.height=(size/3)+"px";
    hl.style.left=(p.x-size/2)+"px";
    hl.style.top=(p.y-size/6)+"px";
  }
}

function clearAll(){
  ctx.clearRect(0,0,c.width,c.height);
}

const toolSelect=document.getElementById("tool");
const colorInput=document.getElementById("color");
const sizeInput=document.getElementById("size");

c.addEventListener("mousedown",start);
c.addEventListener("mousemove",move);
c.addEventListener("mouseup",stop);
c.addEventListener("mouseleave",stop);

c.addEventListener("touchstart",start,{passive:false});
c.addEventListener("touchmove",move,{passive:false});
c.addEventListener("touchend",stop);
</script>

</body>
</html>
