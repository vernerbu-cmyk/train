<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мобильная доска</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:Arial;
  background:#fff;
}

/* canvas */
canvas{
  position:absolute;
  top:0;
  left:0;
  touch-action:none;
}

/* панель */
#panel{
  position:fixed;
  top:10px;
  left:10px;
  background:rgba(0,0,0,.85);
  color:#fff;
  padding:12px;
  border-radius:12px;
  z-index:1000;
  width:220px;
}

#panel select,
#panel input,
#panel button{
  width:100%;
  margin:5px 0;
  font-size:14px;
}

/* мобилка */
@media (max-width:600px){
  #panel{
    width:160px;
    font-size:12px;
    padding:10px;
  }

  #panel button{
    padding:8px;
  }
}

/* курсоры */
#clothCursor,#hlCursor{
  position:absolute;
  pointer-events:none;
  z-index:2000;
  display:none;
}

#clothCursor{
  border-radius:50%;
  background:#ddd;
  opacity:.8;
}

#hlCursor{
  background:rgba(255,255,0,.35);
  border-radius:4px;
}
</style>
</head>

<body>

<div id="panel">
  Инструмент:
  <select id="tool">
    <option value="highlighter">Текстовыделитель</option>
    <option value="pen">Ручка</option>
    <option value="chalk">Мел</option>
    <option value="cloth">Тряпка</option>
  </select>

  Цвет:
  <input type="color" id="color" value="#ffff00">

  Размер:
  <input type="range" id="size" min="10" max="80" value="40">

  <button onclick="clearAll()">Очистить</button>
</div>

<canvas id="c"></canvas>

<div id="clothCursor"></div>
<div id="hlCursor"></div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

const cloth=document.getElementById("clothCursor");
const hl=document.getElementById("hlCursor");

let drawing=false;
let last=null;

/* DPI FIX (ВАЖНО для мобилок) */
function resize(){
  const dpr = window.devicePixelRatio || 1;

  c.width = innerWidth * dpr;
  c.height = innerHeight * dpr;

  c.style.width = innerWidth + "px";
  c.style.height = innerHeight + "px";

  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
addEventListener("resize",resize);

/* координаты */
function pos(e){
  const r=c.getBoundingClientRect();
  return {
    x:e.clientX - r.left,
    y:e.clientY - r.top
  };
}

/* start */
c.addEventListener("pointerdown",(e)=>{
  drawing=true;
  last=pos(e);
  c.setPointerCapture(e.pointerId);
});

/* move */
c.addEventListener("pointermove",(e)=>{
  const p=pos(e);

  updateCursor(p);

  if(!drawing) return;

  const tool=toolSelect.value;
  const size=parseInt(sizeInput.value);
  const color=colorInput.value;

  if(!last) last=p;

  if(tool==="highlighter"){
    ctx.globalAlpha=0.3;
    ctx.strokeStyle=color;
    ctx.lineWidth=size/2;
    ctx.lineCap="butt";

    ctx.beginPath();
    ctx.moveTo(last.x,last.y);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
  }

  if(tool==="pen"){
    ctx.globalAlpha=1;
    ctx.strokeStyle=color;
    ctx.lineWidth=size/6;
    ctx.lineCap="round";

    ctx.beginPath();
    ctx.moveTo(last.x,last.y);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
  }

  if(tool==="chalk"){
    ctx.globalAlpha=0.3;
    ctx.strokeStyle=color;
    ctx.lineWidth=size;
    ctx.lineCap="round";

    ctx.beginPath();
    ctx.moveTo(last.x,last.y);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
  }

  if(tool==="cloth"){
    ctx.globalCompositeOperation="destination-out";
    ctx.beginPath();
    ctx.arc(p.x,p.y,size/2,0,Math.PI*2);
    ctx.fill();
    ctx.globalCompositeOperation="source-over";
  }

  last=p;
});

/* stop */
c.addEventListener("pointerup",()=>{
  drawing=false;
  last=null;
});

c.addEventListener("pointercancel",()=>{
  drawing=false;
  last=null;
});

/* курсор */
function updateCursor(p){
  const tool=toolSelect.value;
  const size=parseInt(sizeInput.value);

  cloth.style.display="none";
  hl.style.display="none";

  if(tool==="cloth"){
    cloth.style.display="block";
    cloth.style.width=size+"px";
    cloth.style.height=size+"px";
    cloth.style.left=(p.x-size/2)+"px";
    cloth.style.top=(p.y-size/2)+"px";
  }

  if(tool==="highlighter"){
    hl.style.display="block";
    hl.style.width=size+"px";
    hl.style.height=(size/3)+"px";
    hl.style.left=(p.x-size/2)+"px";
    hl.style.top=(p.y-size/6)+"px";
  }
}

/* очистка */
function clearAll(){
  ctx.clearRect(0,0,c.width,c.height);
}

/* controls */
const toolSelect=document.getElementById("tool");
const colorInput=document.getElementById("color");
const sizeInput=document.getElementById("size");
</script>

</body>
</html>
