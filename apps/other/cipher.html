<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIFR TRAINER v21</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:#fff;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:520px;
    padding:16px;
}

.card{
    margin-top:14px;
    background:#111827;
    padding:16px;
    border-radius:16px;
    text-align:center;
}

/* ===== HINT ===== */

.hintGrid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

.hintItem{
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:12px;
    padding:10px;
}

.hintLetter{opacity:0.7;font-size:14px;}
.hintSymbol{font-size:26px;margin-top:4px;}

/* ===== CODE ===== */

.code{
    font-size:42px;
    letter-spacing:10px;
    margin:16px 0;
    color:#22d3ee;
}

/* ===== BUTTONS ===== */

button{
    width:100%;
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
}

.correct{color:#22c55e;}
.wrong{color:#ef4444;}

/* ===== DRAWER ===== */

#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:10;
}

#drawer{
    position:fixed;
    top:0;
    right:-380px;
    width:340px;
    height:100%;
    background:linear-gradient(180deg,#0b1220,#0f172a);
    padding:16px;
    overflow:auto;
    transition:0.25s ease;
    z-index:11;
    box-shadow:-12px 0 40px rgba(0,0,0,0.6);
}

/* таблица */
.cipherGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.cipherItem{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

.cipherLetter{opacity:0.7;font-size:13px;}
.cipherSymbol{font-size:20px;color:#22d3ee;}

.label{
    font-size:12px;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div id="hint"></div>

<div class="label">🔐 Шифр</div>
<div id="cipherWord" class="code"></div>

<div id="options"></div>

<div id="result"></div>

<button onclick="toggleDrawer()">📊 Таблица шифра</button>

</div>

</div>

<!-- DRAWER -->
<div id="overlay" onclick="toggleDrawer()"></div>

<div id="drawer">
<div style="font-size:16px;margin-bottom:10px;color:#93c5fd;">
📊 Буква → Символ
</div>

<div id="cipherTable"></div>
</div>

<script>

/* =========================
   CORE DATA (FALLBACK SAFE)
========================= */

const alphabet =
"АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";

const symbols=[
"●","○","■","□","▲","△","▼","▽",
"◆","◇","★","☆","♥","♦","♣","♠",
"⬤","◯","▣","▢","▰","▱","◼","◻",
"▮","▯","+","×","÷","=","≠","∞","√","π"
];

const key = Object.fromEntries(
alphabet.split("").map((l,i)=>[l,symbols[i]])
);

/* =========================
   STATE (SAFE FALLBACK)
========================= */

let words = ["КОТ","ШКОЛА","САМОЛЕТ"]; // fallback ALWAYS
let current = "";
let open = false;

/* =========================
   OPTIONAL JSON LOAD (SAFE)
========================= */

async function loadWords(){

try{
    const res = await fetch("words.json");

    if(res.ok){
        const data = await res.json();
        if(data.words && data.words.length){
            words = data.words;
        }
    }

}catch(e){
    console.warn("JSON not loaded, using fallback words");
}

/* игра стартует ВСЕГДА */
newTask();

}

/* =========================
   DRAWER (UNBREAKABLE)
========================= */

function toggleDrawer(){

open = !open;

const drawer = document.getElementById("drawer");
const overlay = document.getElementById("overlay");

if(drawer){
    drawer.style.right = open ? "0" : "-380px";
}

if(overlay){
    overlay.style.display = open ? "block" : "none";
}

/* таблица ВСЕГДА строится заново */
renderTable();
}

/* =========================
   TABLE (ALWAYS SAFE)
========================= */

function renderTable(){

const el = document.getElementById("cipherTable");

if(!el){
    return;
}

el.innerHTML =
`<div class="cipherGrid">
${alphabet.split("").map(l=>`
<div class="cipherItem">
    <div class="cipherLetter">${l}</div>
    <div class="cipherSymbol">${key[l] || "?"}</div>
</div>
`).join("")}
</div>`;
}

/* =========================
   ENCODE
========================= */

function encode(word){
return word.split("").map(l=>key[l] || "?").join(" ");
}

/* =========================
   HINT
========================= */

function buildHint(word){

let correct = word.split("").map(l=>({l,s:key[l]}));

let noise = alphabet.split("")
.filter(l=>!word.includes(l))
.sort(()=>Math.random()-0.5)
.slice(0,word.length)
.map(l=>({l,s:key[l]}));

let mix = correct.concat(noise)
.sort(()=>Math.random()-0.5);

document.getElementById("hint").innerHTML =
`<div class="hintGrid">
${mix.map(i=>`
<div class="hintItem">
<div class="hintLetter">${i.l}</div>
<div class="hintSymbol">${i.s}</div>
</div>
`).join("")}
</div>`;
}

/* =========================
   GAME CORE
========================= */

function newTask(){

if(!words.length) return;

current = words[Math.floor(Math.random()*words.length)];

buildHint(current);

document.getElementById("cipherWord").innerText = "";

setTimeout(()=>{

document.getElementById("cipherWord").innerText =
encode(current);

let opts = [current,"ТОК","МОД","ЛОС"]
.sort(()=>Math.random()-0.5);

document.getElementById("options").innerHTML =
opts.map(o=>`<button onclick="check('${o}')">${o}</button>`).join("");

},900);

document.getElementById("result").innerText="";
}

/* =========================
   CHECK
========================= */

function check(ans){

let res = document.getElementById("result");

res.innerText = (ans===current) ? "✔ Верно" : "✖ Ошибка";
res.className = (ans===current) ? "correct" : "wrong";

setTimeout(newTask,700);
}

/* =========================
   START (CRASH-PROOF)
========================= */

loadWords();

</script>

</body>
</html>
