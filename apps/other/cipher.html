<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIFR TRAINER v23</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:#fff;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:520px;
    padding:16px;
}

.card{
    margin-top:14px;
    background:#111827;
    padding:16px;
    border-radius:16px;
    text-align:center;
}

#hint{
    font-size:15px;
    color:#93c5fd;
    margin-bottom:10px;
}

.code{
    font-size:42px;
    letter-spacing:10px;
    margin:18px 0;
    color:#22d3ee;
    min-height:54px;
}

button{
    width:100%;
    margin-top:8px;
    padding:11px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:#fff;
    font-size:15px;
}

button:active{
    transform:scale(0.99);
}

#debug{
    position:fixed;
    left:10px;
    right:10px;
    bottom:10px;
    background:#0f172a;
    border:1px solid rgba(255,255,255,.08);
    border-radius:10px;
    padding:10px;
    font-size:12px;
    max-height:160px;
    overflow:auto;
    z-index:50;
}

.ok{color:#22c55e;}
.err{color:#ef4444;}
.warn{color:#facc15;}

/* drawer */
#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:90;
}

#drawer{
    position:fixed;
    top:0;
    right:-380px;
    width:340px;
    height:100%;
    background:linear-gradient(180deg,#0b1220,#111827);
    transition:.25s ease;
    z-index:100;
    overflow:auto;
    padding:16px;
    box-sizing:border-box;
}

.drawerTitle{
    font-size:18px;
    color:#93c5fd;
    margin-bottom:12px;
}

.cipherGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.cipherItem{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.06);
    border-radius:12px;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.cipherLetter{
    opacity:.75;
    font-size:13px;
}

.cipherSymbol{
    font-size:22px;
    color:#22d3ee;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div id="hint">🔄 загрузка слов...</div>

<div class="code" id="cipherWord"></div>

<button onclick="newTask()">🔁 Новое слово</button>
<button onclick="toggleDrawer()">📊 Таблица шифра</button>

</div>
</div>

<div id="overlay" onclick="toggleDrawer()"></div>

<div id="drawer">
<div class="drawerTitle">📊 Буква → Символ</div>
<div id="cipherTable"></div>
</div>

<div id="debug"></div>

<script>
/* =========================
   DEBUG
========================= */
const debugLog=[];

function log(msg,type="ok"){
    debugLog.push({msg,type});
    renderDebug();
    console.log(msg);
}

function renderDebug(){
    const el=document.getElementById("debug");
    el.innerHTML="<b>DEBUG</b><br>"+debugLog.slice(-12).map(x=>
        `<div class="${x.type}">${x.msg}</div>`
    ).join("");
}

/* =========================
   DATA
========================= */
const alphabet="АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";

const symbols=[
"●","○","■","□","▲","△","▼","▽",
"◆","◇","★","☆","♥","♦","♣","♠",
"⬤","◯","▣","▢","▰","▱","◼","◻",
"▮","▯","+","×","÷","=","≠","∞"
];

const key={};

alphabet.split("").forEach((letter,i)=>{
    key[letter]=symbols[i];
});

let words=["КОТ","ДОМ","ЛЕС"];
let currentWord="";
let drawerOpen=false;

/* =========================
   JSON LOADER
   ТВОЙ ФОРМАТ = МАССИВ []
========================= */
async function loadWords(){

log("LOAD words.json","warn");

try{
    const res = await fetch("words.json?v="+Date.now());

    if(!res.ok){
        throw new Error("HTTP "+res.status);
    }

    const data = await res.json();

    /* ожидаем массив строк */
    if(!Array.isArray(data)){
        throw new Error("JSON не массив");
    }

    words = data
        .filter(x=>typeof x==="string" && x.trim()!=="")
        .map(x=>normalizeWord(x));

    if(!words.length){
        throw new Error("пустой список");
    }

    log("WORDS LOADED: "+words.length,"ok");

}catch(e){

    log("JSON FAIL → fallback","err");

    words=["КОТ","ДОМ","ЛЕС","ШКОЛА"];
}

newTask();
}

/* =========================
   NORMALIZE
========================= */
function normalizeWord(word){

return word
    .trim()
    .toUpperCase()
    .replace(/Ё/g,"Е");
}

/* =========================
   GAME
========================= */
function newTask(){

if(!words.length) return;

currentWord =
words[Math.floor(Math.random()*words.length)];

document.getElementById("cipherWord").innerText =
encode(currentWord);

document.getElementById("hint").innerText =
"Слов загружено: "+words.length;
}

function encode(word){

return word
.split("")
.map(ch=>key[ch] || "?")
.join(" ");
}

/* =========================
   DRAWER
========================= */
function toggleDrawer(){

drawerOpen=!drawerOpen;

document.getElementById("drawer").style.right =
drawerOpen ? "0" : "-380px";

document.getElementById("overlay").style.display =
drawerOpen ? "block" : "none";

if(drawerOpen){
    renderTable();
}
}

function renderTable(){

const el=document.getElementById("cipherTable");

el.innerHTML=
`<div class="cipherGrid">
${alphabet.split("").map(letter=>`
<div class="cipherItem">
<div class="cipherLetter">${letter}</div>
<div class="cipherSymbol">${key[letter]}</div>
</div>
`).join("")}
</div>`;
}

/* =========================
   START
========================= */
window.addEventListener("load",loadWords);
</script>

</body>
</html>
