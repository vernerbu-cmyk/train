<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIFR TRAINER v23</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:#fff;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:520px;
    padding:16px;
}

.card{
    margin-top:14px;
    background:#111827;
    padding:16px;
    border-radius:16px;
    text-align:center;
}

/* ===== UI ===== */

.code{
    font-size:42px;
    letter-spacing:10px;
    margin:16px 0;
    color:#22d3ee;
}

button{
    width:100%;
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
}

/* ===== DEBUG ===== */

#debug{
    position:fixed;
    bottom:10px;
    left:10px;
    right:10px;
    background:#0f172a;
    border:1px solid rgba(255,255,255,0.1);
    padding:10px;
    font-size:12px;
    border-radius:10px;
    max-height:160px;
    overflow:auto;
}

.ok{color:#22c55e;}
.err{color:#ef4444;}
.warn{color:#facc15;}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div id="hint">🔄 загрузка...</div>

<div class="code" id="cipherWord"></div>

<div id="options"></div>

<div id="result"></div>

<button onclick="toggleDebug()">📊 debug</button>

</div>

</div>

<div id="debug"></div>

<script>

/* =========================
   DEBUG ENGINE
========================= */

const debugLog = [];
let debugVisible = true;

function log(msg,type="info"){
    debugLog.push({msg,type});
    renderDebug();
    console.log(msg);
}

function renderDebug(){
    const el=document.getElementById("debug");
    if(!el || !debugVisible) return;

    el.innerHTML =
    "<b>DEBUG</b><br>" +
    debugLog.slice(-12).map(d=>{
        let cls = d.type==="err"?"err":d.type==="warn"?"warn":"ok";
        return `<div class="${cls}">${d.msg}</div>`;
    }).join("");
}

function toggleDebug(){
    debugVisible = !debugVisible;
    document.getElementById("debug").style.display =
        debugVisible ? "block" : "none";
}

/* =========================
   CORE DATA (SAFE FALLBACK)
========================= */

const alphabet="АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";

const symbols=[
"●","○","■","□","▲","△","▼","▽",
"◆","◇","★","☆","♥","♦","♣","♠",
"⬤","◯","▣","▢","▰","▱","◼","◻",
"▮","▯","+","×","÷","=","≠","∞","√","π"
];

const key = Object.fromEntries(
alphabet.split("").map((l,i)=>[l,symbols[i]])
);

/* =========================
   STATE
========================= */

let words = ["КОТ","ШКОЛА","САМОЛЕТ"];
let current = "";

/* =========================
   AUTO JSON LOADER
========================= */

async function loadWords(){

log("AUTO JSON SEARCH START", "ok");

const paths = [
    "./words.json",
    "words.json",
    "../words.json",
    "../../words.json",
    "/words.json",
    "/main/apps/other/words.json"
];

let data = null;
let used = null;

for(const p of paths){

    try{
        log("try: " + p, "warn");

        const res = await fetch(p);

        if(res.ok){
            data = await res.json();
            used = p;
            log("FOUND: " + p, "ok");
            break;
        }

    }catch(e){
        log("fail: " + p, "err");
    }
}

if(!data || !data.words){

    log("NO JSON → fallback", "err");

    document.getElementById("hint").innerText =
        "❌ JSON не найден → fallback режим";

    newTask();
    return;
}

words = data.words;

log("WORDS LOADED: " + words.length + " via " + used, "ok");

newTask();
}

/* =========================
   GAME CORE
========================= */

function newTask(){

if(!words.length){
    log("EMPTY WORDS", "err");
    return;
}

current = words[Math.floor(Math.random()*words.length)];

document.getElementById("cipherWord").innerText =
encode(current);

document.getElementById("hint").innerText =
"HINT READY";

log("word: " + current, "ok");
}

function encode(word){
return word.split("").map(l=>key[l]||"?").join(" ");
}

/* =========================
   START SAFE
========================= */

window.addEventListener("load", ()=>{
    log("WINDOW LOADED", "ok");
    loadWords();
});

</script>

</body>
</html>
