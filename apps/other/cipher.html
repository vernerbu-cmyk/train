<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIFR TRAINER v23</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:#fff;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:520px;
    padding:16px;
}

.card{
    margin-top:14px;
    background:#111827;
    padding:16px;
    border-radius:16px;
    text-align:center;
}

/* ===== GAME UI ===== */

.code{
    font-size:42px;
    letter-spacing:10px;
    margin:16px 0;
    color:#22d3ee;
}

button{
    width:100%;
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
}

/* ===== DEBUG ===== */

#debug{
    position:fixed;
    bottom:10px;
    left:10px;
    right:10px;
    background:#0f172a;
    border:1px solid rgba(255,255,255,0.1);
    padding:10px;
    font-size:12px;
    border-radius:10px;
    max-height:160px;
    overflow:auto;
    z-index:999;
}

.ok{color:#22c55e;}
.err{color:#ef4444;}
.warn{color:#facc15;}

/* ===== DRAWER ===== */

#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:10;
}

#drawer{
    position:fixed;
    top:0;
    right:-380px;
    width:340px;
    height:100%;
    background:linear-gradient(180deg,#0b1220,#0f172a);
    padding:16px;
    overflow:auto;
    transition:0.25s ease;
    z-index:11;
    box-shadow:-12px 0 40px rgba(0,0,0,0.6);
}

/* таблица */
.cipherGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.cipherItem{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

.cipherLetter{opacity:0.7;font-size:13px;}
.cipherSymbol{font-size:20px;color:#22d3ee;}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div id="hint">🔄 загрузка...</div>

<div class="code" id="cipherWord"></div>

<div id="options"></div>

<div id="result"></div>

<button onclick="toggleDrawer()">📊 Таблица шифра</button>

</div>

</div>

<!-- DRAWER -->
<div id="overlay" onclick="toggleDrawer()"></div>

<div id="drawer">
<div style="font-size:16px;margin-bottom:10px;color:#93c5fd;">
📊 Буква → Символ
</div>
<div id="cipherTable"></div>
</div>

<div id="debug"></div>

<script>

/* =========================
   DEBUG ENGINE
========================= */

const debugLog = [];

function log(msg,type="info"){
    debugLog.push({msg,type});
    renderDebug();
    console.log(msg);
}

function renderDebug(){
    const el=document.getElementById("debug");
    if(!el) return;

    el.innerHTML =
    "<b>DEBUG</b><br>" +
    debugLog.slice(-12).map(d=>{
        let cls = d.type==="err"?"err":d.type==="warn"?"warn":"ok";
        return `<div class="${cls}">${d.msg}</div>`;
    }).join("");
}

/* =========================
   CORE DATA
========================= */

const alphabet="АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";

const symbols=[
"●","○","■","□","▲","△","▼","▽",
"◆","◇","★","☆","♥","♦","♣","♠",
"⬤","◯","▣","▢","▰","▱","◼","◻",
"▮","▯","+","×","÷","=","≠","∞","√","π"
];

const key = Object.fromEntries(
alphabet.split("").map((l,i)=>[l,symbols[i]])
);

/* =========================
   STATE
========================= */

let words = ["КОТ","ШКОЛА","САМОЛЕТ"];
let current = "";
let open = false;

/* =========================
   AUTO JSON LOADER
========================= */

async function loadWords(){

log("AUTO JSON SEARCH", "ok");

const paths = [
    "./words.json",
    "words.json",
    "../words.json",
    "../../words.json",
    "/words.json",
    "/main/apps/other/words.json"
];

let data = null;
let used = null;

for(const p of paths){

    try{
        log("try: " + p, "warn");

        const res = await fetch(new URL(p, location.href));

        if(res.ok){
            data = await res.json();
            used = p;
            log("FOUND JSON: " + p, "ok");
            break;
        }

    }catch(e){
        log("fail: " + p, "err");
    }
}

if(!data || !data.words){
    log("NO JSON → fallback", "err");
    document.getElementById("hint").innerText =
        "❌ JSON не найден (fallback)";
    newTask();
    return;
}

words = data.words;

log("WORDS LOADED: " + words.length + " via " + used, "ok");

newTask();
}

/* =========================
   DRAWER
========================= */

function toggleDrawer(){

open = !open;

document.getElementById("drawer").style.right =
open ? "0" : "-380px";

document.getElementById("overlay").style.display =
open ? "block" : "none";

if(open) renderTable();
}

/* =========================
   TABLE
========================= */

function renderTable(){

const el = document.getElementById("cipherTable");

if(!el) return;

el.innerHTML =
`<div class="cipherGrid">
${alphabet.split("").map(l=>`
<div class="cipherItem">
    <div class="cipherLetter">${l}</div>
    <div class="cipherSymbol">${key[l]}</div>
</div>
`).join("")}
</div>`;
}

/* =========================
   GAME
========================= */

function newTask(){

if(!words.length) return;

current = words[Math.floor(Math.random()*words.length)];

document.getElementById("cipherWord").innerText =
encode(current);

document.getElementById("hint").innerText =
"HINT READY";

log("WORD: " + current, "ok");
}

function encode(word){
return word.split("").map(l=>key[l]||"?").join(" ");
}

/* =========================
   BOOT
========================= */

window.addEventListener("load", ()=>{
    log("WINDOW LOADED", "ok");
    loadWords();
});

</script>

</body>
</html>
