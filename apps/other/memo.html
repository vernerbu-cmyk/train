<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEMO тренажёр</title>

<style>
body {
    margin: 0;
    font-family: "Arial", sans-serif;
    background: radial-gradient(circle at top, #f4f6fb, #e8edff);
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #1E3F8A;
}

.header {
    width: 100%;
    background: linear-gradient(135deg, #1E3F8A, #274db0);
    color: white;
    text-align: center;
    padding: 16px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
}

.start-screen {
    margin-top: 50px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
}

.big-btn {
    padding: 22px 46px;
    font-size: 22px;
    background: linear-gradient(135deg, #FF8C00, #ff6a00);
    color: white;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(255,140,0,0.25);
}

.timer-box {
    width: min(92vw, 720px);
    margin: 14px 0;
    text-align: center;
}

.timer-text {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
}

.timer-wrap {
    width: 100%;
    height: 12px;
    background: #e6e9f2;
    border-radius: 999px;
    overflow: hidden;
}

.timer-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #1E3F8A, #3b82f6);
    transition: width 1s linear;
}

.hidden { display:none; }

.grid {
    display: grid;
    gap: 12px;
    width: min(92vw, 720px);
    margin-bottom: 90px;
}

.card {
    aspect-ratio: 1 / 1;
    width: 100%;
    perspective: 900px;
    cursor: pointer;
}

.inner {
    width: 100%;
    height: 100%;
    transition: transform 0.55s ease;
    transform-style: preserve-3d;
    position: relative;
}

.card.flipped .inner {
    transform: rotateY(180deg);
}

.face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    backface-visibility: hidden;
}

.front {
    background: linear-gradient(145deg, #1E3F8A, #2a56c6);
    color: white;
    font-size: 18px;
    font-weight: 600;
}

.back {
    background: white;
    transform: rotateY(180deg);
    font-size: 42px;
}
</style>
</head>

<body>

<div class="header">MEMO тренажёр памяти</div>

<div class="start-screen" id="startScreen">

    <label>
        Сетка:
        <select id="size">
            <option value="4">4×4</option>
            <option value="6">6×6</option>
            <option value="8">8×8</option>
        </select>
    </label>

    <label>
        Запоминание:
        <select id="preview">
            <option value="5">5 сек</option>
            <option value="8" selected>8 сек</option>
            <option value="12">12 сек</option>
            <option value="20">20 сек</option>
            <option value="30">30 сек</option>
            <option value="60">60 сек</option>
        </select>
    </label>

    <button class="big-btn" onclick="startGame()">▶ НАЧАТЬ</button>
</div>

<div id="game" class="hidden">

    <div class="timer-box">
        <div class="timer-text" id="timerText">Запоминание...</div>
        <div class="timer-wrap">
            <div class="timer-bar" id="timerBar"></div>
        </div>
    </div>

    <div class="grid" id="grid"></div>
</div>

<script>

const icons = [
"🍎","🚗","🐶","⚽","🌙","🎲","🎧","🔥",
"🐱","🐸","🦊","🐼","🍕","🍉","🚀","🎈",
"🏀","🎮","📚","✏️","🎯","🧠","⚡","🌈",
"🐝","🦁","🐙","🍩","🧩","🚁","🏆","💡"
];

/* 🔥 Фишер-Йейтс (правильный shuffle) */
function shuffle(a){
    for(let i=a.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
}

let cards=[], first=null, lock=false;

/* TIMER */
function runTimer(sec,cb){
    const bar=document.getElementById("timerBar");
    const text=document.getElementById("timerText");

    let t=sec;
    const total=sec;

    const int=setInterval(()=>{

        text.textContent=`Запоминание: ${t} сек`;
        bar.style.width=(t/total)*100+"%";

        if(t<=0){
            clearInterval(int);
            cb();
        }

        t--;
    },1000);
}

/* START */
function startGame(){

    const size=+document.getElementById("size").value;
    const preview=+document.getElementById("preview").value;

    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    const total=size*size;
    const pairs=total/2;

    /* 🔥 УНИКАЛЬНЫЙ ВЫБОР БЕЗ ДУБЛЕЙ */
    const pool=[...icons];
    const pick=[];

    for(let i=0;i<pairs;i++){
        const idx=Math.floor(Math.random()*pool.length);
        pick.push(pool.splice(idx,1)[0]);
    }

    cards=shuffle([...pick,...pick]);

    const grid=document.getElementById("grid");
    grid.innerHTML="";
    grid.style.gridTemplateColumns=`repeat(${size},1fr)`;

    lock=true;

    cards.forEach((ic,i)=>{
        const c=document.createElement("div");
        c.className="card flipped";
        c.dataset.icon=ic;

        c.innerHTML=`
        <div class="inner">
            <div class="face front">${i+1}</div>
            <div class="face back">${ic}</div>
        </div>`;

        c.onclick=()=>flip(c);
        grid.appendChild(c);
    });

    runTimer(preview,()=>{
        document.querySelectorAll(".card").forEach(c=>{
            c.classList.remove("flipped");
        });
        lock=false;
    });
}

/* FLIP */
function flip(card){
    if(lock || card.classList.contains("flipped")) return;

    card.classList.add("flipped");

    if(!first){
        first=card;
        return;
    }

    if(first.dataset.icon===card.dataset.icon){
        first=null;
    } else {
        lock=true;
        setTimeout(()=>{
            first.classList.remove("flipped");
            card.classList.remove("flipped");
            first=null;
            lock=false;
        },700);
    }
}

</script>

</body>
</html>
