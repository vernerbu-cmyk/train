<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEMO тренажёр</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #f4f6fb, #e8edff);
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #1E3F8A;
}

/* HEADER */
.header{
    width:100%;
    background:linear-gradient(135deg,#1E3F8A,#274db0);
    color:white;
    text-align:center;
    padding:16px;
    font-size:20px;
    font-weight:700;
    position:relative;
    box-sizing:border-box;
}

.backBtn{
    position:absolute;
    left:10px;
    top:8px;
    transform:none;
    border:none;
    background:linear-gradient(135deg,#FF8C00,#ff6a00);
    color:white;
    width:42px;
    height:42px;
    border-radius:12px;
    font-size:28px;
    font-weight:900;
    line-height:1;
    padding-bottom:3px;
    cursor:pointer;
}

/* START */
.start-screen {
    margin-top: 50px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
}

.big-btn {
    padding: 22px 46px;
    font-size: 22px;
    background: linear-gradient(135deg, #FF8C00, #ff6a00);
    color: white;
    border: none;
    border-radius: 18px;
    cursor: pointer;
}

/* TIMER */
.timer-bar {
    width: min(92vw, 720px);
    height: 10px;
    background: linear-gradient(90deg, #1E3F8A, #3b82f6);
    border-radius: 999px;
    margin: 14px 0;
    transition: width 1s linear;
}

/* GRID */
.grid {
    display: grid;
    gap: 12px;
    width: min(92vw, 720px);
    margin-bottom: 90px;
}

/* CARD */
.card {
    aspect-ratio: 1/1;
    width: 100%;
    perspective: 900px;
    cursor: pointer;
}

.inner {
    width: 100%;
    height: 100%;
    transition: transform 0.55s ease;
    transform-style: preserve-3d;
    position: relative;
}

.card.flipped .inner {
    transform: rotateY(180deg);
}

/* FACES */
.face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    backface-visibility: hidden;
}

.front {
    background: linear-gradient(145deg, #1E3F8A, #2a56c6);
    color: white;
    font-size: 18px;
    font-weight: 600;
}

.back {
    background: white;
    transform: rotateY(180deg);
    font-size: 42px;
    border: 1px solid rgba(30,63,138,0.2);
}

/* MATCH ANIMATION */
.card.matching {
    animation: match 1s ease forwards;
}

@keyframes match {
    0% { transform: scale(1); opacity: 1; }
    40% { transform: scale(1.2) rotate(4deg); }
    100% { transform: scale(0); opacity: 0; }
}

/* RESULT */
.result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 30px;
    text-align: center;
}

#resultGrade {
    font-size: 52px;
    font-weight: bold;
}
</style>
</head>

<body>
<div class="header">
    <button class="backBtn" onclick="history.back()">❮</button>
    MEMO тренажёр памяти
</div>

<div class="start-screen" id="startScreen">

    <label>Сетка:
        <select id="size">
            <option value="4">4×4</option>
            <option value="6">6×6</option>
            <option value="8">8×8</option>
        </select>
    </label>

    <label>Запоминание:
        <select id="preview">
            <option value="5">5 сек</option>
            <option value="8" selected>8 сек</option>
            <option value="12">12 сек</option>
            <option value="20">20 сек</option>
            <option value="60">60 сек</option>
        </select>
    </label>

    <button class="big-btn" onclick="startGame()">▶ НАЧАТЬ</button>
</div>

<div id="game" class="hidden">

    <div class="timer-bar" id="timerBar"></div>
    <div class="grid" id="grid"></div>

</div>

<div class="result-screen" id="resultScreen">
    <h2 id="resultGrade"></h2>
    <div id="resultText"></div>
    <button class="big-btn" onclick="location.reload()">ЗАНОВО</button>
</div>

<script>

/* 🔊 ЗВУК (ДОБАВЛЕНО) */
function beep(freq){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();

    o.connect(g);
    g.connect(ctx.destination);

    o.frequency.value = freq;
    o.type = "sine";

    g.gain.value = 0.08;

    o.start();
    setTimeout(()=>{ o.stop(); ctx.close(); }, 120);
}

const icons=[
"🍎","🚗","🐶","⚽","🌙","🎲","🎧","🔥",
"🐱","🐸","🦊","🐼","🍕","🍉","🚀","🎈",
"🏀","🎮","📚","✏️","🎯","🧠","⚡","🌈",
"🐝","🦁","🐙","🍩","🧩","🚁","🏆","💡"
];

let cards=[], first=null, lock=false;
let pairs=0, moves=0;

/* shuffle */
function shuffle(a){
    for(let i=a.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
}

/* TIMER — СТРОГО В ФАЗЕ ЗАПОМИНАНИЯ */
function runTimer(sec){

    const bar=document.getElementById("timerBar");
    let t=sec;

    bar.style.width="100%";

    const interval=setInterval(()=>{

        t--;
        bar.style.width=(t/sec)*100+"%";

        if(t<=0){
            clearInterval(interval);
            bar.style.width="0%";
        }

    },1000);
}

/* START */
function startGame(){

    const size=+document.getElementById("size").value;
    const preview=+document.getElementById("preview").value;

    const total=size*size;
    const need=total/2;

    const pool=[...icons];
    const pick=[];

    for(let i=0;i<need;i++){
        const idx=Math.floor(Math.random()*pool.length);
        pick.push(pool.splice(idx,1)[0]);
    }

    cards=shuffle([...pick,...pick]);

    const grid=document.getElementById("grid");
    grid.innerHTML="";
    grid.style.gridTemplateColumns=`repeat(${size},1fr)`;

    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    lock=true;
    first=null;
    pairs=0;
    moves=0;

    cards.forEach((ic,i)=>{
        const c=document.createElement("div");
        c.className="card flipped";
        c.dataset.icon=ic;

        c.innerHTML=`
        <div class="inner">
            <div class="face front">${i+1}</div>
            <div class="face back">${ic}</div>
        </div>`;

        c.onclick=()=>flip(c);
        grid.appendChild(c);
    });

    runTimer(preview);

    setTimeout(()=>{
        document.querySelectorAll(".card").forEach(c=>{
            c.classList.remove("flipped");
        });

        lock=false;
    }, preview*1000);
}

/* FLIP */
function flip(card){

    if(lock || card.classList.contains("flipped")) return;

    card.classList.add("flipped");

    if(!first){
        first=card;
        return;
    }

    moves++;
    lock=true;

    if(first.dataset.icon===card.dataset.icon){

        beep(600); // 🔊 совпадение

        const a=first;
        const b=card;

        first=null;

        setTimeout(()=>{
            a.classList.add("matching");
            b.classList.add("matching");
        },150);

        setTimeout(()=>{

            a.style.visibility = "hidden";
            b.style.visibility = "hidden";

            pairs++;
            lock=false;

            if(pairs===cards.length/2){
                finishGame();
            }

        },1000);

    } else {

        setTimeout(()=>{

            first.classList.remove("flipped");
            card.classList.remove("flipped");

            first=null;
            lock=false;

        },700);
    }
}

/* FINISH */
function finishGame(){

    beep(300); // 🔊 конец

    const total=cards.length/2;
    const acc=pairs/Math.max(1,moves);
    const percent=Math.round(acc*100);

    let grade="C";
    if(percent>=90) grade="S";
    else if(percent>=80) grade="A";
    else if(percent>=60) grade="B";

    document.getElementById("game").style.display="none";
    document.getElementById("resultScreen").style.display="flex";

    document.getElementById("resultGrade").textContent=grade;
    document.getElementById("resultText").textContent=
        `Пары: ${pairs}/${total} | Ходы: ${moves}`;
}

</script>

</body>
</html>
