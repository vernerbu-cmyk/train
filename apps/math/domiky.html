<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Домики</title>

<style>
:root{
--blue:#1E3F8A;
--orange:#FF6A00;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
text-align:center;
user-select:none;
}

.topbar{
background:var(--blue);
padding:14px;
}

.topbar h1{
margin:0;
color:#fff;
font-style:italic;
font-size:22px;
}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
padding:10px;
}

select,button{
font-size:16px;
padding:10px 12px;
border-radius:10px;
border:none;
}

button{
background:var(--orange);
color:#fff;
box-shadow:0 4px 0 #c94f00;
font-weight:600;
}

button:active{
transform:translateY(2px);
box-shadow:0 1px 0 #c94f00;
}

select{
border:2px solid var(--orange);
}

/* HOUSE */
.house{
display:flex;
flex-direction:column;
align-items:center;
margin-top:10px;
}

.roof{
background:var(--orange);
color:#fff;
font-size:28px;
font-weight:bold;
height:70px;
display:flex;
align-items:flex-end;
justify-content:center;
clip-path:polygon(50% 0%,0% 100%,100% 100%);
width:90%;
max-width:420px;
}

.floors{
display:flex;
flex-direction:column-reverse;
gap:8px;
width:100%;
align-items:center;
}

.floor{
display:flex;
width:100%;
justify-content:center;
}

.part{
flex:1;
max-width:180px;
min-height:70px;
background:#fff;
border:2px solid #ddd;
display:flex;
align-items:center;
justify-content:center;
position:relative;
font-size:18px;
}

.part span{
position:absolute;
top:4px;
left:6px;
opacity:.25;
font-size:14px;
font-weight:bold;
}

/* TOKENS */
.token{
width:40px;
height:40px;
touch-action:none;
user-select:none;
cursor:grab;
position:relative;
}

.dragging{
position:fixed;
z-index:9999;
pointer-events:none;
}
</style>
</head>

<body>

<div class="topbar">
<h1>Домики</h1>
</div>

<div class="controls">

<select id="numberSelect">
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option selected>10</option>
</select>

<!-- ✔️ РЕЖИМЫ ВЕРНУЛИСЬ -->
<select id="modeSelect">
<option value="labubu">Лабубу</option>
<option value="digits">Цифры</option>
<option value="fill">Заполни пропуск</option>
<option value="fix">Исправь домик</option>
</select>

<select id="limitMode">
<option value="limited">С лимитом</option>
<option value="unlimited">Без лимита</option>
</select>

<button onclick="startGame()">Старт</button>

</div>

<div id="house"></div>

<button onclick="checkHouse()">Проверить</button>

<script>

const imgSrc="https://catalog-cdn.detmir.st/media/M5ixUcmGflIrqy2RW3fyx1ZTxhssvWvb8UWwZeiKjIo=.jpeg";

let dragged=null;
let offsetX=0;
let offsetY=0;

/* ===== START ===== */
function startGame(){

const N=parseInt(numberSelect.value);
const mode=modeSelect.value;

house.innerHTML="";

if(mode==="labubu"){
createLabubu(N);
}
else if(mode==="digits"){
createDigits(N);
}
else{
createHouse(N,mode);
}

}

/* ===== LABUBU ===== */
function createLabubu(N){

const div=document.createElement("div");
div.className="house";

const roof=document.createElement("div");
roof.className="roof";
roof.dataset.value=N;
roof.innerText=N;

const floors=document.createElement("div");
floors.className="floors";

/* ✔️ 0–10 ВСЕГДА ЕСТЬ */
for(let i=0;i<=10;i++){

const f=document.createElement("div");
f.className="floor";

const l=document.createElement("div");
const r=document.createElement("div");

l.className="part";
r.className="part";

/* лимит */
l.dataset.limit=i;
r.dataset.limit=N-i;

/* подписи лимита */
l.innerHTML=`<span>${i}</span>`;
r.innerHTML=`<span>${N-i}</span>`;

f.appendChild(l);
f.appendChild(r);

floors.appendChild(f);

}

div.appendChild(roof);
div.appendChild(floors);
house.appendChild(div);

createTokens(N*(N+1));

}

/* ===== DIGITS ===== */
function createDigits(N){

const div=document.createElement("div");
div.className="house";

const roof=document.createElement("div");
roof.className="roof";
roof.innerText=N;

const floors=document.createElement("div");
floors.className="floors";

for(let i=0;i<=10;i++){

const f=document.createElement("div");
f.className="floor";

const l=document.createElement("div");
const r=document.createElement("div");

l.className="part";
r.className="part";

l.innerHTML=`<input>`;
r.innerHTML=`<input>`;

f.appendChild(l);
f.appendChild(r);

floors.appendChild(f);

}

div.appendChild(roof);
div.appendChild(floors);
house.appendChild(div);

}

/* ===== HOUSE ===== */
function createHouse(N,mode){

const div=document.createElement("div");
div.className="house";

const roof=document.createElement("div");
roof.className="roof";
roof.dataset.value=N;
roof.innerText=N;

const floors=document.createElement("div");
floors.className="floors";

/* ✔️ ВАЖНО: 0–10 */
for(let i=0;i<=10;i++){

const f=document.createElement("div");
f.className="floor";

const l=document.createElement("div");
const r=document.createElement("div");

l.className="part";
r.className="part";

l.innerText=i;
r.innerText=N-i;

f.appendChild(l);
f.appendChild(r);

floors.appendChild(f);

}

div.appendChild(roof);
div.appendChild(floors);
house.appendChild(div);

}

/* ===== TOKENS ===== */
function createTokens(count){

for(let i=0;i<count;i++){
const img=document.createElement("img");
img.src=imgSrc;
img.className="token";
img.onpointerdown=dragStart;
document.body.appendChild(img);
}

}

/* ===== DRAG ===== */
function dragStart(e){

dragged=e.target;

const rect=dragged.getBoundingClientRect();

offsetX=e.clientX-rect.left;
offsetY=e.clientY-rect.top;

dragged.classList.add("dragging");

document.body.appendChild(dragged);

move(e);

document.addEventListener("pointermove",move);
document.addEventListener("pointerup",drop,{once:true});

}

function move(e){

if(!dragged)return;

dragged.style.position="fixed";
dragged.style.left=(e.clientX-offsetX)+"px";
dragged.style.top=(e.clientY-offsetY)+"px";

}

function drop(e){

document.removeEventListener("pointermove",move);

if(!dragged)return;

const el=document.elementFromPoint(e.clientX,e.clientY);
const part=el?.closest(".part");

const mode=document.getElementById("limitMode").value;

if(part){

const limit=parseInt(part.dataset.limit||999);
const count=part.querySelectorAll(".token").length;

if(mode==="unlimited" || count<limit){
part.appendChild(dragged);
}

}else{
document.body.appendChild(dragged);
}

dragged.classList.remove("dragging");
dragged.style.position="";
dragged.style.left="";
dragged.style.top="";

dragged=null;

}

/* ===== CHECK (СТАБИЛЬНО) ===== */
function checkHouse(){

const N=parseInt(document.querySelector(".roof").dataset.value);

document.querySelectorAll(".floor").forEach(floor=>{

const left=floor.children[0];
const right=floor.children[1];

const sum=
left.querySelectorAll(".token").length +
right.querySelectorAll(".token").length;

floor.style.borderColor=(sum===N)?"green":"red";

});

}

</script>

</body>
</html>
