<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Домик состава числа</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef4ff;
text-align:center;
user-select:none;
}

h1{
font-size:40px;
font-weight:900;
color:#ff4d6d;
}

.controls{
margin-bottom:10px;
}

select,button{
font-size:18px;
padding:6px 12px;
margin:5px;
}

#instruction{
font-size:20px;
font-weight:700;
margin:10px 0;
color:#444;
}

#houseContainer{
position:relative;
display:flex;
justify-content:center;
margin-top:10px;
}

#board{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

#house{
position:relative;
z-index:1;
}

.house{
display:flex;
flex-direction:column;
align-items:center;
}

.roof{
height:110px;
background:#ffb703;
clip-path:polygon(50% 0%,0% 100%,100% 100%);
display:flex;
align-items:flex-end;
justify-content:center;
font-size:40px;
font-weight:bold;
padding-bottom:12px;
}

.floors{
display:flex;
flex-direction:column-reverse;
gap:10px;
}

.floor{
display:flex;
justify-content:center;
align-items:flex-end;
min-height:110px;
}

.part{
display:flex;
align-items:center;
justify-content:center;
gap:6px;
min-height:110px;
padding:10px;
border:3px solid #333;
background:#ffffff;
box-sizing:border-box;
position:relative;
font-size:28px;
font-weight:bold;
}

.part span{
position:absolute;
top:6px;
left:10px;
font-size:24px;
opacity:.15;
font-weight:bold;
}

input.num{
width:60px;
height:60px;
font-size:26px;
text-align:center;
border:2px solid #999;
border-radius:8px;
}

#checkBtn{
margin-top:10px;
}

@keyframes bounce{
0%{transform:translateY(0);}
25%{transform:translateY(-20px);}
50%{transform:translateY(0);}
75%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.bounce{
animation:bounce .6s ease;
}
</style>
</head>

<body>

<h1>СОСТАВ ЧИСЛА</h1>

<div class="controls">

Число:
<select id="numberSelect">
<option>3</option>
<option selected>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

Режим:
<select id="modeSelect">
<option value="limited">С лимитом</option>
<option value="unlimited">Без лимита</option>
<option value="fill">Заполни пропуск</option>
<option value="fix">Исправь домик</option>
<option value="digits">Цифры</option>
</select>

<button onclick="startGame()">Старт</button>

</div>

<div id="instruction"></div>

<div id="houseContainer">
<canvas id="board"></canvas>
<div id="house"></div>
</div>

<button id="checkBtn" onclick="checkHouse()" style="display:none;">
Проверить
</button>

<script>

function baseWidth(n){
return Math.max(260,n*60);
}

function startGame(){

const N=parseInt(numberSelect.value);
const mode=modeSelect.value;

house.innerHTML="";

if(mode==="digits"){
instruction.innerText="ВПИШИ ЦИФРЫ В ДОМИК!";
createDigitHouse(N);
checkBtn.style.display="inline-block";
return;
}

instruction.innerText="СОСТАВ ЧИСЛА";
createHouse(N,mode);
checkBtn.style.display="inline-block";

}

function createDigitHouse(N){

const totalWidth=baseWidth(N);

const houseDiv=document.createElement("div");
houseDiv.className="house";

const roof=document.createElement("div");
roof.className="roof";
roof.style.width=totalWidth+"px";
roof.innerText=N;

const floors=document.createElement("div");
floors.className="floors";

for(let i=0;i<=N;i++){

const floor=document.createElement("div");
floor.className="floor";
floor.style.width=totalWidth+"px";

const left=document.createElement("div");
const right=document.createElement("div");

left.className="part";
right.className="part";

left.style.width=totalWidth/2+"px";
right.style.width=totalWidth/2+"px";

left.innerHTML=`<span></span><input class="num" data-val="${i}">`;
right.innerHTML=`<span></span><input class="num" data-val="${N-i}">`;

floor.appendChild(left);
floor.appendChild(right);
floors.appendChild(floor);

}

houseDiv.appendChild(roof);
houseDiv.appendChild(floors);
house.appendChild(houseDiv);

}

function createHouse(N,mode){

const totalWidth=baseWidth(N);

const houseDiv=document.createElement("div");
houseDiv.className="house";

const roof=document.createElement("div");
roof.className="roof";
roof.style.width=totalWidth+"px";
roof.innerText=N;

const floors=document.createElement("div");
floors.className="floors";

for(let i=0;i<=N;i++){

const floor=document.createElement("div");
floor.className="floor";
floor.style.width=totalWidth+"px";

const left=document.createElement("div");
const right=document.createElement("div");

left.className="part";
right.className="part";

left.style.width=totalWidth/2+"px";
right.style.width=totalWidth/2+"px";

if(mode==="limited"){
left.innerHTML=`<span>${i}</span>`;
right.innerHTML=`<span>${N-i}</span>`;
}else{
left.innerHTML="";
right.innerHTML="";
}

floor.appendChild(left);
floor.appendChild(right);
floors.appendChild(floor);

}

houseDiv.appendChild(roof);
houseDiv.appendChild(floors);
house.appendChild(houseDiv);

}

function checkHouse(){

const N=parseInt(document.querySelector(".roof").innerText);

document.querySelectorAll(".floor").forEach(floor=>{

const inputs=floor.querySelectorAll("input");

if(inputs.length===0){
const leftCount=floor.querySelector(".left")?.querySelectorAll(".token")?.length||0;
const rightCount=floor.querySelector(".right")?.querySelectorAll(".token")?.length||0;
if(leftCount+rightCount===N){
floor.style.borderColor="green";
floor.classList.add("bounce");
setTimeout(()=>floor.classList.remove("bounce"),600);
}else{
floor.style.borderColor="red";
}
return;
}

const leftVal=parseInt(inputs[0].value||-1);
const rightVal=parseInt(inputs[1].value||-1);

if(leftVal+rightVal===N){
floor.style.borderColor="green";
floor.classList.add("bounce");
setTimeout(()=>floor.classList.remove("bounce"),600);
}else{
floor.style.borderColor="red";
}

});

}

</script>

</body>
</html>
