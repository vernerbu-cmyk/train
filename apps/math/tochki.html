<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тренажёр памяти</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
  text-align:center;
}

.controls button,
.controls select,
.controls input{
  font-size:16px;
  margin:4px;
}

/* ===== ПАЛИТРА ===== */
#palette{
  margin-top:10px;
  display:none;
}

.colorBtn{
  width:28px;
  height:28px;
  display:inline-block;
  margin:3px;
  border:2px solid #333;
  cursor:pointer;
}

.selected{
  outline:3px solid black;
}

/* ===== СЕТКА ===== */
#grid{
  display:grid;
  gap:0;
  justify-content:center;
  margin-top:20px;
}

.cell{
  width:80px;
  height:80px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  cursor:pointer;
  border:1px solid #444;
  box-sizing:border-box;
}

.cell.wrong::after{
  content:"✖";
  color:red;
  font-size:26px;
  position:absolute;
}

/* ===== ФИГУРЫ ===== */
.dot{width:24px;height:24px;border-radius:50%;background:black;}
.square{width:26px;height:26px;background:black;}
.triangle{
  width:0;height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:24px solid black;
}
.diamond{width:22px;height:22px;background:black;transform:rotate(45deg);}
.star{
  width:24px;height:24px;
  background:black;
  clip-path:polygon(
    50% 0%,61% 35%,98% 35%,68% 57%,
    79% 91%,50% 70%,21% 91%,32% 57%,
    2% 35%,39% 35%
  );
}

/* ===== ИСТОРИЯ ===== */
.history{
  display:grid;
  grid-template-columns:repeat(4,auto);
  gap:12px;
  justify-content:center;
  margin-top:20px;
}

.historyWrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.historyNumber{
  font-size:14px;
  font-weight:bold;
  color:#333;
}

.historyCell{
  width:24px;
  height:24px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.historyDot{width:10px;height:10px;border-radius:50%;background:black;}
.historySquare{width:12px;height:12px;background:black;}
.historyTriangle{
  width:0;height:0;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-bottom:12px solid black;
}
.historyDiamond{width:10px;height:10px;background:black;transform:rotate(45deg);}
.historyStar{
  width:12px;height:12px;
  background:black;
  clip-path:polygon(
    50% 0%,61% 35%,98% 35%,68% 57%,
    79% 91%,50% 70%,21% 91%,32% 57%,
    2% 35%,39% 35%
  );
}

#progress{
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="controls">

Размер:
<select id="gridSize">
<option value="3">3×3</option>
<option value="4">4×4</option>
<option value="5">5×5</option>
</select>

Сложность:
<select id="difficulty">
<option value="easy">Лёгкий</option>
<option value="medium">Средний</option>
<option value="hard">Сложный</option>
</select>

Режим:
<select id="mode">
<option value="show">Показ</option>
<option value="interactive">Интерактив</option>
</select>

<label>
<input type="checkbox" id="colorMode" onchange="togglePalette()">
Окрашивание
</label>

<br>

<button onclick="startTraining()">Начать</button>
<button onclick="remember()">Запомнил</button>
<button onclick="nextStep()">Следующий</button>
<button onclick="resetAll()">Начать заново</button>
<button onclick="printTemplates()">Печать</button>
<button onclick="showHistory()">История</button>

</div>

<div id="palette"></div>

<div id="progress">0 / 16</div>

<div id="grid"></div>

<div id="history" class="history"></div>

<script>

let step=0;
let used=new Set();
let historyData=[];
let hidden=false;

let targets=[];
let found=[];
let selectedColor=null;

const rainbow=[
  "red","orange","yellow","green","deepskyblue","blue","purple"
];

/* ===== ПАЛИТРА ===== */
function buildPalette(){
  const p=document.getElementById('palette');
  p.innerHTML='';

  rainbow.forEach(c=>{
    let b=document.createElement('div');
    b.className='colorBtn';
    b.style.background=c;

    b.onclick=()=>{
      selectedColor=c;
      document.querySelectorAll('.colorBtn')
        .forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
    };

    p.appendChild(b);
  });
}

/* ===== SHOW/HIDE PALETTE ===== */
function togglePalette(){
  const palette=document.getElementById('palette');
  const enabled=document.getElementById('colorMode').checked;

  palette.style.display = enabled ? 'block' : 'none';

  if(!enabled){
    selectedColor=null;
    document.querySelectorAll('.colorBtn')
      .forEach(x=>x.classList.remove('selected'));
  }
}

/* ===== START ===== */
function startTraining(){
  resetAll();
  buildPalette();
  togglePalette();
  nextStep();
}

/* ===== RESET ===== */
function resetAll(){
  step=0;
  used.clear();
  historyData=[];
  hidden=false;
  targets=[];
  found=[];
  selectedColor=null;

  document.getElementById('grid').innerHTML='';
  document.getElementById('history').innerHTML='';
  document.getElementById('progress').textContent='0 / 16';

  document.getElementById('palette').style.display='none';
}

/* ===== COUNT ===== */
function getCount(size,diff,step){
  if(diff==='easy'){
    let base=size===3?3:size===4?4:5;
    if(step>=12) base++;
    return base;
  }
  if(diff==='medium'){
    return 4+Math.floor(Math.random()*3);
  }
  return Math.max(5, size + Math.floor(step/3));
}

/* ===== PATTERN ===== */
function uniquePattern(size,count){
  let max=size*size;

  while(true){
    let arr=[];
    while(arr.length<count){
      let n=Math.floor(Math.random()*max);
      if(!arr.includes(n)) arr.push(n);
    }

    let key=[...arr].sort().join(',');
    if(!used.has(key)){
      used.add(key);
      return arr;
    }
  }
}

/* ===== FIGURES ===== */
function generateFigures(pattern,diff){

  let types=[];

  if(diff==='easy') types=['dot'];

  if(diff==='medium'){
    if(step<8) types=['dot','square'];
    else types=['dot','square','triangle'];
  }

  if(diff==='hard'){
    if(step<4) types=['dot','square'];
    else if(step<8) types=['dot','square','triangle'];
    else if(step<12) types=['dot','square','triangle','diamond'];
    else types=['dot','square','triangle','diamond','star'];
  }

  return pattern.map(i=>({
    index:i,
    type:types[Math.floor(Math.random()*types.length)],
    color: document.getElementById('colorMode').checked
      ? rainbow[Math.floor(Math.random()*rainbow.length)]
      : null
  }));
}

/* ===== GRID ===== */
function drawGrid(size,figs){

  const grid=document.getElementById('grid');
  grid.innerHTML='';

  grid.style.gridTemplateColumns=`repeat(${size},80px)`;

  targets=figs.map(f=>f.index);
  found=[];

  for(let i=0;i<size*size;i++){

    let cell=document.createElement('div');
    cell.className='cell';

    let fig=figs.find(x=>x.index===i);

    if(fig){
      let el=document.createElement('div');
      el.className=fig.type;

      if(fig.color){
        if(fig.type==='triangle'){
          el.style.borderBottomColor=fig.color;
        } else {
          el.style.background=fig.color;
        }
      }

      cell.appendChild(el);
    }

    if(document.getElementById('mode').value==='interactive'){
      cell.onclick=()=>check(i,cell,fig);
    }

    grid.appendChild(cell);
  }
}

/* ===== CHECK ===== */
function check(i,cell,fig){

  if(found.includes(i)) return;

  const colorMode=document.getElementById('colorMode').checked;

  if(colorMode && !selectedColor){
    alert('Выбери цвет');
    return;
  }

  if(targets.includes(i)){

    if(colorMode && fig.color !== selectedColor){
      cell.classList.add('wrong');
      return;
    }

    found.push(i);
    cell.style.outline='3px solid green';

  } else {
    cell.classList.add('wrong');
  }
}

/* ===== MEMORY ===== */
function remember(){
  const figs=document.querySelectorAll('.dot,.square,.triangle,.diamond,.star');

  figs.forEach(f=>{
    f.style.visibility = hidden ? 'visible' : 'hidden';
  });

  hidden=!hidden;
}

/* ===== NEXT ===== */
function nextStep(){

  if(step>=16) return;

  let size=+document.getElementById('gridSize').value;
  let diff=document.getElementById('difficulty').value;

  let count=getCount(size,diff,step);
  let pattern=uniquePattern(size,count);
  let figs=generateFigures(pattern,diff);

  drawGrid(size,figs);

  historyData.push({size,figs});

  step++;

  document.getElementById('progress').textContent=`${step} / 16`;
}

/* ===== HISTORY ===== */
function showHistory(){

  const h=document.getElementById('history');
  h.innerHTML='';

  historyData.forEach((data, idx)=>{

    let wrapper=document.createElement('div');
    wrapper.className='historyWrapper';

    let num=document.createElement('div');
    num.className='historyNumber';
    num.textContent=idx+1;

    let g=document.createElement('div');
    g.style.display='grid';
    g.style.gridTemplateColumns=`repeat(${data.size},24px)`;

    for(let i=0;i<data.size*data.size;i++){

      let c=document.createElement('div');
      c.className='historyCell';

      let f=data.figs.find(x=>x.index===i);

      if(f){
        let d=document.createElement('div');
        d.className='history'+f.type[0].toUpperCase()+f.type.slice(1);
        c.appendChild(d);
      }

      g.appendChild(c);
    }

    wrapper.appendChild(num);
    wrapper.appendChild(g);

    h.appendChild(wrapper);
  });
}

/* ===== PRINT ===== */
function printTemplates(){

  const size = +document.getElementById('gridSize').value;

  const win = window.open('');

  let html = `
  <html>
  <head>
  <title>Печать шаблонов</title>
  <style>
    body{
      margin:0;
      padding:20px;
      font-family:Arial;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
    }

    .grid{
      display:grid;
      gap:2px;   /* ВАЖНО: без рамок */
    }

    .cell{
      width:40px;
      height:40px;
      border:1px solid #999;
      background:white;
    }

    .label{
      text-align:center;
      font-weight:bold;
      margin-bottom:6px;
    }
  </style>
  </head>
  <body>
  `;

  for(let i=1;i<=16;i++){
    html += `
      <div>
        <div class="label">${i}</div>
        <div class="grid" style="grid-template-columns:repeat(${size},40px)">
    `;

    for(let j=0;j<size*size;j++){
      html += `<div class="cell"></div>`;
    }

    html += `</div></div>`;
  }

  html += `</body></html>`;

  win.document.write(html);
  win.document.close();
  win.print();
}

/* INIT */
buildPalette();

</script>
</body>
</html>
