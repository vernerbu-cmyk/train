<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Точки</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
  text-align:center;
}

.topbar{
  background:#1E3F8A;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  position:sticky;
  top:0;
}

.title{
  width:100%;
  color:white;
  font-style:italic;
  font-size:20px;
}

button, select{
  font-size:14px;
}

button{
  background:#FF6A00;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

#grid{
  display:grid;
  justify-content:center;
  margin-top:25px;
  gap:6px;
}

.cell{
  width:72px;
  height:72px;
  background:white;
  border:1px solid #d0d7e6;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.dot,.square{
  width:55%;
  height:55%;
}

.dot{border-radius:50%;background:#111;}
.square{background:#111;}

#progress{
  margin:10px;
  font-size:16px;
}

/* ===== ИСТОРИЯ ===== */
#history{
  display:none;
  margin-top:10px;
  padding:10px;
}

.histItem{
  border:1px solid #ccc;
  padding:6px;
  background:white;
  border-radius:8px;
}

/* =========================
   📱 МОБИЛЬНАЯ АДАПТАЦИЯ
========================= */
@media (max-width: 768px){

  .topbar{
    flex-direction:row;
    gap:4px;
    padding:8px;
  }

  .title{
    font-size:16px;
  }

  button, select{
    font-size:12px;
    padding:6px 8px;
  }

  #grid{
    gap:4px;
  }

  .cell{
    width:52px;
    height:52px;
  }

  #history{
    padding:6px;
  }

  .histItem{
    transform:scale(0.9);
    transform-origin:top left;
  }
}

@media (max-width: 420px){

  .cell{
    width:42px;
    height:42px;
  }

  button, select{
    font-size:11px;
    padding:5px 6px;
  }

  .title{
    font-size:14px;
  }

  #grid{
    gap:3px;
  }
}
</style>
</head>

<body>

<div class="topbar">

  <div class="title">Точки</div>

  <select id="gridSize">
    <option value="3">3×3</option>
    <option value="4">4×4</option>
    <option value="5">5×5</option>
  </select>

  <button onclick="nextStep()">Далее</button>
  <button onclick="prevStep()">Назад</button>
  <button onclick="hideFigures()">Запомнил</button>
  <button onclick="toggleHistory()">История</button>
  <button onclick="printTemplates()">Печать</button>

</div>

<div id="progress">0 / 16</div>
<div id="grid"></div>
<div id="history"></div>

<script>

let step = 0;
let historyData = [];
let hidden = false;

/* ===== размер ===== */
function getCount(size){
  return size === 3 ? 3 : size === 4 ? 4 : 5;
}

/* ===== типы ===== */
function getTypes(step){
  return step < 12 ? ['dot'] : ['dot','square'];
}

/* ===== шаг ===== */
function nextStep(){

  if(step >= 16) return;

  const size = +document.getElementById('gridSize').value;
  const grid = document.getElementById('grid');
  const progress = document.getElementById('progress');

  const count = getCount(size);
  const types = getTypes(step);

  let pattern = [];

  while(pattern.length < count){
    let n = Math.floor(Math.random() * size * size);
    if(!pattern.includes(n)) pattern.push(n);
  }

  let figs = pattern.map(i => ({
    index:i,
    type:types[Math.floor(Math.random()*types.length)]
  }));

  drawGrid(size, figs);

  historyData.push({size, figs});

  step++;
  progress.textContent = `${step} / 16`;
}

/* ===== скрыть ===== */
function hideFigures(){

  const grid = document.getElementById('grid');
  if(!grid) return;

  hidden = !hidden;

  if(hidden){
    grid.querySelectorAll('.cell').forEach(c => c.innerHTML = '');
  } else {
    const last = historyData[historyData.length - 1];
    if(last) drawGrid(last.size, last.figs);
  }
}

/* ===== отрисовка ===== */
function drawGrid(size, figs){

  const grid = document.getElementById('grid');
  grid.innerHTML='';
  grid.style.gridTemplateColumns=`repeat(${size},72px)`;

  for(let i=0;i<size*size;i++){

    const cell=document.createElement('div');
    cell.className='cell';

    const f = figs.find(x=>x.index===i);

    if(f){
      const d=document.createElement('div');
      d.className=f.type;
      cell.appendChild(d);
    }

    grid.appendChild(cell);
  }
}

/* ===== назад ===== */
function prevStep(){

  if(step<=1) return;

  step--;
  historyData.pop();

  const prev = historyData[historyData.length-1];

  if(prev){
    drawGrid(prev.size,prev.figs);
  } else {
    document.getElementById('grid').innerHTML='';
  }

  document.getElementById('progress').textContent=`${step} / 16`;
}

/* ===== история ===== */
function toggleHistory(){

  const h = document.getElementById('history');

  const open = h.style.display === 'grid';
  h.style.display = open ? 'none' : 'grid';

  if(open) return;

  h.innerHTML = '';

  h.style.display = 'grid';
  h.style.gridTemplateColumns = 'repeat(4, 1fr)';
  h.style.gap = '10px';

  historyData.forEach((item, idx) => {

    const box = document.createElement('div');
    box.className = 'histItem';

    const title = document.createElement('div');
    title.textContent = `Шаг ${idx+1}`;

    const grid = document.createElement('div');
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = `repeat(${item.size}, 10px)`;
    grid.style.gridTemplateRows = `repeat(${item.size}, 10px)`;
    grid.style.gap = '2px';

    for(let i=0;i<item.size*item.size;i++){

      const c = document.createElement('div');
      c.style.width='10px';
      c.style.height='10px';
      c.style.border='1px solid #ddd';

      const f = item.figs.find(x=>x.index===i);

      if(f){
        const inner = document.createElement('div');

        if(f.type==='dot'){
          inner.style.width='100%';
          inner.style.height='100%';
          inner.style.borderRadius='50%';
          inner.style.background='#111';
        }

        if(f.type==='square'){
          inner.style.width='100%';
          inner.style.height='100%';
          inner.style.background='#111';
        }

        c.appendChild(inner);
      }

      grid.appendChild(c);
    }

    box.appendChild(title);
    box.appendChild(grid);

    h.appendChild(box);
  });
}

/* ===== печать (1 лист A4, 16 сеток) ===== */
function printTemplates(){

  const size = +document.getElementById('gridSize').value;

  const w = window.open('');

  const cellSize = Math.floor(260 / size);

  let html = `
  <html>
  <head>
  <style>
    @page { size:A4; margin:10mm; }

    body{
      margin:0;
      font-family:Arial;
    }

    .sheet{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:6px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(${size}, ${cellSize}px);
      grid-auto-rows:${cellSize}px;
      border:1px solid #000;
      box-sizing:border-box;
    }

    .cell{
      border:1px solid #000;
      box-sizing:border-box;
    }
  </style>
  </head>

  <body>

  <div class="sheet">
  `;

  for(let g=0; g<16; g++){

    html += `<div class="grid">`;

    for(let i=0;i<size*size;i++){
      html += `<div class="cell"></div>`;
    }

    html += `</div>`;
  }

  html += `
  </div>

  </body>
  </html>
  `;

  w.document.write(html);
  w.document.close();
  w.print();
}

</script>

</body>
</html>
