<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Магические квадраты — Пошаговое обучение</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#fff}
header{position:fixed;top:0;left:0;right:0;height:72px;background:#ff7a00;color:#fff;display:flex;align-items:center;padding:0 12px;box-shadow:0 2px 6px rgba(0,0,0,0.1);z-index:10;justify-content:space-between}
header .brand{font-style:italic;font-weight:800;font-size:24px;letter-spacing:0.5px;white-space:nowrap}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;font-size:14px}
#toggleControls{padding:4px 10px;border:none;border-radius:4px;background:#fff;color:#ff7a00;font-weight:700;cursor:pointer}

#boardContainer{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  margin-top:150px;
  width:100%;
  min-height:calc(100vh - 100px);
}

#board{
  display:grid;
  gap:6px;
  margin-top:20px;
}

.cell{width:66px;height:66px;display:flex;align-items:center;justify-content:center;border:1px solid #444;font-weight:700;font-size:20px;background:#f3f3f3}
input.cell{width:64px;height:64px;border:1px solid #444;text-align:center;font-weight:700;box-sizing:border-box}
.correct{background:#c8e6c9}
.wrong{background:#ffcdd2}
#magicSum{margin-top:12px;font-weight:700;font-size:18px}
.hidden{display:none}
</style>
</head>
<body>

<header>
  <div class="brand">ЛидерГен</div>
  <div>
    <button id="toggleControls">Скрыть настройки</button>
  </div>
</header>

<div id="controlsWrapper" class="controls" style="position:fixed;top:72px;left:0;right:0;background:#ff7a00;padding:6px;gap:8px;align-items:center;z-index:9">
  <label>Размер
    <select id="size">
      <option value="3">3×3</option>
      <option value="4" selected>4×4</option>
      <option value="5">5×5</option>
    </select>
  </label>
  <label>Сдвиг
    <input type="number" id="shift" value="0" style="width:60px">
  </label>
  <label>Множитель
    <input type="number" id="mult" value="1" style="width:60px">
  </label>
  <label>Шрифт
    <select id="fontSize">
      <option value="16">16px</option>
      <option value="18" selected>18px</option>
      <option value="20">20px</option>
      <option value="24">24px</option>
      <option value="28">28px</option>
      <option value="32">32px</option>
    </select>
  </label>
  <button id="viewBtn">Просмотр</button>
  <button id="fillBtn">Заполнение</button>
  <button id="resetBtn">Сброс</button>
  <button id="checkBtn">Проверить</button>
</div>

<div id="boardContainer">
  <div id="board"></div>
  <div id="magicSum"></div>
</div>

<script>
// ===== Генерация магических квадратов =====
function generateOddMagic(n){
  const a=Array.from({length:n},()=>Array(n).fill(0));
  let num=1,i=0,j=Math.floor(n/2);
  while(num<=n*n){
    a[i][j]=num++;
    let ni=(i-1+n)%n,nj=(j+1)%n;
    if(a[ni][nj]!==0)i=(i+1)%n;else{i=ni;j=nj;}
  }
  return a;
}
function generate4x4(){
  const n=4;
  let g=Array.from({length:n},(_,i)=>Array.from({length:n},(_,j)=>i*n+j+1));
  const swap=[[0,0],[0,3],[1,1],[1,2],[2,1],[2,2],[3,0],[3,3]];
  swap.forEach(([r,c])=>g[r][c]=n*n+1-g[r][c]);
  return g;
}
function generateMagic(n){
  if(n%2===1) return generateOddMagic(n);
  if(n===4) return generate4x4();
  return Array.from({length:n},(_,i)=>Array.from({length:n},(_,j)=>i*n+j+1));
}

// ===== Преобразование =====
function transform(base,shift=0,mult=1){
  return base.map(r=>r.map(v=>v*mult+shift));
}

// ===== Рендер =====
const board=document.getElementById('board');
const magicSumDisplay=document.getElementById('magicSum');
let currentFull=null;
let mode='view';
let mask=null;

function renderGrid(matrix,maskToUse){
  const n=matrix.length;
  board.innerHTML='';
  const fontSize = Number(document.getElementById('fontSize').value);
  const cellSize=Math.min(66, Math.floor((window.innerWidth-20)/n));
  board.style.gridTemplateColumns=`repeat(${n},${cellSize}px)`;
  for(let r=0;r<n;r++){
    for(let c=0;c<n;c++){
      if(maskToUse && maskToUse[r][c]){
        const inp=document.createElement('input');
        inp.type='number'; inp.className='cell'; inp.value='';
        inp.style.fontSize = fontSize + 'px';
        inp.dataset.r=r; inp.dataset.c=c;
        inp.addEventListener('input',()=>checkLogicStep());
        board.appendChild(inp);
      } else {
        const cell=document.createElement('div');
        cell.className='cell'; cell.textContent=matrix[r][c];
        cell.style.fontSize = fontSize + 'px';
        board.appendChild(cell);
      }
    }
  }
}

// ===== Маска с проверкой удобства заполнения =====
function buildLogicalMask(n){
  const maxAttempts = 100;
  let attempt = 0;
  while(attempt < maxAttempts){
    const mask=Array.from({length:n},()=>Array(n).fill(true));

    // Почти полная строка
    const fullRow=Math.floor(Math.random()*n);
    const emptyCol=Math.floor(Math.random()*n);
    for(let c=0;c<n;c++) mask[fullRow][c]=false;
    mask[fullRow][emptyCol]=true;

    // Опорные числа для остальных строк
    let supportCount;
    if(n===3) supportCount=1;
    else if(n===4) supportCount=2;
    else supportCount=3;

    for(let r=0;r<n;r++){
      if(r===fullRow) continue;
      let placed=0;
      while(placed<supportCount){
        const c=Math.floor(Math.random()*n);
        if(mask[r][c]){
          mask[r][c]=false;
          placed++;
        }
      }
    }

    // Проверка: строки, столбцы и диагонали не должны быть полностью открыты
    function lineFull(line){ return line.every(([r,c])=>!mask[r][c]); }
    let anyFull=false;
    for(let r=0;r<n;r++){
      if(lineFull(Array.from({length:n},(_,c)=>[r,c]))) anyFull=true;
    }
    for(let c=0;c<n;c++){
      if(lineFull(Array.from({length:n},(_,r)=>[r,c]))) anyFull=true;
    }
    if(lineFull(Array.from({length:n},(_,i)=>[i,i]))) anyFull=true;
    if(lineFull(Array.from({length:n},(_,i)=>[i,n-1-i]))) anyFull=true;

    if(!anyFull) return mask;
    attempt++;
  }
  return mask;
}

// ===== Проверка ввода =====
function checkLogicStep(){
  if(!currentFull) return;
  const n=currentFull.length;
  const nodes=board.children;
  for(let i=0;i<n*n;i++){
    const r=Math.floor(i/n),c=i%n;
    const node=nodes[i];
    if(node.tagName==='INPUT'){
      const val=Number(node.value);
      if(val===currentFull[r][c]){
        node.classList.add('correct'); node.classList.remove('wrong');
      } else {
        node.classList.add('wrong'); node.classList.remove('correct');
      }
    }
  }
}

// ===== Генерация и рендер =====
function generateAndRender(chosenMode){
  mode=chosenMode;
  const n=Number(document.getElementById('size').value);
  const shift=Number(document.getElementById('shift').value);
  const mult=Number(document.getElementById('mult').value);
  const base=generateMagic(n);
  currentFull=transform(base,shift,mult);

  if(mode==='view'){
    renderGrid(currentFull,Array.from({length:n},()=>Array(n).fill(false)));
  } else if(mode==='fill'){
    mask=buildLogicalMask(n);
    renderGrid(currentFull,mask);
  }

  const M=n*(n*n+1)/2*mult+n*shift;
  magicSumDisplay.textContent=`Магическая сумма: ${M}`;
}

// ===== Проверка решения =====
function checkSolution(){
  if(!currentFull) return alert('Нет квадрата');
  const n=currentFull.length;
  const nodes=board.children;
  let allCorrect=true;
  for(let i=0;i<n*n;i++){
    const r=Math.floor(i/n),c=i%n;
    const node=nodes[i];
    if(node.tagName==='INPUT'){
      const val=Number(node.value);
      if(val===currentFull[r][c]){
        node.classList.add('correct'); node.classList.remove('wrong');
      } else {
        node.classList.add('wrong'); node.classList.remove('correct');
        allCorrect=false;
      }
    }
  }
  if(allCorrect) alert('Поздравляю! Всё верно!');
  else alert('Есть ошибки, подсветка показывает их.');
}

// ===== Кнопки =====
document.getElementById('viewBtn').addEventListener('click',()=>generateAndRender('view'));
document.getElementById('fillBtn').addEventListener('click',()=>generateAndRender('fill'));
document.getElementById('resetBtn').addEventListener('click',()=>generateAndRender(mode));
document.getElementById('checkBtn').addEventListener('click',checkSolution);

const toggleBtn=document.getElementById('toggleControls');
const controlsWrapper=document.getElementById('controlsWrapper');
toggleBtn.addEventListener('click',()=>{
  if(controlsWrapper.classList.contains('hidden')){
    controlsWrapper.classList.remove('hidden');
    toggleBtn.textContent='Скрыть настройки';
  } else {
    controlsWrapper.classList.add('hidden');
    toggleBtn.textContent='Показать настройки';
  }
});

// ===== Изменение шрифта =====
document.getElementById('fontSize').addEventListener('change',()=>generateAndRender(mode));

// ===== Инициализация =====
generateAndRender('fill');
</script>
</body>
</html>
