<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Тренажёры</title>

<style>
html, body{
height:100%;
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
overflow:auto;
-webkit-tap-highlight-color: transparent;
}

/* верх */
#topBar{
height:60px;
background:rgba(0,0,0,0.35);
backdrop-filter: blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 14px;
position:fixed;
top:0;left:0;right:0;
z-index:10;
}

.left{display:flex;align-items:center;gap:10px;}

#backBtn,#fsBtn{
cursor:pointer;
padding:6px 10px;
border-radius:10px;
background:rgba(255,255,255,0.1);
}

/* ПК группы */
#desktop{
display:none;
grid-template-columns:1fr;
gap:16px;
padding:80px 14px 14px;
}

.bigCard{
height:42vh;
min-height:280px;
border-radius:28px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.12);
}

.bigCard .icon{font-size:120px;margin-bottom:10px;}
.bigCard .label{font-size:34px;font-weight:800;}

/* ПК список */
#grid{
display:none;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:16px;
padding:80px 14px 14px;
}

.card{
aspect-ratio:1/1;
border-radius:22px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.10);
border:1px solid rgba(255,255,255,0.15);
}

.card .icon{font-size:60px;}
.card .label{font-size:16px;text-align:center;font-weight:bold;}

/* МОБИЛЬНЫЙ */
#mobile{
display:none;
height:100vh;
width:100%;
position:relative;
overflow:hidden;
touch-action:pan-y;
}

.page{
position:absolute;
width:100%;
height:calc(100vh - 60px);
top:60px;
display:flex;
align-items:center;
justify-content:center;
}

.cardFull{
width:90%;
height:70%;
border-radius:28px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.12);
}

.cardFull .icon{font-size:90px;margin-bottom:10px;}
.cardFull .label{font-size:26px;font-weight:bold;}

</style>
</head>

<body>

<div id="topBar">
<div class="left">
<div id="backBtn">←</div>
<div id="title">Тренажёры</div>
</div>
<div id="fsBtn">⛶</div>
</div>

<div id="desktop"></div>
<div id="grid"></div>
<div id="mobile"></div>

<script>

let state="groups";
let currentGroup=null;

let desktop=document.getElementById("desktop");
let grid=document.getElementById("grid");
let mobile=document.getElementById("mobile");
let title=document.getElementById("title");

/* группы */
let groups=[
{name:"Чтение", icon:"📘"},
{name:"Математика", icon:"🧮"},
{name:"Разное", icon:"🧠"}
];

/* данные */
let data=[
{name:"Алфавит", icon:"🅰️", group:"Чтение", file:"apps/reading/alfavit.html"},
{name:"Читалка", icon:"📖", group:"Чтение", file:"apps/reading/chitalka.html"},
{name:"Лавина", icon:"🏔️", group:"Чтение", file:"apps/reading/lavina.html"},
{name:"Анаграммы", icon:"🧠", group:"Чтение", file:"apps/reading/pytal.html"},
{name:"Радуга", icon:"🌈", group:"Чтение", file:"apps/reading/raduga.html"},
{name:"Слоги", icon:"🔤", group:"Чтение", file:"apps/reading/slogi.html"},

{name:"Домики", icon:"🏠", group:"Математика", file:"apps/math/domiky.html"},
{name:"Примеры", icon:"➗", group:"Математика", file:"apps/math/primery.html"},

{name:"Доска", icon:"🖊️", group:"Разное", file:"apps/other/doska.html"},
{name:"Лабиринт", icon:"🌀", group:"Разное", file:"apps/other/labyrint.html"},
{name:"Что изменилось", icon:"🧠", group:"Разное", file:"apps/other/chto_izmenilos.html"}
];

/* РЕНДЕР */
function render(){

let isMobile = window.innerWidth < 768;

desktop.style.display="none";
grid.style.display="none";
mobile.style.display="none";

desktop.innerHTML="";
grid.innerHTML="";
mobile.innerHTML="";

if(isMobile){
renderMobile();
mobile.style.display="block";
}else{
renderDesktop();
}

}

/* ПК */
function renderDesktop(){

if(state==="groups"){
title.textContent="Тренажёры";

groups.forEach(g=>{
let div=document.createElement("div");
div.className="bigCard";

div.innerHTML=`
<div class="icon">${g.icon}</div>
<div class="label">${g.name}</div>
`;

div.onclick=()=>{
state="list";
currentGroup=g.name;
render();
};

desktop.appendChild(div);
});

desktop.style.display="grid";
}

if(state==="list"){
title.textContent=currentGroup;

data.filter(t=>t.group===currentGroup).forEach(t=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="icon">${t.icon}</div>
<div class="label">${t.name}</div>
`;

div.onclick=()=>{
window.open(t.file,"_self");
};

grid.appendChild(div);
});

grid.style.display="grid";
}
}

/* МОБИЛЬНЫЙ СВАЙП */
let currentIndex=0;
let startX=0;
let moveX=0;
let dragging=false;

function renderMobile(){

let list = state==="groups" ? groups : data.filter(t=>t.group===currentGroup);

mobile.innerHTML="";

list.forEach((item,i)=>{

let div=document.createElement("div");
div.className="page";

div.style.transform=`translateX(${(i-currentIndex)*100}%)`;

div.innerHTML=`
<div class="cardFull">
<div class="icon">${item.icon}</div>
<div class="label">${item.name}</div>
</div>
`;

div.onclick=()=>{
if(state==="groups"){
state="list";
currentGroup=item.name;
currentIndex=0;
render();
}else{
window.open(item.file,"_self");
}
};

mobile.appendChild(div);

});

/* свайп */
mobile.ontouchstart=(e)=>{
startX=e.touches[0].clientX;
dragging=true;
};

mobile.ontouchmove=(e)=>{
if(!dragging) return;

moveX=e.touches[0].clientX;
let diff=moveX-startX;

Array.from(mobile.children).forEach((card,i)=>{
card.style.transition="none";
card.style.transform=`translateX(${(i-currentIndex)*100 + diff/3}%)`;
});

};

mobile.ontouchend=()=>{

dragging=false;

let diff=moveX-startX;

Array.from(mobile.children).forEach(card=>{
card.style.transition="transform 0.4s ease";
});

if(diff>70) currentIndex--;
if(diff<-70) currentIndex++;

if(currentIndex<0) currentIndex=0;

Array.from(mobile.children).forEach((card,i)=>{
card.style.transform=`translateX(${(i-currentIndex)*100}%)`;
});

};

}

/* back */
document.getElementById("backBtn").onclick=()=>{
if(state==="list"){
state="groups";
render();
}
};

render();
window.onresize=render;

</script>

</body>
</html>
