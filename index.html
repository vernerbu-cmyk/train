<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Домики</title>

<style>
:root{
--blue:#1E3F8A;
--orange:#FF6A00;
--shadow:#c94f00;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
text-align:center;
user-select:none;
color:#222;
}

.topbar{
background:var(--blue);
padding:14px 10px;
position:sticky;
top:0;
z-index:5;
}

.topbar h1{
margin:0;
color:#fff;
font-style:italic;
font-size:28px;
font-weight:700;
}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
padding:12px;
}

select,button,input{
font-size:16px;
padding:10px 12px;
border-radius:10px;
border:none;
}

select,input{
border:2px solid var(--orange);
background:#fff;
}

button{
background:var(--orange);
color:#fff;
font-weight:700;
box-shadow:0 4px 0 var(--shadow);
cursor:pointer;
}

button:active{
transform:translateY(2px);
box-shadow:0 2px 0 var(--shadow);
}

#house{
padding:8px 8px 20px;
}

.house{
display:flex;
flex-direction:column;
align-items:center;
width:100%;
}

.roof{
height:72px;
width:min(92vw,430px);
background:var(--orange);
clip-path:polygon(50% 0%,0% 100%,100% 100%);
display:flex;
justify-content:center;
align-items:flex-end;
padding-bottom:8px;
font-size:30px;
font-weight:900;
color:#fff;
}

.floors{
display:flex;
flex-direction:column-reverse;
gap:8px;
width:min(92vw,430px);
}

.floor{
display:flex;
gap:0;
border:3px solid transparent;
border-radius:10px;
transition:.2s;
}

.part{
width:50%;
min-height:68px;
background:#fff;
border:2px solid #d8d8d8;
display:flex;
align-items:center;
justify-content:center;
flex-wrap:wrap;
gap:2px;
padding:6px;
position:relative;
}

.part span{
position:absolute;
top:4px;
left:6px;
font-size:13px;
font-weight:700;
opacity:.25;
pointer-events:none;
}

.token{
width:34px;
height:34px;
object-fit:contain;
touch-action:none;
cursor:grab;
}

.dragging{
position:fixed;
z-index:9999;
pointer-events:none;
cursor:grabbing;
}

#pool{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
padding:10px;
min-height:60px;
}

.good{
border-color:#2dbd59 !important;
background:#eefced;
}

.bad{
border-color:#e14646 !important;
background:#fff0f0;
}

input.answer{
width:54px;
text-align:center;
font-weight:700;
padding:8px 4px;
}

.copy{
position:fixed;
right:8px;
bottom:6px;
font-size:11px;
opacity:.45;
}

@media (max-width:600px){
.topbar h1{font-size:24px;}
select,button,input{font-size:15px;padding:9px 10px;}
.part{min-height:60px;}
.token{width:30px;height:30px;}
.roof{font-size:26px;height:66px;}
}
</style>
</head>

<body>

<div class="topbar">
<h1>Домики</h1>
</div>

<div class="controls">

<select id="numberSelect">
<option>3</option>
<option>4</option>
<option selected>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select id="modeSelect">
<option value="labubu">Лабубу</option>
<option value="digits">Цифры</option>
<option value="fill">Заполни пропуск</option>
<option value="fix">Исправь домик</option>
</select>

<select id="limitMode">
<option value="limited">С лимитом</option>
<option value="unlimited">Без лимита</option>
</select>

<button onclick="startGame()">Старт</button>
<button onclick="checkHouse()">Проверить</button>

</div>

<div id="house"></div>
<div id="pool"></div>

<div class="copy">© verner</div>

<script>
const imgSrc="https://catalog-cdn.detmir.st/media/M5ixUcmGflIrqy2RW3fyx1ZTxhssvWvb8UWwZeiKjIo=.jpeg";

let dragged=null, startParent=null, offsetX=0, offsetY=0;

/* ---------- START ---------- */
function startGame(){
house.innerHTML="";
pool.innerHTML="";

const N = +numberSelect.value;
const mode = modeSelect.value;

if(mode==="labubu") createLabubu(N);
if(mode==="digits") createDigits(N);
if(mode==="fill") createFill(N);
if(mode==="fix") createFix(N);
}

/* ---------- BASE HOUSE ---------- */
function createBaseHouse(N){
const wrap=document.createElement("div");
wrap.className="house";

const roof=document.createElement("div");
roof.className="roof";
roof.textContent=N;
roof.dataset.value=N;

const floors=document.createElement("div");
floors.className="floors";

/* ГЛАВНЫЙ ФИКС: этажей ровно N+1 */
for(let i=0;i<=N;i++){

const floor=document.createElement("div");
floor.className="floor";

const left=document.createElement("div");
left.className="part left";

const right=document.createElement("div");
right.className="part right";

left.dataset.correct=i;
right.dataset.correct=N-i;

floor.append(left,right);
floors.append(floor);
}

wrap.append(roof,floors);
house.append(wrap);

return floors.querySelectorAll(".floor");
}

/* ---------- LABUBU ---------- */
function createLabubu(N){
const floors=createBaseHouse(N);
const limited = limitMode.value==="limited";

floors.forEach((floor,index)=>{
const left=floor.children[0];
const right=floor.children[1];

if(limited){
left.innerHTML=`<span>${index}</span>`;
right.innerHTML=`<span>${N-index}</span>`;
left.dataset.limit=index;
right.dataset.limit=N-index;
}else{
left.dataset.limit=999;
right.dataset.limit=999;
}
});

createPool(N*(N+1));
}

/* ---------- DIGITS ---------- */
function createDigits(N){
const floors=createBaseHouse(N);

floors.forEach(floor=>{
floor.children[0].innerHTML=`<input class="answer" type="number">`;
floor.children[1].innerHTML=`<input class="answer" type="number">`;
});
}

/* ---------- FILL ---------- */
function createFill(N){
const floors=createBaseHouse(N);

floors.forEach((floor,index)=>{
const left=index;
const right=N-index;

if(Math.random()<0.5){
floor.children[0].textContent=left;
floor.children[1].innerHTML=`<input class="answer" type="number">`;
floor.children[1].dataset.need=right;
}else{
floor.children[1].textContent=right;
floor.children[0].innerHTML=`<input class="answer" type="number">`;
floor.children[0].dataset.need=left;
}
});
}

/* ---------- FIX ---------- */
function createFix(N){
const floors=createBaseHouse(N);
createPool(Math.ceil(N/2));

floors.forEach((floor,index)=>{
let left=index;
let right=N-index;

/* 70% этажей с ошибкой */
if(Math.random()<0.7){
if(Math.random()<0.5) left++;
else right++;
}

addTokens(floor.children[0],left);
addTokens(floor.children[1],right);

floor.children[0].dataset.limit=999;
floor.children[1].dataset.limit=999;
});
}

/* ---------- TOKEN POOL ---------- */
function createPool(count){
for(let i=0;i<count;i++){
const t=makeToken();
pool.append(t);
}
}

function makeToken(){
const img=document.createElement("img");
img.src=imgSrc;
img.className="token";
img.addEventListener("pointerdown",dragStart);
return img;
}

function addTokens(part,count){
for(let i=0;i<count;i++) part.append(makeToken());
}

/* ---------- DRAG ---------- */
function dragStart(e){
dragged=e.target;
startParent=dragged.parentNode;

const r=dragged.getBoundingClientRect();
offsetX=e.clientX-r.left;
offsetY=e.clientY-r.top;

document.body.appendChild(dragged);
dragged.classList.add("dragging");

moveDrag(e);

document.addEventListener("pointermove",moveDrag);
document.addEventListener("pointerup",dropDrag,{once:true});
}

function moveDrag(e){
if(!dragged) return;
dragged.style.left=(e.clientX-offsetX)+"px";
dragged.style.top=(e.clientY-offsetY)+"px";
}

function dropDrag(e){
document.removeEventListener("pointermove",moveDrag);

if(!dragged) return;

const el=document.elementFromPoint(e.clientX,e.clientY);
const part=el?.closest(".part");
const poolBox=el?.closest("#pool");

let placed=false;

if(part){
const limit=+(part.dataset.limit||999);
const now=part.querySelectorAll(".token").length;

if(now<limit || limit===999){
part.appendChild(dragged);
placed=true;
}
}

if(!placed && poolBox){
pool.appendChild(dragged);
placed=true;
}

if(!placed && startParent){
startParent.appendChild(dragged);
}

dragged.classList.remove("dragging");
dragged.style.left="";
dragged.style.top="";
dragged=null;
startParent=null;
}

/* ---------- CHECK ---------- */
function checkHouse(){
const mode=modeSelect.value;
const N=+document.querySelector(".roof").dataset.value;

document.querySelectorAll(".floor").forEach(floor=>{
floor.classList.remove("good","bad");

let ok=false;

if(mode==="labubu" || mode==="fix"){
const left=floor.children[0].querySelectorAll(".token").length;
const right=floor.children[1].querySelectorAll(".token").length;
ok=(left+right===N);
}

if(mode==="digits"){
const left=+floor.children[0].querySelector("input").value;
const right=+floor.children[1].querySelector("input").value;
ok=(left+right===N);
}

if(mode==="fill"){
const leftInput=floor.children[0].querySelector("input");
const rightInput=floor.children[1].querySelector("input");

if(leftInput){
ok=(+leftInput.value===+floor.children[0].dataset.need);
}
if(rightInput){
ok=(+rightInput.value===+floor.children[1].dataset.need);
}
}

floor.classList.add(ok ? "good" : "bad");
});
}

startGame();
</script>

</body>
</html>
