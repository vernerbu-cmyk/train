<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Тренажёры</title>

<style>
html, body{
height:100%;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
overflow:auto;
-webkit-tap-highlight-color: transparent;
}

/* верх */
#topBar{
height:60px;
background:rgba(0,0,0,0.35);
backdrop-filter: blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 14px;
position:fixed;
top:0;left:0;right:0;
z-index:10;
}

.left{
display:flex;
align-items:center;
gap:10px;
}

#backBtn,#fsBtn{
cursor:pointer;
padding:6px 10px;
border-radius:10px;
background:rgba(255,255,255,0.1);
}

/* ================= DESKTOP ================= */
#desktop{
display:grid;
grid-template-columns:1fr;
gap:16px;
padding:80px 14px 14px;
}

.bigCard{
height:42vh;
min-height:280px;

border-radius:28px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

cursor:pointer;

background:rgba(255,255,255,0.08);
backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.12);

box-shadow:0 14px 35px rgba(0,0,0,0.5);
}

.bigCard .icon{
font-size:130px;
margin-bottom:10px;
}

.bigCard .label{
font-size:36px;
font-weight:800;
}

/* ================= LIST ================= */
#grid{
display:none;
grid-template-columns:repeat(2,1fr);
gap:16px;
padding:80px 14px 14px;
}

@media(min-width:900px){
#grid{
grid-template-columns:repeat(4,1fr);
}
}

.card{
aspect-ratio:1/1;
border-radius:22px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.10);
backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.15);
}

.card .icon{
font-size:70px;
margin-bottom:8px;
}

.card .label{
font-size:18px;
font-weight:bold;
text-align:center;
}

/* ================= MOBILE ================= */
#mobile{
display:none;
height:100vh;
width:100%;
position:relative;
touch-action:pan-y;
overflow:hidden;
}

.page{
position:absolute;
width:100%;
height:calc(100vh - 60px);
top:60px;

display:flex;
align-items:center;
justify-content:center;

transition:transform 0.35s ease;
}

.cardFull{
width:90%;
height:70%;
border-radius:28px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.12);

text-align:center;
}

.cardFull .icon{
font-size:100px;
margin-bottom:12px;
}

.cardFull .label{
font-size:28px;
font-weight:bold;
}
</style>
</head>

<body>

<div id="topBar">
<div class="left">
<div id="backBtn">←</div>
<div id="title">Тренажёры</div>
</div>
<div id="fsBtn">⛶</div>
</div>

<div id="desktop"></div>
<div id="grid"></div>
<div id="mobile"></div>

<script>

let state="groups";
let currentGroup=null;

let desktop=document.getElementById("desktop");
let grid=document.getElementById("grid");
let mobile=document.getElementById("mobile");
let title=document.getElementById("title");

/* группы */
let groups=[
{name:"Чтение", icon:"📘"},
{name:"Математика", icon:"🧮"},
{name:"Разное", icon:"🧠"}
];

/* ТВОИ ТРЕНАЖЁРЫ */
let data=[
{name:"Алфавит", icon:"🅰️", group:"Чтение", file:"apps/reading/alfavit.html"},
{name:"Читалка", icon:"📖", group:"Чтение", file:"apps/reading/chitalka.html"},
{name:"Лавина", icon:"🏔️", group:"Чтение", file:"apps/reading/lavina.html"},
{name:"Нитки", icon:"🧵", group:"Чтение", file:"apps/reading/nitki.html"},
{name:"Перевёртыш", icon:"🔄", group:"Чтение", file:"apps/reading/pereverton.html"},
{name:"Анаграммы", icon:"🧠", group:"Чтение", file:"apps/reading/pytal.html"},
{name:"Радуга", icon:"🌈", group:"Чтение", file:"apps/reading/raduga.html"},
{name:"Слоги", icon:"🔤", group:"Чтение", file:"apps/reading/slogi.html"},
{name:"Столбики", icon:"🐌", group:"Чтение", file:"apps/reading/stolby.html"},

{name:"Домики", icon:"🏠", group:"Математика", file:"apps/math/domiky.html"},
{name:"Магия", icon:"✨", group:"Математика", file:"apps/math/magia.html"},
{name:"Примеры", icon:"➗", group:"Математика", file:"apps/math/primery.html"},
{name:"Точки", icon:"🔵", group:"Математика", file:"apps/math/tochki.html"},

{name:"Доска", icon:"🖊️", group:"Разное", file:"apps/other/doska.html"},
{name:"Лабиринт", icon:"🌀", group:"Разное", file:"apps/other/labyrint.html"},

/* 🔥 ВОТ ОНО ВЕРНУЛОСЬ */
{name:"Что изменилось", icon:"🧠", group:"Разное", file:"apps/other/chto_izmenilos.html"}
];

/* render */
function render(){

let isMobile = window.innerWidth < 768;

desktop.style.display="none";
grid.style.display="none";
mobile.style.display="none";

desktop.innerHTML="";
grid.innerHTML="";
mobile.innerHTML="";

if(isMobile){
renderMobile();
mobile.style.display="block";
}else{
renderDesktop();
}

}

/* DESKTOP */
function renderDesktop(){

if(state==="groups"){
title.textContent="Тренажёры";

groups.forEach(g=>{
let div=document.createElement("div");
div.className="bigCard";

div.innerHTML=`
<div class="icon">${g.icon}</div>
<div class="label">${g.name}</div>
`;

div.onclick=()=>{
state="list";
currentGroup=g.name;
render();
};

desktop.appendChild(div);
});

desktop.style.display="grid";
}

if(state==="list"){
title.textContent=currentGroup;

data.filter(t=>t.group===currentGroup).forEach(t=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="icon">${t.icon}</div>
<div class="label">${t.name}</div>
`;

div.onclick=()=>{
window.open(t.file,"_self");
};

grid.appendChild(div);
});

grid.style.display="grid";
}
}

/* MOBILE SWIPE */
let index=0;
let startY=0;

function renderMobile(){

let list = state==="groups" ? groups : data.filter(t=>t.group===currentGroup);

list.forEach((item,i)=>{

let div=document.createElement("div");
div.className="page";
div.style.transform=`translateY(${(i-index)*100}%)`;

div.innerHTML=`
<div class="cardFull">
<div class="icon">${item.icon}</div>
<div class="label">${item.name}</div>
</div>
`;

div.onclick=()=>{
if(state==="groups"){
state="list";
currentGroup=item.name;
index=0;
render();
}else{
window.open(item.file,"_self");
}
};

mobile.appendChild(div);

});

mobile.ontouchstart=(e)=>{
startY=e.touches[0].clientY;
};

mobile.ontouchend=(e)=>{
let endY=e.changedTouches[0].clientY;

if(endY < startY-40) index++;
if(endY > startY+40) index--;

if(index<0) index=0;

render();
};

}

/* back */
document.getElementById("backBtn").onclick=()=>{
if(state==="list"){
state="groups";
render();
}
};

render();
window.onresize=render;

</script>

</body>
</html>
