<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Тренажёры</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
overflow:auto;
min-height:100vh;
-webkit-tap-highlight-color: transparent;
}

/* TOP */
#topBar{
height:60px;
position:fixed;
top:0;left:0;right:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 14px;
background:rgba(0,0,0,0.4);
backdrop-filter: blur(10px);
z-index:10;
}

#backBtn,#fsBtn{
padding:6px 10px;
border-radius:10px;
background:rgba(255,255,255,0.1);
cursor:pointer;
transition:0.15s;
}

#backBtn:active,#fsBtn:active{
transform:scale(0.9);
}

/* PC */
#desktop{
display:none;
padding:80px 14px;
grid-template-columns:1fr;
gap:16px;
}

.bigCard{
height:38vh;
min-height:240px;
border-radius:24px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.08);
cursor:pointer;
transition:0.15s;
}

.bigCard:active{transform:scale(0.96);}

.bigCard .icon{font-size:100px;}
.bigCard .label{font-size:30px;font-weight:bold;}

/* LIST */
#grid{
display:none;
padding:80px 14px;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:14px;
}

.card{
aspect-ratio:1/1;
border-radius:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.08);
cursor:pointer;
transition:0.15s;
}

.card:active{transform:scale(0.94);}

.card .icon{font-size:50px;}
.card .label{font-size:14px;text-align:center;font-weight:bold;}

/* MOBILE */
#mobile{
display:none;
height:100vh;
width:100%;
position:relative;
overflow:hidden;
touch-action:pan-y;
}

.page{
position:absolute;
width:100%;
height:calc(100vh - 60px);
top:60px;
display:flex;
justify-content:center;
align-items:center;
}

.cardFull{
width:85%;
height:65%;
border-radius:24px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.08);
transition:0.3s;
}

.cardFull .icon{font-size:85px;}
.cardFull .label{font-size:24px;font-weight:bold;}

/* 🔥 КОПИРАЙТ (исправлено) */
#copy{
position:fixed;
right:10px;
bottom:10px;
font-size:12px;
opacity:0.7;
z-index:9999;
pointer-events:none;
}

/* fullscreen mode */
:fullscreen body{
background:black;
}

</style>
</head>

<body>

<div id="topBar">
<div id="backBtn">←</div>
<div>Тренажёры</div>
<div id="fsBtn">⛶</div>
</div>

<div id="desktop"></div>
<div id="grid"></div>
<div id="mobile"></div>

<div id="copy">© verner</div>

<script>

let state="groups";
let currentGroup=null;

const desktop=document.getElementById("desktop");
const grid=document.getElementById("grid");
const mobile=document.getElementById("mobile");

const fsBtn=document.getElementById("fsBtn");

/* fullscreen */
function toggleFS(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen?.();
}else{
document.exitFullscreen?.();
}
}

fsBtn.onclick=toggleFS;

/* DATA */
const groups=[
{name:"Чтение", icon:"📘"},
{name:"Математика", icon:"🧮"},
{name:"Разное", icon:"🧠"}
];

const data=[
{name:"Алфавит", icon:"🅰️", group:"Чтение", file:"apps/reading/alfavit.html"},
{name:"Читалка", icon:"📖", group:"Чтение", file:"apps/reading/chitalka.html"},
{name:"Лавина", icon:"🏔️", group:"Чтение", file:"apps/reading/lavina.html"},
{name:"Анаграммы", icon:"🧠", group:"Чтение", file:"apps/reading/pytal.html"},
{name:"Радуга", icon:"🌈", group:"Чтение", file:"apps/reading/raduga.html"},

{name:"Домики", icon:"🏠", group:"Математика", file:"apps/math/domiky.html"},
{name:"Примеры", icon:"➗", group:"Математика", file:"apps/math/primery.html"},

{name:"Доска", icon:"🖊️", group:"Разное", file:"apps/other/doska.html"},
{name:"Лабиринт", icon:"🌀", group:"Разное", file:"apps/other/labyrint.html"}
];

let index=0;
let startX=0;
let moveX=0;
let dragging=false;

/* render */
function render(){

desktop.innerHTML="";
grid.innerHTML="";
mobile.innerHTML="";

let isMobile=window.innerWidth<768;

if(isMobile){
mobile.style.display="block";
desktop.style.display="none";
grid.style.display="none";
renderMobile();
}else{
mobile.style.display="none";
renderPC();
}
}

/* PC */
function renderPC(){

if(state==="groups"){
desktop.style.display="grid";

groups.forEach(g=>{
let d=document.createElement("div");
d.className="bigCard";
d.innerHTML=`<div class="icon">${g.icon}</div><div class="label">${g.name}</div>`;
d.onclick=()=>{
state="list";
currentGroup=g.name;
render();
};
desktop.appendChild(d);
});
}

if(state==="list"){
grid.style.display="grid";

data.filter(t=>t.group===currentGroup).forEach(t=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=`<div class="icon">${t.icon}</div><div class="label">${t.name}</div>`;
d.onclick=()=>window.open(t.file,"_self");
grid.appendChild(d);
});
}
}

/* MOBILE */
function renderMobile(){

let list=state==="groups"?groups:data.filter(t=>t.group===currentGroup);

list.forEach((item,i)=>{
let d=document.createElement("div");
d.className="page";

d.style.transform=`translateX(${(i-index)*100}%)`;

d.innerHTML=`
<div class="cardFull">
<div class="icon">${item.icon}</div>
<div class="label">${item.name}</div>
</div>
`;

d.onclick=()=>{
if(state==="groups"){
state="list";
currentGroup=item.name;
index=0;
render();
}else{
window.open(item.file,"_self");
}
};

mobile.appendChild(d);
});

/* swipe */
mobile.ontouchstart=(e)=>{
startX=e.touches[0].clientX;
dragging=true;
};

mobile.ontouchmove=(e)=>{
if(!dragging)return;

moveX=e.touches[0].clientX;
let diff=moveX-startX;

Array.from(mobile.children).forEach((c,i)=>{
c.style.transition="none";
c.style.transform=`translateX(${(i-index)*100 + diff/3}%)`;
});
};

mobile.ontouchend=()=>{
dragging=false;

let diff=moveX-startX;

Array.from(mobile.children).forEach(c=>{
c.style.transition="0.3s";
});

if(diff>60) index--;
if(diff<-60) index++;

if(index<0) index=0;

Array.from(mobile.children).forEach((c,i)=>{
c.style.transform=`translateX(${(i-index)*100}%)`;
});
};
}

/* back */
document.getElementById("backBtn").onclick=()=>{
if(state==="list"){
state="groups";
render();
}
};

render();
window.onresize=render;

</script>

</body>
</html>
