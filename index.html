<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Тренажёры</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
overflow:hidden;
-webkit-tap-highlight-color:transparent;
}

/* TOP */
#topBar{
height:60px;
position:fixed;
top:0;left:0;right:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 14px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:10;
}

#backBtn,#fsBtn{
min-width:48px;
height:48px;
border-radius:12px;
background:rgba(255,255,255,0.1);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
user-select:none;
}

/* ===== PC ===== */

#desktop{
display:none;
padding:90px 20px;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:24px;
height:100vh;
overflow:auto;
box-sizing:border-box;
}

#grid{
display:none;
padding:90px 20px;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
height:100vh;
overflow:auto;
box-sizing:border-box;
}

.bigCard{
height:360px;
border-radius:28px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.08);
cursor:pointer;
transition:0.2s;
}

.bigCard:active{transform:scale(0.97);}

.bigCard .icon{font-size:130px;}
.bigCard .label{font-size:36px;font-weight:bold;}

.card{
aspect-ratio:1/1;
border-radius:22px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.08);
cursor:pointer;
transition:0.2s;
}

.card:active{transform:scale(0.96);}

.card .icon{font-size:70px;}
.card .label{font-size:16px;font-weight:bold;text-align:center;}

/* ===== MOBILE (НОВАЯ ЛОГИКА) ===== */

#mobile{
display:none;
position:fixed;
top:60px;
left:0;
right:0;
bottom:0;
overflow:hidden;
}

#track{
display:flex;
height:100%;
transition:transform 0.35s ease;
}

.page{
min-width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.cardFull{
width:88%;
height:68%;
border-radius:24px;
background:rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:0.2s;
}

.cardFull:active{
transform:scale(0.97);
background:rgba(255,255,255,0.14);
}

.cardFull .icon{font-size:92px;}
.cardFull .label{font-size:26px;font-weight:bold;text-align:center;}

</style>
</head>

<body>

<div id="topBar">
<div id="backBtn">←</div>
<div>Тренажёры</div>
<div id="fsBtn">⛶</div>
</div>

<div id="desktop"></div>
<div id="grid"></div>

<div id="mobile">
<div id="track"></div>
</div>

<script>

let state="groups";
let currentGroup=null;
let index=0;

/* DOM */
const desktop=document.getElementById("desktop");
const grid=document.getElementById("grid");
const mobile=document.getElementById("mobile");
const track=document.getElementById("track");
const backBtn=document.getElementById("backBtn");
const fsBtn=document.getElementById("fsBtn");

/* DATA */
const groups=[
{name:"Чтение",icon:"📘"},
{name:"Математика",icon:"🧮"},
{name:"Разное",icon:"🧠"}
];

const data=[
{name:"Алфавит",icon:"🅰️",group:"Чтение",file:"apps/reading/alfavit.html"},
{name:"Читалка",icon:"📖",group:"Чтение",file:"apps/reading/chitalka.html"},
{name:"Лавина",icon:"🏔️",group:"Чтение",file:"apps/reading/lavina.html"},
{name:"Нитки",icon:"🧵",group:"Чтение",file:"apps/reading/nitki.html"},
{name:"Перевёртыш",icon:"🔄",group:"Чтение",file:"apps/reading/pereverton.html"},
{name:"Анаграммы",icon:"🧠",group:"Чтение",file:"apps/reading/pytal.html"},
{name:"Радуга",icon:"🌈",group:"Чтение",file:"apps/reading/raduga.html"},
{name:"Слоги",icon:"🔤",group:"Чтение",file:"apps/reading/slogi.html"},
{name:"Столбики",icon:"🐌",group:"Чтение",file:"apps/reading/stolby.html"},
{name:"Таблицы",icon:"📋",group:"Чтение",file:"apps/reading/tablitsy.html"},

{name:"Домики",icon:"🏠",group:"Математика",file:"apps/math/domiky.html"},
{name:"Магия",icon:"✨",group:"Математика",file:"apps/math/magia.html"},
{name:"Примеры",icon:"➗",group:"Математика",file:"apps/math/primery.html"},
{name:"Точки",icon:"🔵",group:"Математика",file:"apps/math/tochki.html"},

{name:"Доска",icon:"🖊️",group:"Разное",file:"apps/other/doska.html"},
{name:"Лабиринт",icon:"🌀",group:"Разное",file:"apps/other/labyrint.html"},
{name:"Что изменилось",icon:"👀",group:"Разное",file:"apps/other/chto_izmenilos.html"}
];

/* FULLSCREEN */
fsBtn.onclick=()=>{
if(!document.fullscreenElement){
document.documentElement.requestFullscreen?.();
}else{
document.exitFullscreen?.();
}
};

/* ===== RENDER ===== */

function render(){

desktop.innerHTML="";
grid.innerHTML="";
track.innerHTML="";

desktop.style.display="none";
grid.style.display="none";
mobile.style.display="none";

const isMobile = window.innerWidth < 768;

/* ===== MOBILE ===== */
if(isMobile){
mobile.style.display="block";

let list = state==="groups"
? groups
: data.filter(x=>x.group===currentGroup);

list.forEach((item,i)=>{

let page=document.createElement("div");
page.className="page";

page.innerHTML=`
<div class="cardFull">
<div class="icon">${item.icon}</div>
<div class="label">${item.name}</div>
</div>
`;

page.onclick=()=>{
if(state==="groups"){
state="list";
currentGroup=item.name;
index=0;
render();
}else{
location.href=item.file;
}
};

track.appendChild(page);
});

updateTrack();
setupSwipe();
return;
}

/* ===== PC GROUPS ===== */
if(state==="groups"){
desktop.style.display="grid";

groups.forEach(g=>{
let d=document.createElement("div");
d.className="bigCard";
d.innerHTML=`<div class="icon">${g.icon}</div><div class="label">${g.name}</div>`;

d.onclick=()=>{
state="list";
currentGroup=g.name;
render();
};

desktop.appendChild(d);
});

return;
}

/* ===== PC LIST ===== */
grid.style.display="grid";

data.filter(x=>x.group===currentGroup).forEach(t=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=`<div class="icon">${t.icon}</div><div class="label">${t.name}</div>`;
d.onclick=()=>location.href=t.file;
grid.appendChild(d);
});

}

/* ===== SWIPE (НОВЫЙ СТАБИЛЬНЫЙ) ===== */

let startX=0;
let moveX=0;
let dragging=false;

function setupSwipe(){

track.onpointerdown=(e)=>{
startX=e.clientX;
moveX=e.clientX;
dragging=true;
track.style.transition="none";
};

track.onpointermove=(e)=>{
if(!dragging)return;

moveX=e.clientX;
let diff=moveX-startX;

track.style.transform=`translateX(calc(${-index*100}% + ${diff}px))`;
};

track.onpointerup=()=>{
if(!dragging)return;
dragging=false;

let diff=moveX-startX;

if(diff>80) index--;
if(diff<-80) index++;

limitIndex();
updateTrack(true);
};

track.onpointercancel=()=>track.onpointerup();
}

function limitIndex(){
const max = track.children.length - 1;
if(index<0) index=0;
if(index>max) index=max;
}

function updateTrack(anim=false){
track.style.transition = anim ? "transform 0.35s ease" : "none";
track.style.transform = `translateX(${-index*100}%)`;
}

/* BACK */
backBtn.onclick=()=>{
if(state==="list"){
state="groups";
currentGroup=null;
index=0;
render();
}
};

render();
window.onresize=render;

</script>

</body>
</html>
