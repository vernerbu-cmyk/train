<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Исчезающий текст — полный тренажёр</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#fffaf2; }
header{background:orange;color:white;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-weight:bold;font-size:20px;}
.speed{display:flex;align-items:center;gap:6px;font-size:14px;}
input[type=range]{width:130px;}
.toggles{display:flex;align-items:center;font-size:14px;gap:10px;}
.toggles input[type=checkbox]{cursor:pointer;}
#toggleSettings{font-size:26px;background:none;border:none;color:white;cursor:pointer;}
.controls{margin:10px;display:flex;justify-content:center;gap:10px;}
button.main{font-size:18px;padding:8px 18px;background:orange;color:white;border:none;border-radius:6px;cursor:pointer;}
#settings{display:none;background:#fff3e0;padding:12px;}
#settings textarea,#settings select{width:100%;margin-top:8px;font-size:16px;}
#settings button{margin-top:8px;}
#text{padding:16px;max-width:900px;margin:auto;font-size:30px;line-height:1.6;text-align:justify;word-wrap:break-word;background:white;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
#words,#time{position:fixed;right:10px;padding:6px 10px;border-radius:6px;font-size:16px;}
#words{bottom:10px;background:#ffe0b2;}
#time{bottom:48px;background:#c8e6c9;}
</style>
</head>
<body>
<header>
  <div class="logo">ЛидерГен</div>
  <div class="speed"><span>Медленно</span><input id="speed" type="range" min="0" max="9" value="4"><span>Быстро</span></div>
  <div class="toggles">
    <label><input type="checkbox" id="paint"> Белый</label>
    <label><input type="checkbox" id="reverseMode"> Задом наперёд</label>
  </div>
  <button id="toggleSettings">⬇</button>
</header>

<div class="controls">
  <button class="main" id="start">Старт</button>
  <button class="main" id="stop">Стоп</button>
  <button class="main" id="repeat">Повтор</button>
</div>

<div id="settings">
  <select id="selector"></select>
  <textarea id="newText" placeholder="Вставь свой текст"></textarea>
  <button class="main" id="add">Добавить текст</button>
</div>

<div id="text"></div>
<div id="words"></div>
<div id="time">Время: 0 сек</div>

<script>
const speeds=[2,1.75,1.5,1.25,1,0.75,0.5,0.4,0.25,0.1];

let texts=JSON.parse(localStorage.getItem("texts"))||[
  "Это пробный текст для проверки работы тренажёра. Каждое слово должно исчезать или белеть!"
];

if(!localStorage.getItem("texts")){
  localStorage.setItem("texts", JSON.stringify(texts));
}

let spans=[], originalWords=[], i=0, running=false, timer=null, startTime=0;

const textBox=document.getElementById("text");
const selector=document.getElementById("selector");
const wordsBox=document.getElementById("words");
const timeBox=document.getElementById("time");
const paint=document.getElementById("paint");
const reverseMode=document.getElementById("reverseMode");
const settings=document.getElementById("settings");
const toggleSettings=document.getElementById("toggleSettings");
const newText=document.getElementById("newText");
const add=document.getElementById("add");
const speed=document.getElementById("speed");
const startBtn=document.getElementById("start");
const stopBtn=document.getElementById("stop");
const repeatBtn=document.getElementById("repeat");

/* ===== SELECTOR ===== */
function updateSelector(){
  selector.innerHTML="";
  texts.forEach((_,idx)=>{const o=document.createElement("option");o.value=idx;o.textContent="Текст "+(idx+1);selector.appendChild(o);});
}
updateSelector();
selector.value = 0;

/* ===== REVERSE WITHOUT PUNCT ===== */
function formatWord(word){
  if(reverseMode.checked){
    let punct="";
    if(/[\.,!?:;]$/.test(word)){
      punct = word.slice(-1);
      word = word.slice(0,-1);
    }
    return word.split("").reverse().join("") + punct;
  }
  return word;
}

/* ===== SHOW TEXT ===== */
function showText(){
  let t = texts[selector.value];
  originalWords = t.split(" "); // сохраняем оригинальные слова
  textBox.innerHTML = originalWords.map(w => `<span>${formatWord(w)}</span>`).join(" ");
  spans = [...textBox.querySelectorAll("span")];
  wordsBox.textContent = "Слов: "+spans.length;
  timeBox.textContent = "Время: 0 сек";
  i=0;
}
showText();
selector.onchange=showText;

/* ===== TOGGLE SETTINGS ===== */
toggleSettings.onclick=()=>{settings.style.display=settings.style.display==="block"?"none":"block";};

/* ===== ADD TEXT ===== */
add.onclick=()=>{
  const t = newText.value.replace(/\s+/g," ").trim();
  if(!t) return;
  texts.push(t);
  localStorage.setItem("texts", JSON.stringify(texts));
  updateSelector();
  selector.value = texts.length-1;
  newText.value="";
  showText();
};

/* ===== START / STOP ===== */
function disappearWord(){
  if(!running || i>=spans.length) return;

  // обновляем оставшиеся слова из оригинального массива
  for(let j=i;j<spans.length;j++){
    spans[j].textContent = formatWord(originalWords[j]);
  }

  if(paint.checked) spans[i].style.color="white";
  else spans[i].style.display="none";

  i++;
  wordsBox.textContent="Слов: "+(spans.length-i);

  if(i<spans.length) timer=setTimeout(disappearWord, speeds[speed.value]*1000);
  else {running=false; timer=null; timeBox.textContent="Время: "+Math.round((Date.now()-startTime)/1000)+" сек";}
}

startBtn.onclick=()=>{
  stopBtn.onclick();
  running=true; i=0; startTime=Date.now();
  disappearWord();
};

stopBtn.onclick=()=>{
  running=false;
  if(timer){clearTimeout(timer); timer=null;}
  timeBox.textContent="Время: "+Math.round((Date.now()-startTime)/1000)+" сек";
};

/* ===== REPEAT BUTTON FIXED ===== */
repeatBtn.onclick = () => {
  stopBtn.onclick();
  i=0;
  spans.forEach((s,j)=>{
    s.style.display="inline";
    s.style.color="black";
    s.textContent = formatWord(originalWords[j]);
  });
  wordsBox.textContent = "Слов: "+spans.length;
  timeBox.textContent = "Время: 0 сек";
  running = true;
  startTime = Date.now();
  disappearWord();
};

speed.oninput=()=>{
  if(running){
    stopBtn.onclick();
    startBtn.onclick();
  }
};
</script>
</body>
</html>
