<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тренажёр переворачивания слов</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    margin: 0; 
    background: #f0f0f0; 
  }
  header {
    width: 100%; 
    background: orange; 
    color: white; 
    padding: 10px 20px; 
    display: flex; 
    align-items: center; 
    gap: 10px;
    box-sizing: border-box;
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0;
    font-style: italic;
    font-weight: normal;
    font-size: 22px;
    flex-shrink: 0;
  }
  #controls {
    display: flex;
    flex: 1;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  textarea {
    flex: 1;
    max-width: calc(100% - 60px); 
    height: 80px;
    font-size: 14px;
    padding: 5px;
    border-radius: 5px;
    border: none;
    resize: vertical;
    box-sizing: border-box;
  }
  button {
    width: 40px;
    height: 40px;
    font-size: 20px;
    border: none;
    border-radius: 5px;
    background: white;
    color: orange;
    font-weight: normal;
    cursor: pointer;
    flex-shrink: 0;
  }
  button:hover {
    background: #ffe0b3;
  }
  #toggleInputBtn, #showInputBtn {
    width: auto;
    padding: 5px 10px;
    font-size: 14px;
  }
  select, input[type=range] {
    padding: 5px;
    border-radius: 5px;
    border: none;
    font-size: 14px;
    cursor: pointer;
  }
  #output {
    margin: 20px; 
    background: #fff; 
    padding: 15px; 
    min-height: 120px; 
    border-radius: 5px; 
    white-space: pre-wrap; 
    font-family: "Verdana", "Segoe UI", Arial, sans-serif;
    font-size: 48px;
    font-weight: normal;
    line-height: 1.2;     
  }
</style>
</head>
<body>
<header>
  <h1>ЛидерГен</h1>

  <div id="controls">
    <textarea id="inputText" placeholder="Вставьте сюда текст..."></textarea>
    <button onclick="reverseWords()" title="Перевернуть слова">🔄</button>
    <button id="toggleInputBtn" onclick="toggleInput()">Скрыть поле</button>
    <label>
      Шрифт: 
      <select id="fontSelect" onchange="updateFont()">
        <option value="Verdana">Verdana</option>
        <option value="Segoe UI">Segoe UI</option>
        <option value="Arial">Arial</option>
        <option value="Tahoma">Tahoma</option>
        <option value="Courier New">Courier New</option>
      </select>
    </label>
    <label>
      Размер: 
      <input type="range" id="fontSizeRange" min="24" max="100" value="48" onchange="updateFontSize()">
    </label>
  </div>

  <!-- Кнопка вне блока controls, чтобы оставалась видимой -->
  <button id="showInputBtn" onclick="showInput()" style="display:none; margin-left:10px;">Показать поле</button>
</header>

<div id="output"></div>

<script>
function reverseWords() {
  const text = document.getElementById('inputText').value;
  
  const reversed = text.split(/(\s+)/).map(token => {
    if (/^\s+$/.test(token)) return token; // пробелы и переносы
    
    // Unicode-safe разворот слова, знаки препинания остаются на месте
    const match = token.match(/^([\p{L}\p{N}]+)(.*)$/u);
    if (match) {
      const word = Array.from(match[1]).reverse().join(''); 
      const rest = match[2]; 
      return word + rest;
    }
    return token;
  }).join('');

  document.getElementById('output').innerText = reversed;
}

// Скрываем поле ввода
function toggleInput() {
  document.getElementById('controls').style.display = 'none';
  document.getElementById('showInputBtn').style.display = 'inline-block';
}

// Показываем поле ввода снова
function showInput() {
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('showInputBtn').style.display = 'none';
}

// Меняем шрифт вывода
function updateFont() {
  const font = document.getElementById('fontSelect').value;
  document.getElementById('output').style.fontFamily = font;
}

// Меняем размер шрифта
function updateFontSize() {
  const size = document.getElementById('fontSizeRange').value;
  document.getElementById('output').style.fontSize = size + "px";
}
</script>
</body>
</html>
