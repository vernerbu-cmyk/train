<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Лабиринт</title>
<style>
body { font-family: Arial; text-align: center; }
canvas { border:2px solid black; margin-top:10px; }
.controls { margin:10px; }
</style>
</head>
<body>

<h2>Лабиринт</h2>

<div class="controls">
    <label>Ширина <input type="number" id="cols" value="10"></label>
    <label>Высота <input type="number" id="rows" value="10"></label>
    <br><br>
    <label><input type="checkbox" id="modeExit" checked> Выход</label>
    <label><input type="checkbox" id="modeCollect"> Собиратель</label>
    <br><br>
    <button onclick="generateMaze()">Создать</button>
    <button onclick="animateSolution()">Показать путь</button>
</div>

<canvas id="maze" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("maze");
const ctx = canvas.getContext("2d");

let rows, cols, cellSize;
let maze = [];
let player, exit;
let collectibles = [];
let collected = 0;

let trailPath = []; // ← ПУТЬ ЛИНИЕЙ

const car = new Image();
car.src = "https://image.pngaaa.com/613/3563613-middle.png";

const DIRS = [
    {x:0,y:-1},
    {x:1,y:0},
    {x:0,y:1},
    {x:-1,y:0}
];

// ===== ГЕНЕРАЦИЯ =====
function generateMaze(){
    cols = +colsInput.value;
    rows = +rowsInput.value;
    cellSize = Math.min(canvas.width/cols, canvas.height/rows);

    maze=[];
    collectibles=[];
    collected=0;
    trailPath=[];

    player={x:0,y:0};
    exit = modeExit.checked ? {x:cols-1,y:rows-1} : null;

    for(let y=0;y<rows;y++){
        maze[y]=[];
        for(let x=0;x<cols;x++){
            maze[y][x]={walls:[true,true,true,true],visited:false};
        }
    }

    // DFS
    let stack=[{x:0,y:0}];
    maze[0][0].visited=true;

    while(stack.length){
        const c=stack[stack.length-1];
        let opts=[];
        DIRS.forEach((d,i)=>{
            const nx=c.x+d.x, ny=c.y+d.y;
            if(nx>=0&&ny>=0&&nx<cols&&ny<rows&&!maze[ny][nx].visited)
                opts.push({x:nx,y:ny,dir:i});
        });
        if(!opts.length) stack.pop();
        else{
            const n=opts[Math.floor(Math.random()*opts.length)];
            maze[c.y][c.x].walls[n.dir]=false;
            maze[n.y][n.x].walls[(n.dir+2)%4]=false;
            maze[n.y][n.x].visited=true;
            stack.push({x:n.x,y:n.y});
        }
    }

    // тупики
    const extra=Math.floor(rows*cols*0.08);
    for(let i=0;i<extra;i++){
        const x=Math.floor(Math.random()*cols);
        const y=Math.floor(Math.random()*rows);
        const d=Math.floor(Math.random()*4);
        const nx=x+DIRS[d].x, ny=y+DIRS[d].y;
        if(nx<0||ny<0||nx>=cols||ny>=rows) continue;
        maze[y][x].walls[d]=false;
        maze[ny][nx].walls[(d+2)%4]=false;
    }

    // предметы
    if(modeCollect.checked){
        const count=Math.max(3,Math.floor(rows*cols*0.05));
        for(let i=0;i<count;i++){
            let x,y;
            do{
                x=Math.floor(Math.random()*cols);
                y=Math.floor(Math.random()*rows);
            }while((x===0&&y===0)||(exit&&x===exit.x&&y===exit.y));
            collectibles.push({x,y,collected:false});
        }
    }

    draw();
}

// ===== РИСОВАНИЕ =====
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ЛИНИЯ ПУТИ
    if(trailPath.length>1){
        ctx.strokeStyle="green";
        ctx.lineWidth=Math.min(cellSize/4,6);
        ctx.beginPath();

        ctx.moveTo(
            trailPath[0].x*cellSize+cellSize/2,
            trailPath[0].y*cellSize+cellSize/2
        );

        for(let i=1;i<trailPath.length;i++){
            ctx.lineTo(
                trailPath[i].x*cellSize+cellSize/2,
                trailPath[i].y*cellSize+cellSize/2
            );
        }
        ctx.stroke();
    }

    // стены
    ctx.strokeStyle="black";
    ctx.lineWidth=2;

    for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
            const c=maze[y][x];
            const px=x*cellSize, py=y*cellSize;
            if(c.walls[0]) line(px,py,px+cellSize,py);
            if(c.walls[1]) line(px+cellSize,py,px+cellSize,py+cellSize);
            if(c.walls[2]) line(px,py+cellSize,px+cellSize,py+cellSize);
            if(c.walls[3]) line(px,py,px,py+cellSize);
        }
    }

    // предметы
    collectibles.forEach(o=>{
        if(!o.collected){
            ctx.fillStyle="gold";
            ctx.beginPath();
            ctx.arc(o.x*cellSize+cellSize/2,o.y*cellSize+cellSize/2,cellSize/6,0,Math.PI*2);
            ctx.fill();
        }
    });

    // выход
    if(exit){
        ctx.beginPath();
        ctx.arc(exit.x*cellSize+cellSize/2,exit.y*cellSize+cellSize/2,cellSize/4,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
        ctx.stroke();
    }

    // машинка
    ctx.drawImage(car,player.x*cellSize,player.y*cellSize,cellSize,cellSize);
}

function line(x1,y1,x2,y2){
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();
}

// ===== ДВИЖЕНИЕ =====
document.addEventListener("keydown",e=>{
    const map={ArrowUp:0,ArrowRight:1,ArrowDown:2,ArrowLeft:3};
    if(!(e.key in map)) return;

    const d=map[e.key];
    if(!maze[player.y][player.x].walls[d]){
        player.x+=DIRS[d].x;
        player.y+=DIRS[d].y;

        trailPath.push({x:player.x,y:player.y}); // ← линия

        collectibles.forEach(o=>{
            if(!o.collected && o.x===player.x && o.y===player.y){
                o.collected=true;
                collected++;
                if(collected===collectibles.length && !exit) win();
            }
        });

        if(exit && player.x===exit.x && player.y===exit.y) win();

        draw();
    }
});

// ===== АВТОПУТЬ =====
function animateSolution(){
    if(!exit) return;

    const path=findPath();
    if(!path) return;

    trailPath=[{x:player.x,y:player.y}];

    let i=0;
    const t=setInterval(()=>{
        player.x=path[i].x;
        player.y=path[i].y;

        trailPath.push({x:player.x,y:player.y});

        draw();
        i++;

        if(i>=path.length){
            clearInterval(t);
            win();
        }
    },200);
}

function findPath(){
    let q=[{x:player.x,y:player.y,path:[]}];
    let used=new Set();

    while(q.length){
        const c=q.shift();
        const k=`${c.x},${c.y}`;
        if(used.has(k)) continue;
        used.add(k);

        const p=c.path.concat({x:c.x,y:c.y});
        if(c.x===exit.x && c.y===exit.y) return p;

        DIRS.forEach((d,i)=>{
            if(!maze[c.y][c.x].walls[i]){
                const nx=c.x+d.x, ny=c.y+d.y;
                if(nx>=0&&ny>=0&&nx<cols&&ny<rows)
                    q.push({x:nx,y:ny,path:p});
            }
        });
    }
    return null;
}

function win(){
    alert("Победа!");
}

const colsInput=document.getElementById("cols");
const rowsInput=document.getElementById("rows");
const modeExit=document.getElementById("modeExit");
const modeCollect=document.getElementById("modeCollect");

generateMaze();
</script>
</body>
</html>
