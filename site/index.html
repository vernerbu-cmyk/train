<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажёры</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef0f4;
}

/* верх */
#topBar{
height:56px;
background:#1f1f1f;
color:white;
display:flex;
align-items:center;
padding:0 12px;
font-size:18px;
position:fixed;
top:0;left:0;right:0;
z-index:10;
}

#screen{
padding:70px 14px;
display:grid;
gap:14px;
}

/* группы */
.bigCard{
height:140px;
border-radius:16px;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.reading{ background:#4CAF50; }
.math{ background:#2196F3; }
.other{ background:#9C27B0; }

/* карточки */
.card{
background:white;
border-radius:12px;
padding:16px;
font-weight:bold;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* iframe */
#frame{
position:fixed;
top:56px;
left:0;
width:100%;
height:calc(100% - 56px);
border:none;
display:none;
background:white;
z-index:20;
}
</style>
</head>

<body>

<div id="topBar">Тренажёры</div>

<div id="screen"></div>
<iframe id="frame"></iframe>

<script>

let screen=document.getElementById("screen");
let frame=document.getElementById("frame");

let state="groups";
let currentGroup=null;

/* 📌 ТВОЯ СТРУКТУРА */
let data=[

/* READING */
{name:"Алфавит", group:"Чтение", file:"apps/reading/alfavit.html"},
{name:"Читалка", group:"Чтение", file:"apps/reading/chitalka.html"},
{name:"Лавина", group:"Чтение", file:"apps/reading/lavina.html"},
{name:"Нитки", group:"Чтение", file:"apps/reading/nitki.html"},
{name:"Перевёртыш", group:"Чтение", file:"apps/reading/pereverton.html"},
{name:"Пыталка", group:"Чтение", file:"apps/reading/pytal.html"},
{name:"Радуга", group:"Чтение", file:"apps/reading/raduga.html"},
{name:"Слоги", group:"Чтение", file:"apps/reading/slogi.html"},
{name:"Столбы", group:"Чтение", file:"apps/reading/stolby.html"},

/* MATH */
{name:"Домики", group:"Математика", file:"apps/math/domiky.html"},
{name:"Магия", group:"Математика", file:"apps/math/magia.html"},
{name:"Примеры", group:"Математика", file:"apps/math/primery.html"},
{name:"Точки", group:"Математика", file:"apps/math/tochki.html"},

/* OTHER */
{name:"Доска", group:"Разное", file:"apps/other/doska.html"},
{name:"Лабиринт", group:"Разное", file:"apps/other/labyrint.html"}

];

/* группы */
const groups=[
{name:"Чтение", class:"reading"},
{name:"Математика", class:"math"},
{name:"Разное", class:"other"}
];

function render(){
screen.innerHTML="";

if(state==="groups"){

groups.forEach(g=>{

let div=document.createElement("div");
div.className="bigCard "+g.class;
div.textContent=g.name;

div.onclick=()=>{
state="list";
currentGroup=g.name;
render();
};

screen.appendChild(div);

});

}

if(state==="list"){

data
.filter(t=>t.group===currentGroup)
.forEach(t=>{

let div=document.createElement("div");
div.className="card";
div.textContent=t.name;

div.onclick=()=>{
frame.src=t.file;
frame.style.display="block";
};

screen.appendChild(div);

});

}

}

render();

</script>

</body>
</html>
